<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡了电竞</title>
    <style>
        body { background: #050510; color: #fff; font-family: sans-serif; padding: 15px; margin: 0; }
        .box { background: rgba(0,0,0,0.5); padding: 15px; border-radius: 10px; border: 1px solid #00f0ff; margin-bottom: 15px; }
        h2 { color: #00f0ff; text-align: center; margin: 0 0 15px 0; font-size: 1.2em; }
        input, select, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 5px; border: 1px solid #333; background: #111; color: #fff; font-size: 16px; box-sizing: border-box; }
        button { background: #00f0ff; color: #000; font-weight: bold; cursor: pointer; }
        button:active { background: #00c0cc; }
        .link { text-align: center; margin-top: 15px; color: #888; }
        .link span { color: #00f0ff; cursor: pointer; }
        #msg { text-align: center; margin-top: 15px; padding: 12px 24px; border-radius: 8px; display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; min-width: 200px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        #app { display: none; padding-bottom: 80px; }
        .order { background: #111; padding: 12px; margin-top: 10px; border-radius: 5px; border-left: 3px solid #00f0ff; }
        .order-btn { margin-top: 8px; padding: 8px 10px; font-size: 13px; width: auto; margin-right: 8px; display: inline-block; }
        .btn-green { background: #00ff88; color: #000; }
        .btn-red { background: #ff4757; color: #fff; }
        .btn-purple { background: #ff00ff; color: #fff; }
        #detailModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); padding: 15px; box-sizing: border-box; z-index: 999; overflow-y: auto; }
        #detailModal .box { margin-top: 30px; }
        .detail-line { margin: 10px 0; line-height: 1.5; }
        .detail-label { color: #00f0ff; font-weight: bold; }
        .footer-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.9); padding: 10px; display: none; justify-content: space-between; align-items: center; box-sizing: border-box; border-top: 1px solid #00f0ff; }
        .footer-bar button { width: auto; padding: 8px 15px; margin: 0; }
        .loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; justify-content: center; align-items: center; }
        .loading-spinner { width: 50px; height: 50px; border: 5px solid #00f0ff; border-top: 5px solid transparent; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .diagnostic-panel { background: rgba(255, 0, 0, 0.1); border: 1px solid #ff4757; padding: 15px; margin-top: 15px; border-radius: 5px; display: none; }
        .diagnostic-panel h3 { color: #ff4757; margin: 0 0 10px 0; }
        .diagnostic-panel pre { background: rgba(0,0,0,0.5); padding: 10px; border-radius: 3px; overflow-x: auto; font-size: 12px; }
    </style>
</head>
<body>

    <!-- 加载遮罩 -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
    </div>

    <!-- 登录/注册页 -->
    <div id="auth">
        <div class="box">
            <h2>卡了电竞欢迎您</h2>
            <input id="email" placeholder="邮箱">
            <input id="pass" type="password" placeholder="密码">
            <button id="loginBtn">登录</button>
            <div class="link">没账号？<span id="showRegLink">点此注册</span></div>
            
            <!-- 诊断面板 -->
            <div class="diagnostic-panel" id="diagnosticPanel">
                <h3>🔧 连接诊断</h3>
                <div id="diagnosticContent"></div>
                <button onclick="runDiagnostics()" style="margin-top: 10px; background: #ff4757;">重新检测</button>
            </div>
        </div>
        <div class="box" id="regBox" style="display:none;">
            <h2>注册</h2>
            <input id="regEmail" placeholder="邮箱">
            <input id="regPass" type="password" placeholder="密码">
            <input id="regName" placeholder="昵称">
            <select id="regRole">
                <option value="player">玩家</option>
                <option value="worker">打手</option>
                <option value="admin">管理员</option>
                <option value="owner">店长</option>
            </select>
            <button id="regBtn">注册</button>
            <div class="link">有账号？<span id="showLoginLink">点此登录</span></div>
        </div>
    </div>

    <!-- 主应用页 -->
    <div id="app">
        <div class="box">
            <h2>派单系统</h2>
            <p id="userInfo"></p>
            <div id="ownerPanel" style="display:none; margin-top:10px; border:1px solid #ff00ff; padding:10px;">
                <h3 style="color:#ff00ff; margin: 0 0 10px 0;">待审核管理员</h3>
                <div id="auditList"></div>
            </div>
            <div id="orderPanel" style="display:none; margin-top:10px;">
                <input id="orderContent" placeholder="订单内容">
                <input id="orderGameId" placeholder="游戏ID（必填）">
                <input id="orderPrice" type="number" placeholder="价格">
                <button id="orderBtn">发布订单</button>
            </div>
            <h3 style="margin:15px 0 10px 0; color:#00f0ff;">订单列表</h3>
            <div id="orderList"></div>
        </div>
    </div>

    <!-- 底部栏 -->
    <div class="footer-bar" id="footerBar">
        <span id="footerUser"></span>
        <button id="logoutBtn">退出</button>
    </div>

    <!-- 订单详情弹窗 -->
    <div id="detailModal">
        <div class="box">
            <h2>订单详情</h2>
            <div id="detailContent"></div>
            <button id="closeDetailBtn" style="margin-top:15px;">关闭</button>
        </div>
    </div>

    <!-- 提示框 -->
    <div id="msg"></div>

<script>
// ==========================================
// 🔴 必须替换成你的 Supabase 配置！
// ==========================================
const SUPABASE_URL = 'https://aqotjkekuvkkbqvsxagt.supabase.co';  // 例如: https://xyzcompany.supabase.co
const SUPABASE_ANON_KEY = 'sb_publishable_zHQ1lkaWfa13PlYEnfH25w_ghXaSAGe';  // 例如: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...

// 全局变量
let currentUser = null;
let userProfile = null;
let isConnected = false;

// DOM元素引用
const elements = {
    loginBtn: null,
    regBtn: null,
    orderBtn: null,
    logoutBtn: null,
    showRegLink: null,
    showLoginLink: null,
    closeDetailBtn: null,
    loadingOverlay: null,
    diagnosticPanel: null,
    diagnosticContent: null
};

// 显示/隐藏加载遮罩
function toggleLoading(show) {
    if (elements.loadingOverlay) {
        elements.loadingOverlay.style.display = show ? 'flex' : 'none';
    }
}

// 显示提示
function showMessage(text, isSuccess = false) {
    const el = document.getElementById('msg');
    if (!el) return;
    el.textContent = text;
    el.style.background = isSuccess ? 'rgba(0, 255, 136, 0.9)' : 'rgba(255, 0, 85, 0.9)';
    el.style.color = isSuccess ? '#000' : '#fff';
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', isSuccess ? 2000 : 4000);
}

// 切换视图
function setView(view) {
    const authEl = document.getElementById('auth');
    const appEl = document.getElementById('app');
    const footerEl = document.getElementById('footerBar');
    if (!authEl || !appEl || !footerEl) return;
    authEl.style.display = view === 'auth' ? 'block' : 'none';
    appEl.style.display = view === 'app' ? 'block' : 'none';
    footerEl.style.display = view === 'app' ? 'flex' : 'none';
}

// 显示诊断面板
function showDiagnostic(info) {
    if (elements.diagnosticPanel && elements.diagnosticContent) {
        elements.diagnosticPanel.style.display = 'block';
        elements.diagnosticContent.innerHTML = `<pre>${info}</pre>`;
    }
}

// 运行连接诊断
async function runDiagnostics() {
    toggleLoading(true);
    let diagnosticInfo = "🔍 开始连接诊断...\n\n";
    
    try {
        // 1. 检查配置
        diagnosticInfo += `1. 配置检查:\n`;
        diagnosticInfo += `   SUPABASE_URL: ${SUPABASE_URL ? '✅ 已设置' : '❌ 未设置'}\n`;
        diagnosticInfo += `   SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY ? '✅ 已设置' : '❌ 未设置'}\n\n`;
        
        if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
            diagnosticInfo += "❌ 错误: 请先在代码中设置SUPABASE_URL和SUPABASE_ANON_KEY\n";
            showDiagnostic(diagnosticInfo);
            toggleLoading(false);
            return;
        }
        
        // 2. 测试网络连接
        diagnosticInfo += `2. 网络连接测试:\n`;
        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 5000);
            
            const response = await fetch(`${SUPABASE_URL}/rest/v1/`, {
                method: 'GET',
                headers: {
                    'apikey': SUPABASE_ANON_KEY,
                    'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                },
                signal: controller.signal
            });
            
            clearTimeout(timeoutId);
            
            if (response.ok) {
                diagnosticInfo += `   ✅ 成功连接到 Supabase REST API (状态码: ${response.status})\n`;
                isConnected = true;
            } else {
                diagnosticInfo += `   ❌ 连接失败 (状态码: ${response.status})\n`;
                const errorText = await response.text();
                diagnosticInfo += `   错误信息: ${errorText}\n`;
            }
        } catch (networkError) {
            diagnosticInfo += `   ❌ 网络错误: ${networkError.name}: ${networkError.message}\n`;
            if (networkError.name === 'AbortError') {
                diagnosticInfo += `   💡 提示: 连接超时，可能是网络较慢或Supabase服务器在国外\n`;
            }
        }
        
        // 3. 测试Auth端点
        diagnosticInfo += `\n3. Auth端点测试:\n`;
        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 5000);
            
            const authResponse = await fetch(`${SUPABASE_URL}/auth/v1/health`, {
                method: 'GET',
                signal: controller.signal
            });
            
            clearTimeout(timeoutId);
            
            if (authResponse.ok) {
                diagnosticInfo += `   ✅ Auth服务正常 (状态码: ${authResponse.status})\n`;
            } else {
                diagnosticInfo += `   ❌ Auth服务异常 (状态码: ${authResponse.status})\n`;
            }
        } catch (authError) {
            diagnosticInfo += `   ❌ Auth服务错误: ${authError.message}\n`;
        }
        
        // 4. 测试DNS解析
        diagnosticInfo += `\n4. DNS解析测试:\n`;
        try {
            const url = new URL(SUPABASE_URL);
            diagnosticInfo += `   域名: ${url.hostname}\n`;
            diagnosticInfo += `   💡 如果无法连接，请尝试:\n`;
            diagnosticInfo += `   - 检查手机网络是否正常\n`;
            diagnosticInfo += `   - 尝试切换WiFi/移动数据\n`;
            diagnosticInfo += `   - 确认Supabase项目未被暂停\n`;
        } catch (urlError) {
            diagnosticInfo += `   ❌ URL格式错误: ${urlError.message}\n`;
        }
        
        // 5. 解决方案建议
        diagnosticInfo += `\n📋 解决方案建议:\n`;
        if (!isConnected) {
            diagnosticInfo += `   1. 确认SUPABASE_URL和SUPABASE_ANON_KEY是否正确\n`;
            diagnosticInfo += `   2. 检查Supabase项目是否处于活动状态\n`;
            diagnosticInfo += `   3. 尝试使用VPN或代理连接\n`;
            diagnosticInfo += `   4. 如果是国内访问国外Supabase，建议使用国内云服务自建后端\n`;
            diagnosticInfo += `   5. 临时解决方案: 使用本地Mock数据进行测试\n`;
        } else {
            diagnosticInfo += `   ✅ 连接正常，可以正常使用系统\n`;
        }
        
        showDiagnostic(diagnosticInfo);
        
    } catch (error) {
        diagnosticInfo += `\n❌ 诊断过程出错: ${error.message}\n`;
        showDiagnostic(diagnosticInfo);
    } finally {
        toggleLoading(false);
    }
}

// 简化的登录功能（不使用Supabase SDK，直接用fetch）
async function handleLogin() {
    console.log('登录按钮被点击 - 开始执行');
    
    const emailInput = document.getElementById('email');
    const passInput = document.getElementById('pass');
    
    if (!emailInput || !passInput) {
        showMessage('页面元素加载异常', false);
        return;
    }

    const email = emailInput.value.trim();
    const password = passInput.value.trim();
    
    if (!email || !password) {
        showMessage('请输入邮箱和密码', false);
        return;
    }

    if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
        showMessage('系统未配置，请检查代码', false);
        runDiagnostics();
        return;
    }

    toggleLoading(true);
    
    try {
        console.log('正在发送登录请求...');
        
        // 直接使用fetch调用Supabase Auth API
        const response = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'apikey': SUPABASE_ANON_KEY
            },
            body: JSON.stringify({
                email: email,
                password: password
            })
        });

        console.log('登录响应状态:', response.status);
        
        if (!response.ok) {
            const errorData = await response.json();
            console.error('登录失败:', errorData);
            showMessage(`登录失败：${errorData.error_description || errorData.message || '未知错误'}`, false);
            return;
        }

        const data = await response.json();
        console.log('登录成功，获取用户资料...');
        
        // 获取用户资料
        const profileResponse = await fetch(`${SUPABASE_URL}/rest/v1/profiles?id=eq.${data.user.id}&select=*`, {
            headers: {
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': `Bearer ${data.access_token}`
            }
        });

        if (!profileResponse.ok) {
            showMessage('登录失败：无法获取用户资料', false);
            return;
        }

        const profiles = await profileResponse.json();
        if (!profiles || profiles.length === 0) {
            showMessage('登录失败：用户资料不存在', false);
            return;
        }

        const profile = profiles[0];
        if (profile.status !== 'approved') {
            showMessage('账号审核中，暂无法登录', false);
            return;
        }

        currentUser = data.user;
        userProfile = profile;
        updateUI(profile);
        setView('app');
        loadOrders(data.access_token);
        showMessage(`欢迎您，${profile.nickname}`, true);
        passInput.value = '';
        
    } catch (e) {
        console.error('登录异常:', e);
        showMessage(`登录异常：${e.message}`, false);
        runDiagnostics();
    } finally {
        toggleLoading(false);
    }
}

// 简化的注册功能
async function handleRegister() {
    const emailInput = document.getElementById('regEmail');
    const passInput = document.getElementById('regPass');
    const nameInput = document.getElementById('regName');
    const roleSelect = document.getElementById('regRole');
    
    if (!emailInput || !passInput || !nameInput || !roleSelect) {
        showMessage('页面元素加载异常', false);
        return;
    }

    const email = emailInput.value.trim();
    const password = passInput.value.trim();
    const nickname = nameInput.value.trim();
    const role = roleSelect.value;

    if (!email || !password || !nickname) {
        showMessage('请填写完整信息', false);
        return;
    }

    toggleLoading(true);
    
    try {
        // 检查店长唯一性
        if (role === 'owner') {
            const checkResponse = await fetch(`${SUPABASE_URL}/rest/v1/profiles?select=id&role=eq.owner`, {
                headers: {
                    'apikey': SUPABASE_ANON_KEY
                }
            });
            
            if (checkResponse.ok) {
                const owners = await checkResponse.json();
                if (owners && owners.length > 0) {
                    showMessage('店长账号已存在', false);
                    return;
                }
            }
        }

        // 注册用户
        const signupResponse = await fetch(`${SUPABASE_URL}/auth/v1/signup`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'apikey': SUPABASE_ANON_KEY
            },
            body: JSON.stringify({
                email: email,
                password: password,
                data: {
                    nickname: nickname,
                    role: role
                }
            })
        });

        if (!signupResponse.ok) {
            const errorData = await signupResponse.json();
            showMessage(`注册失败：${errorData.error_description || errorData.message}`, false);
            return;
        }

        const signupData = await signupResponse.json();
        
        // 创建用户资料
        const profileResponse = await fetch(`${SUPABASE_URL}/rest/v1/profiles`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': `Bearer ${signupData.session.access_token}`,
                'Prefer': 'return=minimal'
            },
            body: JSON.stringify({
                id: signupData.user.id,
                email: email,
                nickname: nickname,
                role: role,
                status: role === 'admin' ? 'pending' : 'approved'
            })
        });

        if (!profileResponse.ok) {
            showMessage('注册失败：无法创建用户资料', false);
            return;
        }

        showMessage('注册成功！请登录', true);
        document.getElementById('regBox').style.display = 'none';
        emailInput.value = email;
    } catch (e) {
        showMessage(`注册异常：${e.message}`, false);
        runDiagnostics();
    } finally {
        toggleLoading(false);
    }
}

// 加载订单
async function loadOrders(token) {
    if (!token) return;
    
    try {
        let query = `${SUPABASE_URL}/rest/v1/orders?select=*,sender:sender_id(nickname),worker:worker_id(nickname)&order=created_at.desc`;
        
        // 非店长只能看自己的订单
        if (userProfile.role !== 'owner') {
            query += `&or=(sender_id.eq.${currentUser.id},worker_id.eq.${currentUser.id})`;
        }

        const response = await fetch(query, {
            headers: {
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': `Bearer ${token}`
            }
        });

        if (!response.ok) {
            showMessage('加载订单失败', false);
            return;
        }

        const orders = await response.json();
        const listEl = document.getElementById('orderList');
        if (!listEl) return;

        if (!orders || orders.length === 0) {
            listEl.innerHTML = '<div style="text-align:center; color:#888; padding:20px;">暂无订单</div>';
            return;
        }

        listEl.innerHTML = orders.map(order => {
            const isOwner = order.sender_id === currentUser.id;
            const isWorker = order.worker_id === currentUser.id;
            const canTake = ['owner','admin','worker'].includes(userProfile.role) && 
                           order.status === 'pending' && !order.worker_id && !isOwner;
            const canComplete = isWorker && order.status === 'accepted';
            const canDelete = (isOwner && order.status === 'pending') || (isWorker && order.status === 'accepted');

            return `
                <div class="order">
                    <div><b>内容:</b> ${order.content}</div>
                    <div><b>游戏ID:</b> ${order.game_id}</div>
                    <div><b>状态:</b> <span style="color:#00f0ff;">${mapStatus(order.status)}</span></div>
                    <div><b>发单:</b> ${order.sender?.nickname || '未知'}</div>
                    <div><b>接单:</b> ${order.worker?.nickname || '无'}</div>
                    <button class="order-btn" onclick="showOrderDetail('${order.id}')">详情</button>
                    ${canTake ? `<button class="order-btn" onclick="takeOrder('${order.id}')">接单</button>` : ''}
                    ${canComplete ? `<button class="order-btn btn-green" onclick="completeOrder('${order.id}')">结单</button>` : ''}
                    ${canDelete ? `<button class="order-btn btn-red" onclick="deleteOrder('${order.id}')">取消</button>` : ''}
                </div>
            `;
        }).join('');
    } catch (e) {
        showMessage(`加载订单失败：${e.message}`, false);
    }
}

// 发布订单
async function createOrder() {
    const contentInput = document.getElementById('orderContent');
    const gameIdInput = document.getElementById('orderGameId');
    const priceInput = document.getElementById('orderPrice');
    
    if (!contentInput || !gameIdInput || !priceInput) return;

    const content = contentInput.value.trim();
    const gameId = gameIdInput.value.trim();
    const price = priceInput.value.trim();
    
    if (!content || !gameId || !price) {
        showMessage('请填写完整订单信息', false);
        return;
    }

    try {
        // 先获取当前token
        const session = await getCurrentSession();
        if (!session) {
            showMessage('请先登录', false);
            return;
        }

        const response = await fetch(`${SUPABASE_URL}/rest/v1/orders`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': `Bearer ${session.access_token}`,
                'Prefer': 'return=minimal'
            },
            body: JSON.stringify({
                sender_id: currentUser.id,
                content: content,
                game_id: gameId,
                price: parseFloat(price),
                status: 'pending'
            })
        });

        if (!response.ok) {
            showMessage('发布失败', false);
            return;
        }

        showMessage('订单发布成功', true);
        contentInput.value = '';
        gameIdInput.value = '';
        priceInput.value = '';
        loadOrders(session.access_token);
    } catch (e) {
        showMessage(`发布失败：${e.message}`, false);
    }
}

// 获取当前会话
async function getCurrentSession() {
    try {
        const response = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
            headers: {
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': `Bearer ${localStorage.getItem('sb-access-token')}`
            }
        });
        
        if (response.ok) {
            const user = await response.json();
            return {
                user: user,
                access_token: localStorage.getItem('sb-access-token')
            };
        }
    } catch (e) {
        console.error('获取会话失败:', e);
    }
    return null;
}

// 接单
async function takeOrder(orderId) {
    try {
        const session = await getCurrentSession();
        if (!session) {
            showMessage('请先登录', false);
            return;
        }

        const response = await fetch(`${SUPABASE_URL}/rest/v1/orders?id=eq.${orderId}`, {
            method: 'PATCH',
            headers: {
                'Content-Type': 'application/json',
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': `Bearer ${session.access_token}`,
                'Prefer': 'return=minimal'
            },
            body: JSON.stringify({
                worker_id: currentUser.id,
                status: 'accepted'
            })
        });

        if (!response.ok) {
            showMessage('接单失败', false);
            return;
        }

        showMessage('接单成功', true);
        loadOrders(session.access_token);
    } catch (e) {
        showMessage(`接单失败：${e.message}`, false);
    }
}

// 显示订单详情
async function showOrderDetail(orderId) {
    try {
        const session = await getCurrentSession();
        if (!session) {
            showMessage('请先登录', false);
            return;
        }

        const response = await fetch(`${SUPABASE_URL}/rest/v1/orders?id=eq.${orderId}&select=*,sender:sender_id(nickname),worker:worker_id(nickname)`, {
            headers: {
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': `Bearer ${session.access_token}`
            }
        });

        if (!response.ok) {
            showMessage('加载详情失败', false);
            return;
        }

        const orders = await response.json();
        if (!orders || orders.length === 0) {
            showMessage('订单不存在', false);
            return;
        }

        const order = orders[0];
        const isOwner = order.sender_id === currentUser.id;
        const isWorker = order.worker_id === currentUser.id;
        const canDelete = (isOwner && order.status === 'pending') || (isWorker && order.status === 'accepted');
        const detailContentEl = document.getElementById('detailContent');
        const detailModalEl = document.getElementById('detailModal');
        
        if (!detailContentEl || !detailModalEl) return;

        detailContentEl.innerHTML = `
            <div class="detail-line"><b>内容:</b> ${order.content}</div>
            <div class="detail-line"><b>游戏ID:</b> ${order.game_id}</div>
            <div class="detail-line"><b>价格:</b> ¥${order.price}</div>
            <div class="detail-line"><b>状态:</b> <span style="color:#00f0ff;">${mapStatus(order.status)}</span></div>
            <div class="detail-line"><b>发单:</b> ${order.sender?.nickname || '未知'}</div>
            <div class="detail-line"><b>接单:</b> ${order.worker?.nickname || '无'}</div>
            ${canDelete ? `<button class="order-btn btn-red" onclick="deleteOrder('${order.id}')" style="margin-top:15px;">取消订单</button>` : ''}
        `;
        detailModalEl.style.display = 'block';
    } catch (e) {
        showMessage(`加载详情失败：${e.message}`, false);
    }
}

// 关闭详情弹窗
function closeDetailModal() {
    const detailModalEl = document.getElementById('detailModal');
    if (detailModalEl) detailModalEl.style.display = 'none';
}

// 更新UI
function updateUI(profile) {
    const userInfoEl = document.getElementById('userInfo');
    const footerUserEl = document.getElementById('footerUser');
    const orderPanelEl = document.getElementById('orderPanel');
    const ownerPanelEl = document.getElementById('ownerPanel');
    if (!userInfoEl || !footerUserEl || !orderPanelEl || !ownerPanelEl) return;

    userInfoEl.textContent = `欢迎: ${profile.nickname}（${profile.role}）`;
    footerUserEl.textContent = profile.nickname;
    if (profile.role === 'owner' || profile.role === 'player') {
        orderPanelEl.style.display = 'block';
    }
    if (profile.role === 'owner') {
        ownerPanelEl.style.display = 'block';
        loadAuditList();
    }
}

// 加载审核列表
async function loadAuditList() {
    if (!currentUser || userProfile.role !== 'owner') return;
    try {
        const session = await getCurrentSession();
        if (!session) return;

        const response = await fetch(`${SUPABASE_URL}/rest/v1/profiles?role=eq.admin&status=eq.pending&order=created_at.desc`, {
            headers: {
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': `Bearer ${session.access_token}`
            }
        });

        if (!response.ok) return;

        const admins = await response.json();
        const listEl = document.getElementById('auditList');
        if (!listEl) return;

        if (!admins || admins.length === 0) {
            listEl.innerHTML = '<div style="color:#888;">暂无待审核的管理员</div>';
            return;
        }

        listEl.innerHTML = admins.map(admin => `
            <div class="order">
                <div><b>${admin.nickname}</b> (${admin.email})</div>
                <div style="font-size:12px; color:#888;">申请时间: ${new Date(admin.created_at).toLocaleString()}</div>
                <button class="order-btn btn-purple" onclick="approveAdmin('${admin.id}')">批准</button>
            </div>
        `).join('');
    } catch (e) {
        console.error('加载审核列表失败:', e);
    }
}

// 退出登录
async function handleLogout() {
    try {
        await fetch(`${SUPABASE_URL}/auth/v1/logout`, {
            method: 'POST',
            headers: {
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': `Bearer ${localStorage.getItem('sb-access-token')}`
            }
        });
    } catch (e) {
        console.error('退出登录请求失败:', e);
    } finally {
        localStorage.removeItem('sb-access-token');
        currentUser = null;
        userProfile = null;
        setView('auth');
        showMessage('已退出登录', true);
    }
}

// 状态映射
function mapStatus(status) {
    const map = {
        'pending': '待接单',
        'accepted': '已接单',
        'processing': '正在进行中',
        'completed': '订单已完成',
        'cancelled': '订单已取消'
    };
    return map[status] || '未知状态';
}

// 自动登录
async function autoLogin() {
    console.log('尝试自动登录...');
    
    const savedToken = localStorage.getItem('sb-access-token');
    if (!savedToken) {
        console.log('无保存的令牌');
        setView('auth');
        return;
    }
    
    try {
        const response = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
            headers: {
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': `Bearer ${savedToken}`
            }
        });
        
        if (!response.ok) {
            console.log('令牌无效');
            localStorage.removeItem('sb-access-token');
            setView('auth');
            return;
        }

        const user = await response.json();
        currentUser = user;
        
        // 获取用户资料
        const profileResponse = await fetch(`${SUPABASE_URL}/rest/v1/profiles?id=eq.${user.id}&select=*`, {
            headers: {
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': `Bearer ${savedToken}`
            }
        });

        if (!profileResponse.ok) {
            setView('auth');
            return;
        }

        const profiles = await profileResponse.json();
        if (!profiles || profiles.length === 0) {
            setView('auth');
            return;
        }

        const profile = profiles[0];
        if (profile.status !== 'approved') {
            setView('auth');
            return;
        }

        userProfile = profile;
        updateUI(profile);
        setView('app');
        loadOrders(savedToken);
        showMessage(`欢迎回来，${profile.nickname}`, true);
    } catch (e) {
        console.error('自动登录异常:', e);
        setView('auth');
    }
}

// 初始化函数
function init() {
    console.log('初始化应用...');
    
    // 获取DOM元素引用
    elements.loginBtn = document.getElementById('loginBtn');
    elements.regBtn = document.getElementById('regBtn');
    elements.orderBtn = document.getElementById('orderBtn');
    elements.logoutBtn = document.getElementById('logoutBtn');
    elements.showRegLink = document.getElementById('showRegLink');
    elements.showLoginLink = document.getElementById('showLoginLink');
    elements.closeDetailBtn = document.getElementById('closeDetailBtn');
    elements.loadingOverlay = document.getElementById('loadingOverlay');
    elements.diagnosticPanel = document.getElementById('diagnosticPanel');
    elements.diagnosticContent = document.getElementById('diagnosticContent');
    
    // 绑定事件监听器
    if (elements.loginBtn) {
        elements.loginBtn.addEventListener('click', function(e) {
            e.preventDefault();
            console.log('登录按钮点击事件触发');
            handleLogin();
        });
    }
    
    if (elements.regBtn) {
        elements.regBtn.addEventListener('click', function(e) {
            e.preventDefault();
            console.log('注册按钮点击事件触发');
            handleRegister();
        });
    }
    
    if (elements.orderBtn) {
        elements.orderBtn.addEventListener('click', function(e) {
            e.preventDefault();
            console.log('发布订单按钮点击事件触发');
            createOrder();
        });
    }
    
    if (elements.logoutBtn) {
        elements.logoutBtn.addEventListener('click', function(e) {
            e.preventDefault();
            console.log('退出登录按钮点击事件触发');
            handleLogout();
        });
    }
    
    if (elements.showRegLink) {
        elements.showRegLink.addEventListener('click', function(e) {
            e.preventDefault();
            console.log('显示注册链接点击事件触发');
            document.getElementById('regBox').style.display = 'block';
        });
    }
    
    if (elements.showLoginLink) {
        elements.showLoginLink.addEventListener('click', function(e) {
            e.preventDefault();
            console.log('显示登录链接点击事件触发');
            document.getElementById('regBox').style.display = 'none';
        });
    }
    
    if (elements.closeDetailBtn) {
        elements.closeDetailBtn.addEventListener('click', function(e) {
            e.preventDefault();
            console.log('关闭详情按钮点击事件触发');
            closeDetailModal();
        });
    }
    
    // 检查配置并显示诊断面板
    if (!SUPABASE_URL || !SUPABASE_ANON_KEY || SUPABASE_URL.includes('YOUR_SUPABASE')) {
        showDiagnostic('⚠️ 请先配置Supabase信息！\n\n请在代码顶部替换：\n1. YOUR_SUPABASE_URL\n2. YOUR_SUPABASE_ANON_KEY\n\n配置后可点击"重新检测"按钮测试连接。');
        elements.diagnosticPanel.style.display = 'block';
    } else {
        // 延迟运行诊断，确保页面已加载
        setTimeout(runDiagnostics, 1000);
    }
    
    // 尝试自动登录
    autoLogin();
}

// 页面加载完成后初始化
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
} else {
    init();
}

// 暴露必要的函数到全局作用域
window.showOrderDetail = showOrderDetail;
window.takeOrder = takeOrder;
window.completeOrder = completeOrder;
window.deleteOrder = deleteOrder;
window.approveAdmin = approveAdmin;
window.runDiagnostics = runDiagnostics;
</script>
