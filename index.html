<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试页</title>
</head>
<body style="background:#050510;color:#fff;padding:20px;">
    <h2 style="color:#00f0ff;">测试按钮点击</h2>
    <!-- 原生onclick，兼容性拉满，只要浏览器支持JS就一定有反应 -->
    <button onclick="alert('✅ 按钮点击成功！JS正常运行')" style="width:100%;padding:15px;background:#00f0ff;font-size:18px;border:none;border-radius:5px;">
        点我测试
    </button>
    <p style="margin-top:20px;">如果没弹窗，说明你浏览器禁用了JS，换个Chrome/Safari浏览器就行</p>
</body>
</html>
