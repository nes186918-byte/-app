<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡了电竞</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        body { background: #050510; color: #fff; font-family: sans-serif; padding: 15px; margin: 0; }
        .box { background: rgba(0,0,0,0.5); padding: 15px; border-radius: 10px; border: 1px solid #00f0ff; margin-bottom: 15px; }
        h2 { color: #00f0ff; text-align: center; margin: 0 0 15px 0; font-size: 1.2em; }
        input, select, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 5px; border: 1px solid #333; background: #111; color: #fff; font-size: 16px; box-sizing: border-box; }
        button { background: #00f0ff; color: #000; font-weight: bold; cursor: pointer; }
        button:active { background: #00c0cc; }
        .link { text-align: center; margin-top: 15px; color: #888; }
        .link span { color: #00f0ff; cursor: pointer; }
        #msg { text-align: center; margin-top: 15px; padding: 12px 24px; border-radius: 8px; display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; min-width: 200px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        #app { display: none; padding-bottom: 80px; }
        .order { background: #111; padding: 12px; margin-top: 10px; border-radius: 5px; border-left: 3px solid #00f0ff; }
        .order-btn { margin-top: 8px; padding: 8px 10px; font-size: 13px; width: auto; margin-right: 8px; display: inline-block; }
        .btn-green { background: #00ff88; color: #000; }
        .btn-red { background: #ff4757; color: #fff; }
        .btn-purple { background: #ff00ff; color: #fff; }
        #detailModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); padding: 15px; box-sizing: border-box; z-index: 999; overflow-y: auto; }
        #detailModal .box { margin-top: 30px; }
        .footer-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.9); padding: 10px; display: none; justify-content: space-between; align-items: center; box-sizing: border-box; border-top: 1px solid #00f0ff; }
        .footer-bar button { width: auto; padding: 8px 15px; margin: 0; }
        .loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; justify-content: center; align-items: center; }
        .loading-spinner { width: 50px; height: 50px; border: 5px solid #00f0ff; border-top: 5px solid transparent; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #fatalError { display: none; background: #ff4757; padding: 15px; border-radius: 5px; margin-bottom: 15px; }

        /* 聊天室样式 */
        #chatToggleBtn { position: fixed; right: 20px; bottom: 90px; width: 56px; height: 56px; border-radius: 50%; background: #ff00ff; color: #fff; font-size: 22px; border: none; cursor: pointer; z-index: 1002; box-shadow: 0 4px 15px rgba(255,0,255,0.5); }
        #chatWindow { position: fixed; right: 20px; bottom: 160px; width: 350px; height: 450px; background: rgba(5,5,16,0.95); border-radius: 12px; border: 1px solid #ff00ff; z-index: 1001; display: none; flex-direction: column; overflow: hidden; }
        #chatHeader { padding: 10px; background: rgba(255,0,255,0.2); color: #ff00ff; font-weight: bold; text-align: center; border-bottom: 1px solid #ff00ff; display: flex; justify-content: space-between; align-items: center; }
        #backToPublic { background: none; border: 1px solid #ff00ff; color: #ff00ff; padding: 4px 8px; font-size: 12px; width: auto; margin: 0; }
        #chatMessages { flex: 1; padding: 12px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        #chatInputArea { padding: 12px; border-top: 1px solid #333; display: flex; gap: 8px; }
        #chatInput { flex: 1; padding: 8px; margin: 0; font-size: 14px; }
        #chatSendBtn { width: auto; padding: 8px 12px; margin: 0; font-size: 14px; background: #ff00ff; }
        
        /* 在线列表 */
        #onlineListPanel { position: fixed; right: 380px; bottom: 160px; width: 200px; height: 450px; background: rgba(5,5,16,0.95); border-radius: 12px; border: 1px solid #00ff88; z-index: 1001; display: none; flex-direction: column; overflow: hidden; }
        #onlineListHeader { padding: 10px; background: rgba(0,255,136,0.2); color: #00ff88; font-weight: bold; text-align: center; border-bottom: 1px solid #00ff88; }
        #onlineUsers { flex: 1; padding: 10px; overflow-y: auto; }
        .online-user-item { display: flex; align-items: center; padding: 8px; cursor: pointer; border-radius: 5px; margin-bottom: 5px; }
        .online-user-item:hover { background: rgba(255,255,255,0.1); }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; }
        .status-dot.online { background: #00ff88; box-shadow: 0 0 8px #00ff88; }
        .status-dot.offline { background: #666; }
        .username-text { font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .role-tag { font-size: 10px; padding: 1px 4px; border-radius: 3px; margin-left: 5px; }
        .role-tag.owner { background: #ff00ff; color: #fff; }
        .role-tag.admin { background: #ff69b4; color: #fff; }
        .role-tag.worker { background: #00f0ff; color: #000; }
        .role-tag.player { background: #00ff88; color: #000; }

        /* 聊天气泡 */
        .chat-msg { max-width: 85%; padding: 8px 12px; border-radius: 8px; word-break: break-all; }
        .chat-msg.self { align-self: flex-end; }
        .chat-msg.other { align-self: flex-start; }
        .chat-msg.owner { background: rgba(255,0,255,0.2); border-left: 3px solid #ff00ff; }
        .chat-msg.admin { background: rgba(255,105,180,0.2); border-left: 3px solid #ff69b4; }
        .chat-msg.worker { background: rgba(0,240,255,0.2); border-left: 3px solid #00f0ff; }
        .chat-msg.player { background: rgba(0,255,136,0.2); border-left: 3px solid #00ff88; }
        .chat-nickname { font-size: 12px; color: #aaa; margin-bottom: 4px; }
        .chat-content { font-size: 14px; }
        .chat-time { font-size: 11px; color: #666; text-align: right; margin-top: 4px; }
    </style>
</head>
<body>
    <div id="fatalError"></div>
    <div class="loading-overlay" id="loadingOverlay"><div class="loading-spinner"></div></div>

    <div id="auth">
        <div class="box">
            <h2>卡了电竞欢迎您</h2>
            <input id="email" placeholder="邮箱">
            <input id="pass" type="password" placeholder="密码">
            <button onclick="window.handleLogin()">登录</button>
            <div class="link">没账号？<span onclick="window.showReg()">点此注册</span></div>
        </div>
        <div class="box" id="regBox" style="display:none;">
            <h2>注册</h2>
            <input id="regEmail" placeholder="邮箱">
            <input id="regPass" type="password" placeholder="密码">
            <input id="regName" placeholder="昵称">
            <select id="regRole">
                <option value="player">玩家</option>
                <option value="worker">打手</option>
                <option value="admin">管理员</option>
                <option value="owner">店长</option>
            </select>
            <button onclick="window.handleRegister()">注册</button>
            <div class="link">有账号？<span onclick="window.showLogin()">点此登录</span></div>
        </div>
    </div>

    <div id="app">
        <div class="box">
            <h2>派单系统</h2>
            <p id="userInfo"></p>
            <div id="ownerPanel" style="display:none; margin-top:10px; border:1px solid #ff00ff; padding:10px;">
                <h3 style="color:#ff00ff; margin: 0 0 10px 0;">待审核管理员</h3>
                <div id="auditList"></div>
            </div>
            <div id="orderPanel" style="display:none; margin-top:10px;">
                <input id="orderContent" placeholder="订单内容">
                <input id="orderGameId" placeholder="游戏ID（必填）">
                <input id="orderPrice" type="number" placeholder="价格">
                <button onclick="window.createOrder()">发布订单</button>
            </div>
            <h3 style="margin:15px 0 10px 0; color:#00f0ff;">订单列表</h3>
            <div id="orderList"></div>
        </div>
    </div>

    <div class="footer-bar" id="footerBar">
        <span id="footerUser"></span>
        <button onclick="window.handleLogout()">退出</button>
    </div>

    <div id="detailModal">
        <div class="box">
            <h2>订单详情</h2>
            <div id="detailContent"></div>
            <button onclick="window.closeDetailModal()">关闭</button>
        </div>
    </div>

    <div id="msg"></div>

    <!-- 在线列表面板 -->
    <div id="onlineListPanel">
        <div id="onlineListHeader">在线用户 (<span id="onlineCount">0</span>)</div>
        <div id="onlineUsers"></div>
    </div>

    <!-- 聊天室 -->
    <button id="chatToggleBtn" onclick="window.toggleChat()">💬</button>
    <div id="chatWindow">
        <div id="chatHeader">
            <span id="chatTitle">公共聊天室</span>
            <button id="backToPublic" onclick="window.openPublicChat()" style="display:none;">返回公聊</button>
        </div>
        <div id="chatMessages"></div>
        <div id="chatInputArea">
            <input id="chatInput" placeholder="输入消息..." onkeypress="if(event.key==='Enter')window.sendChatMessage()">
            <button id="chatSendBtn" onclick="window.sendChatMessage()">发送</button>
        </div>
    </div>

<script>
const SUPABASE_URL = 'https://wjrkygyfciazaiwdgbfy.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indqcmt5Z3lmY2lhemFpd2RnYmZ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwODIwNjEsImV4cCI6MjA5OTY1ODA2MX0.LX4A8vKu5IOzHfU-YcWG8Hlgi7kSG0cMQENKDV5uIzI';

window.supabaseClient = null;
window.currentUser = null;
window.userProfile = null;
window.senderMap = {};
window.workerMap = {};
window.currentChatRoomId = null;
window.chatSubscription = null;
window.lastSendTime = 0;
window.presenceChannel = null; // 在线状态频道
window.onlineUsersCache = {}; // 在线用户缓存

/* ==========================================
   初始化与认证（完全保留）
   ========================================== */
function init() {
    if (typeof window.supabase === 'undefined') { showFatalError('无法加载系统组件'); return; }
    try {
        window.supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        autoLogin();
    } catch (e) { showFatalError('系统初始化失败：' + e.message); }
}

function showFatalError(msg) { const el = document.getElementById('fatalError'); el.style.display = 'block'; el.textContent = '❌ ' + msg; }
window.showMessage = function(text, isSuccess=false) { const el = document.getElementById('msg'); el.textContent = text; el.style.background = isSuccess ? 'rgba(0,255,136,0.9)' : 'rgba(255,0,85,0.9)'; el.style.display = 'block'; setTimeout(() => el.style.display = 'none', 3000); };
window.toggleLoading = (show) => document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
window.setView = (view) => {
    document.getElementById('auth').style.display = view === 'auth' ? 'block' : 'none';
    document.getElementById('app').style.display = view === 'app' ? 'block' : 'none';
    document.getElementById('footerBar').style.display = view === 'app' ? 'flex' : 'none';
};
window.mapStatus = (status) => ({pending:'待接单',accepted:'已接单',completed:'已完成',cancelled:'已取消'}[status] || '未知');

window.updateUI = function() {
    document.getElementById('userInfo').textContent = `欢迎: ${window.userProfile.nickname}（${window.userProfile.role}）`;
    document.getElementById('footerUser').textContent = window.userProfile.nickname;
    // 关键修改：允许 owner 和 admin 发单
    document.getElementById('orderPanel').style.display = (['owner', 'player', 'admin'].includes(window.userProfile.role)) ? 'block' : 'none';
    document.getElementById('ownerPanel').style.display = window.userProfile.role === 'owner' ? 'block' : 'none';
    if (window.userProfile.role === 'owner') window.loadAuditList();
};

window.autoLogin = async function() {
    const { data: { session } } = await window.supabaseClient.auth.getSession();
    if (!session) { window.setView('auth'); return; }
    let { data: profile } = await window.supabaseClient.from('profiles').select('*').eq('id', session.user.id).maybeSingle();
    if (!profile) {
        const meta = session.user.user_metadata || {};
        const nickname = meta.nickname || session.user.email.split('@')[0];
        let role = meta.role || 'player';
        let status = 'approved';
        if (role === 'owner') { const {data: owners} = await window.supabaseClient.from('profiles').select('id').eq('role', 'owner').eq('status', 'approved'); if(owners?.length > 0) {window.setView('auth'); return;} }
        else if (role === 'admin') status = 'pending';
        const { data: newProfile, error } = await window.supabaseClient.from('profiles').insert({id: session.user.id, email: session.user.email, nickname, role, status}).select().single();
        if (error || !newProfile) { window.setView('auth'); return; }
        profile = newProfile;
    }
    if (profile.status !== 'approved') { window.setView('auth'); return; }
    window.currentUser = session.user;
    window.userProfile = profile;
    window.updateUI();
    window.setView('app');
    window.loadOrders();
    window.initChat();
    window.trackOnlineStatus(); // 启动在线追踪
};

window.handleLogin = async function() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('pass').value.trim();
    if (!email || !password) { window.showMessage('请输入邮箱和密码', false); return; }
    window.toggleLoading(true);
    try {
        const { data, error } = await window.supabaseClient.auth.signInWithPassword({ email, password });
        if (error) { window.showMessage(`登录失败：${error.message}`, false); return; }
        let { data: profile } = await window.supabaseClient.from('profiles').select('*').eq('id', data.user.id).maybeSingle();
        if (!profile) {
            const meta = data.user.user_metadata || {};
            const nickname = meta.nickname || email.split('@')[0];
            let role = meta.role || 'player';
            let status = 'approved';
            if (role === 'owner') { const {data: owners} = await window.supabaseClient.from('profiles').select('id').eq('role', 'owner').eq('status', 'approved'); if(owners?.length > 0) {window.showMessage('店长账号已存在', false); return;} }
            else if (role === 'admin') status = 'pending';
            const { data: newProfile, error: insertErr } = await window.supabaseClient.from('profiles').insert({id: data.user.id, email: data.user.email, nickname, role, status}).select().single();
            if (insertErr) { window.showMessage(`创建资料失败：${insertErr.message}`, false); return; }
            profile = newProfile;
        }
        if (profile.status !== 'approved') { window.showMessage('账号审核中', false); return; }
        window.currentUser = data.user;
        window.userProfile = profile;
        window.updateUI();
        window.setView('app');
        window.loadOrders();
        window.initChat();
        window.trackOnlineStatus();
        window.showMessage(`欢迎 ${profile.nickname}`, true);
        document.getElementById('pass').value = '';
    } catch (e) { window.showMessage(`异常：${e.message}`, false); }
    finally { window.toggleLoading(false); }
};

window.handleRegister = async function() {
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPass').value.trim();
    const nickname = document.getElementById('regName').value.trim();
    const role = document.getElementById('regRole').value;
    if (!email || !password || !nickname) { window.showMessage('请填写完整信息', false); return; }
    if (role === 'owner') { const {data: owners} = await window.supabaseClient.from('profiles').select('id').eq('role', 'owner'); if(owners?.length > 0) {window.showMessage('店长账号已存在', false); return;} }
    window.toggleLoading(true);
    try {
        const { error } = await window.supabaseClient.auth.signUp({ email, password, options: { data: { nickname, role } } });
        if (error) { window.showMessage(`注册失败：${error.message}`, false); return; }
        window.showMessage(role === 'admin' ? '注册成功！请等待店长审核' : '注册成功！请登录', true);
        window.showLogin();
        document.getElementById('email').value = email;
    } catch (e) { window.showMessage(`异常：${e.message}`, false); }
    finally { window.toggleLoading(false); }
};

/* ==========================================
   订单逻辑（修改了接单权限判断）
   ========================================== */
window.loadOrders = async function() {
    if (!window.currentUser || !window.userProfile) return;
    let query = window.supabaseClient.from('orders').select('*').order('created_at', { ascending: false });
    
    // 关键修改：允许 admin 查看所有订单，允许 worker/admin 接单
    if (window.userProfile.role === 'owner' || window.userProfile.role === 'admin') {
        // 店长和管理员看所有
    } else if (window.userProfile.role === 'worker' || window.userProfile.role === 'admin') {
        query = query.or(`worker_id.eq.${window.currentUser.id},and(status.eq.pending)`);
    } else {
        query = query.or(`sender_id.eq.${window.currentUser.id},worker_id.eq.${window.currentUser.id}`);
    }

    const { data: orders, error } = await query;
    if (error) { window.showMessage(`加载订单失败：${error.message}`, false); return; }

    const el = document.getElementById('orderList');
    if (!orders?.length) { el.innerHTML = '<div style="text-align:center;color:#888;padding:20px;">暂无订单</div>'; return; }

    const senderIds = [...new Set(orders.map(o => o.sender_id))];
    const { data: senders } = await window.supabaseClient.from('profiles').select('id,nickname').in('id', senderIds);
    window.senderMap = Object.fromEntries(senders?.map(s => [s.id, s.nickname]) || []);

    const workerIds = [...new Set(orders.map(o => o.worker_id).filter(Boolean))];
    const { data: workers } = await window.supabaseClient.from('profiles').select('id,nickname').in('id', workerIds);
    window.workerMap = Object.fromEntries(workers?.map(w => [w.id, w.nickname]) || []);

    el.innerHTML = orders.map(order => {
        const isOwner = order.sender_id === window.currentUser.id;
        const isWorker = order.worker_id === window.currentUser.id;
        // 关键修改：允许 admin 接单
        const canTake = ['owner','admin','worker'].includes(window.userProfile.role) && order.status === 'pending' && !order.worker_id && !isOwner;
        const canComplete = isWorker && order.status === 'accepted';
        const canDelete = (isOwner && order.status === 'pending') || (isWorker && order.status === 'accepted');
        return `
            <div class="order">
                <div><b>内容:</b> ${order.content}</div>
                <div><b>游戏ID:</b> ${order.game_id}</div>
                <div><b>状态:</b> <span style="color:#00f0ff;">${window.mapStatus(order.status)}</span></div>
                <div><b>发单:</b> ${window.senderMap[order.sender_id] || '未知'}</div>
                <div><b>接单:</b> ${order.worker_id ? (window.workerMap[order.worker_id] || '无') : '无'}</div>
                <button class="order-btn" onclick="window.showOrderDetail('${order.id}')">详情</button>
                ${canTake ? `<button class="order-btn" onclick="window.takeOrder('${order.id}')">接单</button>` : ''}
                ${canComplete ? `<button class="order-btn btn-green" onclick="window.completeOrder('${order.id}')">结单</button>` : ''}
                ${canDelete ? `<button class="order-btn btn-red" onclick="window.deleteOrder('${order.id}')">取消</button>` : ''}
            </div>
        `;
    }).join('');
};

window.createOrder = async function() {
    const content = document.getElementById('orderContent').value.trim();
    const gameId = document.getElementById('orderGameId').value.trim();
    const price = document.getElementById('orderPrice').value.trim();
    if (!content || !gameId || !price) { window.showMessage('请填写完整订单信息', false); return; }
    try {
        await window.supabaseClient.from('orders').insert({ sender_id: window.currentUser.id, content, game_id: gameId, price: parseFloat(price), status: 'pending' });
        window.showMessage('订单发布成功', true);
        document.getElementById('orderContent').value = '';
        document.getElementById('orderGameId').value = '';
        document.getElementById('orderPrice').value = '';
        window.loadOrders();
    } catch (e) { window.showMessage(`发布失败：${e.message}`, false); }
};

window.takeOrder = async function(orderId) {
    if (!window.currentUser?.id) { window.showMessage('登录失效', false); window.handleLogout(); return; }
    try {
        const userId = window.currentUser.id;
        const { data, error } = await window.supabaseClient.from('orders').update({ worker_id: userId, status: 'accepted' }).eq('id', orderId).eq('status', 'pending').is('worker_id', null).select();
        if (error) { window.showMessage(`接单失败：${error.message}`, false); return; }
        if (!data || data.length === 0) { window.showMessage('订单已被接走', false); window.loadOrders(); return; }
        window.showMessage('接单成功！', true);
        window.loadOrders();
    } catch (e) { window.showMessage(`异常：${e.message}`, false); }
};

window.completeOrder = async function(orderId) {
    if (!confirm('确认完成订单？')) return;
    try {
        await window.supabaseClient.from('orders').update({status: 'completed'}).eq('id', orderId).eq('worker_id', window.currentUser.id).eq('status', 'accepted');
        window.showMessage('订单已结单', true);
        window.loadOrders();
        window.closeDetailModal();
    } catch (e) { window.showMessage(`结单失败：${e.message}`, false); }
};

window.deleteOrder = async function(orderId) {
    if (!confirm('确认取消？')) return;
    try {
        await window.supabaseClient.from('orders').delete().eq('id', orderId);
        window.showMessage('订单已取消', true);
        window.loadOrders();
        window.closeDetailModal();
    } catch (e) { window.showMessage(`取消失败：${e.message}`, false); }
};

window.showOrderDetail = async function(orderId) {
    const { data: order } = await window.supabaseClient.from('orders').select('*').eq('id', orderId).single();
    const isOwner = order.sender_id === window.currentUser.id;
    const isWorker = order.worker_id === window.currentUser.id;
    const canDelete = (isOwner && order.status === 'pending') || (isWorker && order.status === 'accepted');
    document.getElementById('detailContent').innerHTML = `<div><b>内容:</b> ${order.content}</div><div><b>游戏ID:</b> ${order.game_id}</div><div><b>价格:</b> ¥${order.price}</div><div><b>状态:</b> ${window.mapStatus(order.status)}</div><div><b>发单:</b> ${window.senderMap?.[order.sender_id]||'未知'}</div><div><b>接单:</b> ${order.worker_id?(window.workerMap?.[order.worker_id]||'无'):'无'}</div>${canDelete?'<button class="order-btn btn-red" onclick="window.deleteOrder(\''+order.id+'\')">取消</button>':''}`;
    document.getElementById('detailModal').style.display = 'block';
};

window.closeDetailModal = () => document.getElementById('detailModal').style.display = 'none';
window.loadAuditList = async function() {
    if (window.userProfile.role !== 'owner') return;
    const { data: admins } = await window.supabaseClient.from('profiles').select('*').eq('role', 'admin').eq('status', 'pending');
    const el = document.getElementById('auditList');
    if (!admins?.length) { el.innerHTML = '<div style="color:#888;">暂无待审核</div>'; return; }
    el.innerHTML = admins.map(admin => `<div class="order"><div><b>${admin.nickname}</b> (${admin.email})</div><div style="font-size:12px;color:#888;">${new Date(admin.created_at).toLocaleString()}</div><button class="order-btn btn-purple" onclick="window.approveAdmin('${admin.id}')">批准</button></div>`).join('');
};
window.approveAdmin = async function(adminId) { if(!confirm('批准？')) return; await window.supabaseClient.from('profiles').update({status:'approved'}).eq('id', adminId); window.showMessage('批准成功', true); window.loadAuditList(); };
window.handleLogout = async function() { 
    if(window.presenceChannel) window.supabaseClient.removeChannel(window.presenceChannel);
    if(window.chatSubscription) window.supabaseClient.removeChannel(window.chatSubscription);
    await window.supabaseClient.auth.signOut(); 
    window.currentUser = null; window.userProfile = null; window.currentChatRoomId = null; 
    window.setView('auth'); window.showMessage('已退出', true); 
};
window.showReg = () => document.getElementById('regBox').style.display = 'block';
window.showLogin = () => document.getElementById('regBox').style.display = 'none';

/* ==========================================
   聊天与在线状态（新增/修改）
   ========================================== */
window.trackOnlineStatus = async function() {
    window.presenceChannel = window.supabaseClient.channel('online-users');
    
    window.presenceChannel.on('presence', { event: 'sync' }, () => {
        const state = window.presenceChannel.presenceState();
        window.onlineUsersCache = {};
        Object.keys(state).forEach(key => {
            const user = state[key][0];
            if(user) window.onlineUsersCache[user.id] = user;
        });
        window.renderOnlineList();
    }).on('presence', { event: 'join' }, ({ key, newPresences }) => {
        newPresences.forEach(p => window.onlineUsersCache[p.id] = p);
        window.renderOnlineList();
    }).on('presence', { event: 'leave' }, ({ key, leftPresences }) => {
        leftPresences.forEach(p => delete window.onlineUsersCache[p.id]);
        window.renderOnlineList();
    }).subscribe(async (status) => {
        if (status === 'SUBSCRIBED') {
            await window.presenceChannel.track({
                id: window.currentUser.id,
                nickname: window.userProfile.nickname,
                role: window.userProfile.role,
                online_at: new Date().toISOString(),
            });
        }
    });
};

window.renderOnlineList = function() {
    const container = document.getElementById('onlineUsers');
    const countEl = document.getElementById('onlineCount');
    const users = Object.values(window.onlineUsersCache);
    countEl.textContent = users.length;
    
    container.innerHTML = users.map(user => {
        const roleColor = {owner: '#ff00ff', admin: '#ff69b4', worker: '#00f0ff', player: '#00ff88'}[user.role] || '#888';
        return `
            <div class="online-user-item" onclick="window.openPrivateChat('${user.id}', '${user.nickname}', '${user.role}')">
                <div class="status-dot online"></div>
                <div class="username-text">${user.nickname}</div>
                <span class="role-tag ${user.role}" style="background:${roleColor}">${user.role}</span>
            </div>
        `;
    }).join('');
};

// 打开私聊
window.openPrivateChat = async function(targetUserId, targetNickname, targetRole) {
    if (targetUserId === window.currentUser.id) return;
    
    // 查找是否已存在私聊房间
    const { data: rooms } = await window.supabaseClient.from('chat_rooms')
        .select('id')
        .eq('room_type', 'private')
        .contains('participants', [window.currentUser.id, targetUserId])
        .limit(1);
    
    let roomId;
    if (rooms && rooms.length > 0) {
        roomId = rooms[0].id;
    } else {
        // 创建新私聊房间
        const { data: newRoom, error } = await window.supabaseClient.from('chat_rooms').insert({
            room_type: 'private',
            participants: [window.currentUser.id, targetUserId]
        }).select().single();
        if (error) { window.showMessage('创建私聊失败', false); return; }
        roomId = newRoom.id;
    }
    
    // 切换聊天室
    window.currentChatRoomId = roomId;
    document.getElementById('chatTitle').textContent = `私聊: ${targetNickname}`;
    document.getElementById('backToPublic').style.display = 'block';
    document.getElementById('chatWindow').style.display = 'flex';
    await window.loadLatestChatMessages();
};

// 返回公聊
window.openPublicChat = async function() {
    const { data: room } = await window.supabaseClient.from('chat_rooms').select('id').eq('room_type', 'public').single();
    window.currentChatRoomId = room.id;
    document.getElementById('chatTitle').textContent = '公共聊天室';
    document.getElementById('backToPublic').style.display = 'none';
    await window.loadLatestChatMessages();
};

// 初始化聊天（修改：支持私聊消息加载）
window.initChat = async function() {
    if (!window.currentUser || !window.userProfile) return;
    try {
        // 获取公共房间
        let { data: room } = await window.supabaseClient.from('chat_rooms').select('id').eq('room_type', 'public').single();
        if (!room) {
            const { data: newRoom } = await window.supabaseClient.from('chat_rooms').insert({ room_type: 'public' }).select().single();
            room = newRoom;
        }
        window.currentChatRoomId = room.id;
        await window.loadLatestChatMessages();

        // 订阅消息
        window.chatSubscription = window.supabaseClient.channel(`chat_room:${room.id}`)
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'chat_messages', filter: `room_id=eq.${room.id}` }, (payload) => {
                window.appendChatMessage(payload.new);
            }).subscribe();
    } catch (e) { console.error('聊天初始化失败:', e); }
};

window.loadLatestChatMessages = async function() {
    if (!window.currentChatRoomId) return;
    const { data: messages } = await window.supabaseClient.from('chat_messages')
        .select('*, sender:sender_id(nickname, role)')
        .eq('room_id', window.currentChatRoomId)
        .eq('is_deleted', false)
        .order('created_at', { ascending: false })
        .limit(50);
    
    const chatMessagesEl = document.getElementById('chatMessages');
    chatMessagesEl.innerHTML = '';
    messages?.reverse().forEach(msg => window.appendChatMessage(msg));
    chatMessagesEl.scrollTop = chatMessagesEl.scrollHeight;
};

window.appendChatMessage = function(msg) {
    const chatMessagesEl = document.getElementById('chatMessages');
    const isSelf = msg.sender_id === window.currentUser?.id;
    const role = msg.sender?.role || 'player';
    const nickname = msg.sender?.nickname || '未知';
    const time = new Date(msg.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    
    const msgEl = document.createElement('div');
    msgEl.className = `chat-msg ${role} ${isSelf ? 'self' : 'other'}`;
    msgEl.innerHTML = `<div class="chat-nickname">${nickname}</div><div class="chat-content">${msg.content.replace(/</g,'&lt;')}</div><div class="chat-time">${time}</div>`;
    chatMessagesEl.appendChild(msgEl);
    chatMessagesEl.scrollTop = chatMessagesEl.scrollHeight;
};

window.sendChatMessage = async function() {
    const inputEl = document.getElementById('chatInput');
    const content = inputEl.value.trim();
    if (!content) return;
    if (Date.now() - window.lastSendTime < 5000) { window.showMessage('5秒后再发', false); return; }
    window.lastSendTime = Date.now();
    try {
        await window.supabaseClient.from('chat_messages').insert({ room_id: window.currentChatRoomId, sender_id: window.currentUser.id, content });
        inputEl.value = '';
        // 私聊不需要手动刷新，Realtime会推送
        if(document.getElementById('chatTitle').textContent === '公共聊天室'){
            await window.loadLatestChatMessages();
        }
    } catch (e) { window.showMessage(`发送失败：${e.message}`, false); window.lastSendTime = 0; }
};

// 切换聊天窗口显示/隐藏
window.toggleChat = function() {
    const chatWindow = document.getElementById('chatWindow');
    const onlinePanel = document.getElementById('onlineListPanel');
    const isChatVisible = chatWindow.style.display === 'flex';
    
    chatWindow.style.display = isChatVisible ? 'none' : 'flex';
    onlinePanel.style.display = isChatVisible ? 'none' : 'flex'; // 同时显示/隐藏在线列表
    
    if (!isChatVisible) {
        document.getElementById('chatInput').focus();
        window.loadLatestChatMessages();
    }
};

init();
</script>
