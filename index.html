<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>调试版-派单系统</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f0f0; }
        .box { background: white; padding: 20px; border-radius: 10px; margin-bottom: 15px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 100%; padding: 15px; border: none; border-radius: 5px; color: white; font-size: 16px; }
        .purple { background: #7232dd; }
        .green { background: #07c160; }
    </style>
</head>
<body>

<div class="box">
    <h3>注册/登录</h3>
    <input id="e" placeholder="邮箱">
    <input id="p" type="password" placeholder="密码">
    <input id="n" placeholder="昵称">
    <select id="r">
        <option value="player">玩家</option>
        <option value="worker">打手</option>
        <option value="manager">经理</option>
        <option value="admin">管理员</option>
        <option value="boss">店长</option>
    </select>
    <button class="purple" onclick="reg()">注册账号</button>
    <button class="green" onclick="log()">登录账号</button>
</div>

<div class="box">
    <h3>状态</h3>
    <div id="s">等待操作...</div>
</div>

<script>
// 👇 这里填你自己的 Supabase 信息
const url = 'YOUR_SUPABASE_URL';
const key = 'YOUR_SUPABASE_ANON_KEY';

// 注册函数（带强制弹窗）
function reg() {
    var email = document.getElementById('e').value;
    var pwd = document.getElementById('p').value;
    var nick = document.getElementById('n').value;
    var role = document.getElementById('r').value;
    
    if(!email || !pwd || !nick) {
        alert('请填写邮箱、密码和昵称！');
        return;
    }

    document.getElementById('s').innerText = '正在发送注册请求...';
    
    // 使用最简单的 fetch API，兼容性最好
    fetch(url + '/auth/v1/signup', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'apikey': key,
            'Authorization': 'Bearer ' + key
        },
        body: JSON.stringify({
            email: email,
            password: pwd,
            data: { nickname: nick, role: role }
        })
    })
    .then(function(response) {
        // 先弹状态码，看服务器回了什么
        alert('服务器状态码: ' + response.status);
        return response.json();
    })
    .then(function(data) {
        // 再弹服务器返回的具体内容
        alert('服务器返回数据: ' + JSON.stringify(data));
        if (data.id || data.user_id) {
            document.getElementById('s').innerText = '注册成功！';
        } else {
            document.getElementById('s').innerText = '注册失败！';
        }
    })
    .catch(function(error) {
        // 如果网络断了或者代码错了，这里会弹
        alert('发生错误: ' + error.message);
        document.getElementById('s').innerText = '请求出错';
    });
}

// 登录函数（备用）
function log() {
    var email = document.getElementById('e').value;
    var pwd = document.getElementById('p').value;
    fetch(url + '/auth/v1/token?grant_type=password', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'apikey': key,
            'Authorization': 'Bearer ' + key
        },
        body: JSON.stringify({ email: email, password: pwd })
    })
    .then(function(r) { return r.json(); })
    .then(function(d) { alert('登录返回: ' + JSON.stringify(d)); });
}
</script>
</body>
</html>
