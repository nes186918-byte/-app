<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电竞派单系统</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vant@4/lib/index.css" />
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vant@4/lib/vant.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f7f8fa; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto; min-height: 100vh; }
        .header { background: #242933; color: #fff; padding: 16px; text-align: center; font-size: 18px; font-weight: 600; }
        .container { max-width: 500px; margin: 0 auto; padding: 15px; }
        .card { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .form-item { margin-bottom: 12px; }
        .van-field { background: #f7f8fa !important; border-radius: 8px !important; }
        .btn { width: 100%; height: 44px; border-radius: 8px; font-size: 16px; border: none; margin-bottom: 10px; }
        .btn-purple { background: #7232dd; color: #fff; }
        .btn-green { background: #07c160; color: #fff; }
        .btn-red { background: #ee0a24; color: #fff; }
        .status-box { background: #eaf5ff; padding: 15px; border-radius: 8px; font-size: 14px; line-height: 1.6; }
        .status-row { display: flex; justify-content: space-between; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div id="app">
        <div class="header">卡了电竞派单系统</div>
        <div class="container">
            <div class="card" v-if="!isLogin">
                <div style="font-size: 18px; font-weight: 600; margin-bottom: 15px;">账号登录/注册</div>
                <div class="form-item"><van-field v-model="email" label="邮箱" placeholder="请输入邮箱" type="email" /></div>
                <div class="form-item"><van-field v-model="password" label="密码" placeholder="请输入密码" type="password" /></div>
                <div class="form-item"><van-field v-model="nickname" label="昵称" placeholder="注册必填" /></div>
                <div class="form-item"><van-field v-model="roleText" label="角色" readonly clickable placeholder="点击选择角色" @click="showRoleSheet = true" /></div>
                <button class="btn btn-purple" @click="doRegister">注册账号</button>
                <button class="btn btn-green" @click="doLogin">登录账号</button>
            </div>
            <div class="card" v-else>
                <div style="font-size: 18px; font-weight: 600; margin-bottom: 15px;">欢迎回来</div>
                <div class="status-box">
                    <div class="status-row"><span>昵称：</span><span>{{ profile.nickname }}</span></div>
                    <div class="status-row"><span>角色：</span><span>{{ roleMap[profile.role] || profile.role }}</span></div>
                    <div class="status-row"><span>用户ID：</span><span>{{ userId }}</span></div>
                </div>
                <button class="btn btn-red" @click="doLogout">退出登录</button>
            </div>
            <div class="card">
                <div style="font-size: 18px; font-weight: 600; margin-bottom: 15px;">系统状态</div>
                <div class="status-box">
                    <div class="status-row"><span>运行状态：</span><span>{{ runStatus }}</span></div>
                    <div class="status-row"><span>接口状态：</span><span>{{ apiStatus }}</span></div>
                </div>
                <button class="btn btn-purple" @click="retryInit">重试初始化</button>
            </div>
        </div>
        <van-action-sheet v-model:show="showRoleSheet" :actions="roleList" cancel-text="取消" @select="onRoleSelect" />
    </div>

    <script>
        // ==========================================================
        // 配置区（已替换为安全的 anon public 密钥）
        // ==========================================================
        const SUPABASE_URL = 'https://qyprklqzadevrybumwot.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF5cHJrbHF6YWRldnJ5YnVtd290Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwMTAwNTksImV4cCI6MjA5OTU4NjA1OX0.AlAXca1CC9a6FCHOvg2Qf7iqnvA9l4TMUPMl6PqZ7lg';

        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const vant = Vant;
        const roleMap = {'player':'玩家','worker':'打手','manager':'经理','admin':'管理员','boss':'店长'};

        Vue.createApp({
            data() {
                return {
                    email: '', password: '12345678', nickname: '', role: 'player', roleText: '玩家', showRoleSheet: false,
                    profile: null, userId: '', isLogin: false, runStatus: '运行中', apiStatus: '等待操作',
                    roleList: [{name:'玩家',value:'player'},{name:'打手',value:'worker'},{name:'经理',value:'manager'},{name:'管理员',value:'admin'},{name:'店长',value:'boss'}]
                };
            },
            methods: {
                onRoleSelect(item) { this.role = item.value; this.roleText = item.name; this.showRoleSheet = false; },
                async doRegister() {
                    if (!this.email || !this.password || !this.nickname) return vant.showToast('请填写完整信息');
                    this.apiStatus = '注册中...';
                    const { error } = await sb.auth.signUp({ email: this.email, password: this.password, options: { data: { nickname: this.nickname, role: this.role }, emailRedirectTo: null } });
                    if (error) { vant.showToast('注册失败：' + error.message); this.apiStatus = '失败'; }
                    else { vant.showToast('注册成功，请登录'); this.apiStatus = '成功'; this.password = ''; }
                },
                async doLogin() {
                    if (!this.email || !this.password) return vant.showToast('请填写账号密码');
                    this.apiStatus = '登录中...';
                    const { data, error } = await sb.auth.signInWithPassword({ email: this.email, password: this.password });
                    if (error) { vant.showToast('登录失败：' + error.message); this.apiStatus = '失败'; }
                    else {
                        this.userId = data.user.id;
                        localStorage.setItem('sb_token', data.session.access_token);
                        localStorage.setItem('sb_uid', data.user.id);
                        const { data: p } = await sb.from('profiles').select('*').eq('id', data.user.id).single();
                        this.profile = p || { nickname: data.user.user_metadata.nickname, role: data.user.user_metadata.role };
                        this.isLogin = true;
                        this.apiStatus = '成功';
                    }
                },
                async doLogout() { await sb.auth.signOut(); localStorage.clear(); this.profile = null; this.isLogin = false; this.apiStatus = '已退出'; vant.showToast('已退出'); },
                retryInit() { location.reload(); }
            },
            mounted() {
                const token = localStorage.getItem('sb_token');
                const uid = localStorage.getItem('sb_uid');
                if (token && uid) {
                    this.userId = uid;
                    sb.from('profiles').select('*').eq('id', uid).single().then(({data}) => { this.profile = data; this.isLogin = true; this.apiStatus = '自动登录成功'; });
                } else { this.apiStatus = '等待操作'; }
            }
        }).use(vant).mount('#app');
    </script>
</body>
</html>
