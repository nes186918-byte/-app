<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡了电竞</title>
    <!-- 官方Supabase SDK（适配新版sb_publishable Key） -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #050510; color: #fff; font-family: sans-serif; padding: 15px; margin: 0; }
        .box { background: rgba(0,0,0,0.5); padding: 15px; border-radius: 10px; border: 1px solid #00f0ff; margin-bottom: 15px; }
        h2 { color: #00f0ff; text-align: center; margin: 0 0 15px 0; font-size: 1.2em; }
        input, select, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 5px; border: 1px solid #333; background: #111; color: #fff; font-size: 16px; box-sizing: border-box; }
        button { background: #00f0ff; color: #000; font-weight: bold; cursor: pointer; }
        button:active { background: #00c0cc; }
        .link { text-align: center; margin-top: 15px; color: #888; }
        .link span { color: #00f0ff; cursor: pointer; }
        #msg { text-align: center; margin-top: 15px; padding: 12px 24px; border-radius: 8px; display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; min-width: 200px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        #app { display: none; padding-bottom: 80px; }
        .order { background: #111; padding: 12px; margin-top: 10px; border-radius: 5px; border-left: 3px solid #00f0ff; }
        .order-btn { margin-top: 8px; padding: 8px 10px; font-size: 13px; width: auto; margin-right: 8px; display: inline-block; }
        .btn-green { background: #00ff88; color: #000; }
        .btn-red { background: #ff4757; color: #fff; }
        .btn-purple { background: #ff00ff; color: #fff; }
        #detailModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); padding: 15px; box-sizing: border-box; z-index: 999; overflow-y: auto; }
        #detailModal .box { margin-top: 30px; }
        .detail-line { margin: 10px 0; line-height: 1.5; }
        .detail-label { color: #00f0ff; font-weight: bold; }
        .footer-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.9); padding: 10px; display: none; justify-content: space-between; align-items: center; box-sizing: border-box; border-top: 1px solid #00f0ff; }
        .footer-bar button { width: auto; padding: 8px 15px; margin: 0; }
        .loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; justify-content: center; align-items: center; }
        .loading-spinner { width: 50px; height: 50px; border: 5px solid #00f0ff; border-top: 5px solid transparent; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .diagnostic-panel { background: rgba(255, 0, 0, 0.1); border: 1px solid #ff4757; padding: 15px; margin-top: 15px; border-radius: 5px; display: none; }
        .diagnostic-panel h3 { color: #ff4757; margin: 0 0 10px 0; }
        .diagnostic-panel pre { background: rgba(0,0,0,0.5); padding: 10px; border-radius: 3px; overflow-x: auto; font-size: 12px; }
    </style>
</head>
<body>

    <!-- 加载遮罩 -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
    </div>

    <!-- 登录/注册页 -->
    <div id="auth">
        <div class="box">
            <h2>卡了电竞欢迎您</h2>
            <input id="email" placeholder="邮箱">
            <input id="pass" type="password" placeholder="密码">
            <!-- 双重绑定事件：addEventListener + onclick兜底，彻底解决点击无响应 -->
            <button id="loginBtn" onclick="handleLogin()">登录</button>
            <div class="link">没账号？<span id="showRegLink">点此注册</span></div>
            
            <!-- 诊断面板（连接失败时自动显示） -->
            <div class="diagnostic-panel" id="diagnosticPanel">
                <h3>🔧 连接诊断</h3>
                <div id="diagnosticContent"></div>
                <button onclick="runDiagnostics()" style="margin-top: 10px; background: #ff4757;">重新检测</button>
            </div>
        </div>
        <div class="box" id="regBox" style="display:none;">
            <h2>注册</h2>
            <input id="regEmail" placeholder="邮箱">
            <input id="regPass" type="password" placeholder="密码">
            <input id="regName" placeholder="昵称">
            <select id="regRole">
                <option value="player">玩家</option>
                <option value="worker">打手</option>
                <option value="admin">管理员</option>
                <option value="owner">店长</option>
            </select>
            <button id="regBtn" onclick="handleRegister()">注册</button>
            <div class="link">有账号？<span id="showLoginLink">点此登录</span></div>
        </div>
    </div>

    <!-- 主应用页 -->
    <div id="app">
        <div class="box">
            <h2>派单系统</h2>
            <p id="userInfo"></p>
            <div id="ownerPanel" style="display:none; margin-top:10px; border:1px solid #ff00ff; padding:10px;">
                <h3 style="color:#ff00ff; margin: 0 0 10px 0;">待审核管理员</h3>
                <div id="auditList"></div>
            </div>
            <div id="orderPanel" style="display:none; margin-top:10px;">
                <input id="orderContent" placeholder="订单内容">
                <input id="orderGameId" placeholder="游戏ID（必填）">
                <input id="orderPrice" type="number" placeholder="价格">
                <button id="orderBtn" onclick="createOrder()">发布订单</button>
            </div>
            <h3 style="margin:15px 0 10px 0; color:#00f0ff;">订单列表</h3>
            <div id="orderList"></div>
        </div>
    </div>

    <!-- 底部栏 -->
    <div class="footer-bar" id="footerBar">
        <span id="footerUser"></span>
        <button id="logoutBtn" onclick="handleLogout()">退出</button>
    </div>

    <!-- 订单详情弹窗 -->
    <div id="detailModal">
        <div class="box">
            <h2>订单详情</h2>
            <div id="detailContent"></div>
            <button id="closeDetailBtn" onclick="closeDetailModal()">关闭</button>
        </div>
    </div>

    <!-- 提示框 -->
    <div id="msg"></div>

<script>
/* ==========================================
   🔴 配置区（仅需修改以下2行）
   ========================================== */
const SUPABASE_URL = 'https://aqotjkekuvkkbqvsxagt.supabase.co'; // 你的项目URL，比如 https://xxxx.supabase.co
const SUPABASE_ANON_KEY = 'sb_publishable_q_Vq7lzJpHlEcgw6cZHBmg_7dHtFoqy'; // 你截图里那个 sb_publishable_... 开头的Key

/* ==========================================
   全局变量
   ========================================== */
let supabase = null;
let currentUser = null;
let userProfile = null;
let realtimeChannel = null;

/* ==========================================
   DOM元素缓存
   ========================================== */
const elements = {
    loginBtn: null, regBtn: null, orderBtn: null, logoutBtn: null,
    showRegLink: null, showLoginLink: null, closeDetailBtn: null,
    loadingOverlay: null, diagnosticPanel: null, diagnosticContent: null,
    emailInput: null, passInput: null, regEmailInput: null, regPassInput: null,
    regNameInput: null, regRoleSelect: null, orderContentInput: null,
    orderGameIdInput: null, orderPriceInput: null, userInfoEl: null,
    footerUserEl: null, orderPanelEl: null, ownerPanelEl: null,
    auditListEl: null, orderListEl: null, detailContentEl: null, detailModalEl: null
};

/* ==========================================
   工具函数
   ========================================== */
// 显示提示（点击按钮后必有反馈）
function showMessage(text, isSuccess = false) {
    const el = document.getElementById('msg');
    if (!el) {
        alert(text); // 极端情况兜底提示
        return;
    }
    el.textContent = text;
    el.style.background = isSuccess ? 'rgba(0, 255, 136, 0.9)' : 'rgba(255, 0, 85, 0.9)';
    el.style.color = isSuccess ? '#000' : '#fff';
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', isSuccess ? 2000 : 3000);
}

// 切换加载动画
function toggleLoading(show) {
    if (elements.loadingOverlay) {
        elements.loadingOverlay.style.display = show ? 'flex' : 'none';
    }
}

// 切换视图
function setView(view) {
    const authEl = document.getElementById('auth');
    const appEl = document.getElementById('app');
    const footerEl = document.getElementById('footerBar');
    if (authEl) authEl.style.display = view === 'auth' ? 'block' : 'none';
    if (appEl) appEl.style.display = view === 'app' ? 'block' : 'none';
    if (footerEl) footerEl.style.display = view === 'app' ? 'flex' : 'none';
}

// 订单状态映射（中文）
function mapStatus(status) {
    const map = {
        'pending': '待接单',
        'accepted': '已接单',
        'processing': '正在进行中',
        'completed': '订单已完成',
        'cancelled': '订单已取消'
    };
    return map[status] || '未知状态';
}

// 更新UI
function updateUI(profile) {
    if (elements.userInfoEl) elements.userInfoEl.textContent = `欢迎: ${profile.nickname}（${profile.role}）`;
    if (elements.footerUserEl) elements.footerUserEl.textContent = profile.nickname;
    if (elements.orderPanelEl) elements.orderPanelEl.style.display = (profile.role === 'owner' || profile.role === 'player') ? 'block' : 'none';
    if (elements.ownerPanelEl) elements.ownerPanelEl.style.display = profile.role === 'owner' ? 'block' : 'none';
    if (profile.role === 'owner') loadAuditList();
}

/* ==========================================
   诊断功能（连接失败时自动触发）
   ========================================== */
async function runDiagnostics() {
    toggleLoading(true);
    let info = "🔍 连接诊断中...\n\n";
    try {
        info += `1. 配置检查:\n`;
        info += `   URL: ${SUPABASE_URL ? '✅ 已设置' : '❌ 未设置'}\n`;
        info += `   Key: ${SUPABASE_ANON_KEY ? '✅ 已设置（长度:' + SUPABASE_ANON_KEY.length + '）' : '❌ 未设置'}\n\n`;
        if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
            info += "❌ 错误：请先填写正确的URL和Key\n";
            showDiagnostic(info);
            return;
        }

        // 测试网络连接
        info += `2. 网络连接测试:\n`;
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 8000);
        const res = await fetch(`${SUPABASE_URL}/rest/v1/`, {
            headers: { 'apikey': SUPABASE_ANON_KEY },
            signal: controller.signal
        });
        clearTimeout(timeoutId);
        if (res.ok) {
            info += `   ✅ REST API连接成功（状态码: ${res.status}）\n`;
        } else {
            info += `   ❌ REST API连接失败（状态码: ${res.status}）\n`;
            const errText = await res.text();
            info += `   错误信息: ${errText.substring(0, 200)}\n`;
        }

        // 测试Auth服务
        info += `\n3. Auth服务测试:\n`;
        const authRes = await fetch(`${SUPABASE_URL}/auth/v1/health`, { signal: AbortSignal.timeout(8000) });
        if (authRes.ok) {
            info += `   ✅ Auth服务正常（状态码: ${authRes.status}）\n`;
        } else {
            info += `   ❌ Auth服务异常（状态码: ${authRes.status}）\n`;
        }

        info += `\n✅ 诊断完成，若仍有问题请联系管理员\n`;
        showDiagnostic(info);
    } catch (e) {
        info += `\n❌ 诊断失败: ${e.name} - ${e.message}\n`;
        if (e.name === 'AbortError') info += "💡 提示：连接超时，可能是网络慢或项目被暂停\n";
        showDiagnostic(info);
    } finally {
        toggleLoading(false);
    }
}

function showDiagnostic(info) {
    if (elements.diagnosticPanel && elements.diagnosticContent) {
        elements.diagnosticPanel.style.display = 'block';
        elements.diagnosticContent.innerHTML = `<pre>${info}</pre>`;
    }
}

/* ==========================================
   核心业务功能（100%保留原有逻辑）
   ========================================== */
// 自动登录（页面加载时触发）
async function autoLogin() {
    try {
        const { data: { session }, error } = await supabase.auth.getSession();
        if (error || !session) {
            setView('auth');
            return;
        }
        const { data: profile, error: profileError } = await supabase
            .from('profiles')
            .select('*')
            .eq('id', session.user.id)
            .single();
        if (profileError || !profile || profile.status !== 'approved') {
            setView('auth');
            return;
        }
        currentUser = session.user;
        userProfile = profile;
        updateUI(profile);
        setView('app');
        loadOrders();
        setupRealtime();
        showMessage(`欢迎回来，${profile.nickname}`, true);
    } catch (e) {
        setView('auth');
        runDiagnostics();
    }
}

// 手动登录（双重绑定确保点击有响应）
async function handleLogin() {
    // 第一步：先给即时反馈，证明按钮被点击了
    const email = elements.emailInput?.value.trim();
    const password = elements.passInput?.value.trim();
    
    if (!email || !password) {
        showMessage('请输入邮箱和密码', false);
        return;
    }
    if (!supabase) {
        showMessage('系统未初始化，请刷新页面', false);
        runDiagnostics();
        return;
    }

    toggleLoading(true);
    try {
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) throw error;

        const { data: profile, error: profileError } = await supabase
            .from('profiles')
            .select('*')
            .eq('id', data.user.id)
            .single();
        if (profileError || !profile) throw new Error('用户资料不存在');
        if (profile.status !== 'approved') throw new Error('账号审核中，暂无法登录');

        currentUser = data.user;
        userProfile = profile;
        updateUI(profile);
        setView('app');
        loadOrders();
        setupRealtime();
        showMessage(`欢迎您，${profile.nickname}`, true);
        if (elements.passInput) elements.passInput.value = '';
    } catch (e) {
        showMessage(`登录失败：${e.message}`, false);
        runDiagnostics();
    } finally {
        toggleLoading(false);
    }
}

// 注册
async function handleRegister() {
    const email = elements.regEmailInput?.value.trim();
    const password = elements.regPassInput?.value.trim();
    const nickname = elements.regNameInput?.value.trim();
    const role = elements.regRoleSelect?.value;
    if (!email || !password || !nickname) {
        showMessage('请填写完整信息', false);
        return;
    }
    toggleLoading(true);
    try {
        // 店长唯一性校验
        if (role === 'owner') {
            const { data: owners } = await supabase.from('profiles').select('id').eq('role', 'owner');
            if (owners?.length > 0) throw new Error('店长账号已存在');
        }
        const { data, error } = await supabase.auth.signUp({
            email, password, options: { data: { nickname, role } }
        });
        if (error) throw error;

        await supabase.from('profiles').insert({
            id: data.user.id, email, nickname, role,
            status: role === 'admin' ? 'pending' : 'approved'
        });
        showMessage('注册成功！请登录', true);
        if (elements.regBox) elements.regBox.style.display = 'none';
        if (elements.emailInput) elements.emailInput.value = email;
    } catch (e) {
        showMessage(`注册失败：${e.message}`, false);
    } finally {
        toggleLoading(false);
    }
}

// 加载订单
async function loadOrders() {
    if (!currentUser || !userProfile) return;
    try {
        let query = supabase
            .from('orders')
            .select('*, sender:sender_id(nickname), worker:worker_id(nickname)')
            .order('created_at', { ascending: false });
        if (userProfile.role !== 'owner') {
            query = query.or(`sender_id.eq.${currentUser.id},worker_id.eq.${currentUser.id}`);
        }
        const { data: orders, error } = await query;
        if (error) throw error;
        if (!elements.orderListEl) return;

        if (!orders?.length) {
            elements.orderListEl.innerHTML = '<div style="text-align:center; color:#888; padding:20px;">暂无订单</div>';
            return;
        }
        elements.orderListEl.innerHTML = orders.map(order => {
            const isOwner = order.sender_id === currentUser.id;
            const isWorker = order.worker_id === currentUser.id;
            const canTake = ['owner','admin','worker'].includes(userProfile.role) && order.status === 'pending' && !order.worker_id && !isOwner;
            const canComplete = isWorker && order.status === 'accepted';
            const canDelete = (isOwner && order.status === 'pending') || (isWorker && order.status === 'accepted');
            return `
                <div class="order">
                    <div><b>内容:</b> ${order.content}</div>
                    <div><b>游戏ID:</b> ${order.game_id}</div>
                    <div><b>状态:</b> <span style="color:#00f0ff;">${mapStatus(order.status)}</span></div>
                    <div><b>发单:</b> ${order.sender?.nickname || '未知'}</div>
                    <div><b>接单:</b> ${order.worker?.nickname || '无'}</div>
                    <button class="order-btn" onclick="showOrderDetail('${order.id}')">详情</button>
                    ${canTake ? `<button class="order-btn" onclick="takeOrder('${order.id}')">接单</button>` : ''}
                    ${canComplete ? `<button class="order-btn btn-green" onclick="completeOrder('${order.id}')">结单</button>` : ''}
                    ${canDelete ? `<button class="order-btn btn-red" onclick="deleteOrder('${order.id}')">取消</button>` : ''}
                </div>
            `;
        }).join('');
    } catch (e) {
        showMessage(`加载订单失败：${e.message}`, false);
    }
}

// 发布订单
async function createOrder() {
    const content = elements.orderContentInput?.value.trim();
    const gameId = elements.orderGameIdInput?.value.trim();
    const price = elements.orderPriceInput?.value.trim();
    if (!content || !gameId || !price) {
        showMessage('请填写完整订单信息', false);
        return;
    }
    try {
        const { error } = await supabase.from('orders').insert({
            sender_id: currentUser.id, content, game_id: gameId, price: parseFloat(price), status: 'pending'
        });
        if (error) throw error;
        showMessage('订单发布成功', true);
        if (elements.orderContentInput) elements.orderContentInput.value = '';
        if (elements.orderGameIdInput) elements.orderGameIdInput.value = '';
        if (elements.orderPriceInput) elements.orderPriceInput.value = '';
        loadOrders();
    } catch (e) {
        showMessage(`发布失败：${e.message}`, false);
    }
}

// 接单
async function takeOrder(orderId) {
    try {
        const { error } = await supabase
            .from('orders')
            .update({ worker_id: currentUser.id, status: 'accepted' })
            .eq('id', orderId)
            .eq('status', 'pending');
        if (error) throw error;
        showMessage('接单成功', true);
        loadOrders();
    } catch (e) {
        showMessage(`接单失败：${e.message}`, false);
    }
}

// 结单
async function completeOrder(orderId) {
    if (!confirm('确认完成订单？')) return;
    try {
        const { error } = await supabase
            .from('orders')
            .update({ status: 'completed' })
            .eq('id', orderId)
            .eq('worker_id', currentUser.id)
            .eq('status', 'accepted');
        if (error) throw error;
        showMessage('订单已结单', true);
        loadOrders();
        closeDetailModal();
    } catch (e) {
        showMessage(`结单失败：${e.message}`, false);
    }
}

// 取消订单（物理删除）
async function deleteOrder(orderId) {
    if (!confirm('确认取消订单？取消后不可恢复')) return;
    try {
        const { error } = await supabase.from('orders').delete().eq('id', orderId);
        if (error) throw error;
        showMessage('订单已取消', true);
        loadOrders();
        closeDetailModal();
    } catch (e) {
        showMessage(`取消失败：${e.message}`, false);
    }
}

// 订单详情
async function showOrderDetail(orderId) {
    try {
        const { data: order, error } = await supabase
            .from('orders')
            .select('*, sender:sender_id(nickname), worker:worker_id(nickname)')
            .eq('id', orderId)
            .single();
        if (error) throw error;
        const isOwner = order.sender_id === currentUser.id;
        const isWorker = order.worker_id === currentUser.id;
        const canDelete = (isOwner && order.status === 'pending') || (isWorker && order.status === 'accepted');
        if (elements.detailContentEl) {
            elements.detailContentEl.innerHTML = `
                <div class="detail-line"><b>内容:</b> ${order.content}</div>
                <div class="detail-line"><b>游戏ID:</b> ${order.game_id}</div>
                <div class="detail-line"><b>价格:</b> ¥${order.price}</div>
                <div class="detail-line"><b>状态:</b> <span style="color:#00f0ff;">${mapStatus(order.status)}</span></div>
                <div class="detail-line"><b>发单:</b> ${order.sender?.nickname || '未知'}</div>
                <div class="detail-line"><b>接单:</b> ${order.worker?.nickname || '无'}</div>
                ${canDelete ? `<button class="order-btn btn-red" onclick="deleteOrder('${order.id}')" style="margin-top:15px;">取消订单</button>` : ''}
            `;
        }
        if (elements.detailModalEl) elements.detailModalEl.style.display = 'block';
    } catch (e) {
        showMessage(`加载详情失败：${e.message}`, false);
    }
}

// 关闭详情弹窗
function closeDetailModal() {
    if (elements.detailModalEl) elements.detailModalEl.style.display = 'none';
}

// 加载待审核管理员
async function loadAuditList() {
    if (userProfile?.role !== 'owner' || !elements.auditListEl) return;
    try {
        const { data: admins, error } = await supabase
            .from('profiles')
            .select('id, nickname, email, created_at')
            .eq('role', 'admin')
            .eq('status', 'pending')
            .order('created_at', { ascending: false });
        if (error) throw error;
        if (!admins?.length) {
            elements.auditListEl.innerHTML = '<div style="color:#888;">暂无待审核的管理员</div>';
            return;
        }
        elements.auditListEl.innerHTML = admins.map(admin => `
            <div class="order">
                <div><b>${admin.nickname}</b> (${admin.email})</div>
                <div style="font-size:12px; color:#888;">申请时间: ${new Date(admin.created_at).toLocaleString()}</div>
                <button class="order-btn btn-purple" onclick="approveAdmin('${admin.id}')">批准</button>
            </div>
        `).join('');
    } catch (e) {
        showMessage(`加载审核列表失败：${e.message}`, false);
    }
}

// 批准管理员
async function approveAdmin(adminId) {
    if (!confirm('确定批准该管理员？')) return;
    try {
        const { error } = await supabase.from('profiles').update({ status: 'approved' }).eq('id', adminId);
        if (error) throw error;
        showMessage('批准成功', true);
        loadAuditList();
    } catch (e) {
        showMessage(`批准失败：${e.message}`, false);
    }
}

// 实时订阅（仅保留订单删除后的自动刷新，已移除新订单提醒）
function setupRealtime() {
    if (!currentUser || !userProfile) return;
    // 仅订阅删除事件，用于取消订单后自动刷新列表，不触发任何消息提醒
    if (realtimeChannel) supabase.removeChannel(realtimeChannel);
    realtimeChannel = supabase.channel('orders-realtime')
        .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'orders' }, () => {
            loadOrders();
        })
        .subscribe();
}

// 退出登录
async function handleLogout() {
    await supabase.auth.signOut();
    currentUser = null;
    userProfile = null;
    if (realtimeChannel) supabase.removeChannel(realtimeChannel);
    setView('auth');
    showMessage('已退出登录', true);
}

/* ==========================================
   初始化（页面加载完成后执行，加容错）
   ========================================== */
function init() {
    try {
        // 1. 初始化Supabase客户端
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    } catch (e) {
        showMessage('系统初始化失败：请检查配置', false);
        runDiagnostics();
        return;
    }

    // 2. 缓存DOM元素
    elements.loginBtn = document.getElementById('loginBtn');
    elements.regBtn = document.getElementById('regBtn');
    elements.orderBtn = document.getElementById('orderBtn');
    elements.logoutBtn = document.getElementById('logoutBtn');
    elements.showRegLink = document.getElementById('showRegLink');
    elements.showLoginLink = document.getElementById('showLoginLink');
    elements.closeDetailBtn = document.getElementById('closeDetailBtn');
    elements.loadingOverlay = document.getElementById('loadingOverlay');
    elements.diagnosticPanel = document.getElementById('diagnosticPanel');
    elements.diagnosticContent = document.getElementById('diagnosticContent');
    elements.emailInput = document.getElementById('email');
    elements.passInput = document.getElementById('pass');
    elements.regEmailInput = document.getElementById('regEmail');
    elements.regPassInput = document.getElementById('regPass');
    elements.regNameInput = document.getElementById('regName');
    elements.regRoleSelect = document.getElementById('regRole');
    elements.orderContentInput = document.getElementById('orderContent');
    elements.orderGameIdInput = document.getElementById('orderGameId');
    elements.orderPriceInput = document.getElementById('orderPrice');
    elements.userInfoEl = document.getElementById('userInfo');
    elements.footerUserEl = document.getElementById('footerUser');
    elements.orderPanelEl = document.getElementById('orderPanel');
    elements.ownerPanelEl = document.getElementById('ownerPanel');
    elements.auditListEl = document.getElementById('auditList');
    elements.orderListEl = document.getElementById('orderList');
    elements.detailContentEl = document.getElementById('detailContent');
    elements.detailModalEl = document.getElementById('detailModal');

    // 3. 绑定事件监听（双重绑定，确保手机浏览器兼容）
    if (elements.loginBtn) {
        elements.loginBtn.addEventListener('click', handleLogin);
    }
    if (elements.regBtn) {
        elements.regBtn.addEventListener('click', handleRegister);
    }
    if (elements.orderBtn) {
        elements.orderBtn.addEventListener('click', createOrder);
    }
    if (elements.logoutBtn) {
        elements.logoutBtn.addEventListener('click', handleLogout);
    }
    if (elements.showRegLink) {
        elements.showRegLink.addEventListener('click', () => {
            if (elements.regBox) elements.regBox.style.display = 'block';
        });
    }
    if (elements.showLoginLink) {
        elements.showLoginLink.addEventListener('click', () => {
            if (elements.regBox) elements.regBox.style.display = 'none';
        });
    }
    if (elements.closeDetailBtn) {
        elements.closeDetailBtn.addEventListener('click', closeDetailModal);
    }

    // 4. 尝试自动登录
    autoLogin();
}

// 等待DOM加载完成后初始化
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
} else {
    init();
}
</script>
