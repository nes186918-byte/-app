<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡了电竞</title>
    <style>
        /* 第一版简洁UI风格 */
        :root {
            --bg-dark: #050510;
            --grid-color: rgba(0, 217, 255, 0.08);
            --neon-cyan: #00d9ff;
            --neon-blue: #4facfe;
            --text-main: #e0e0ff;
            --text-sub: #8892b0;
            --panel-bg: rgba(10, 15, 30, 0.7);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            position: relative;
        }
        /* 结构光背景：正交网格+上下扫描 */
        .grid-bg {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; z-index: -2;
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: grid-scan 20s linear infinite;
        }
        @keyframes grid-scan {
            0% { background-position: 0 0; }
            100% { background-position: 0 40px; }
        }
        /* 底部光晕 */
        .light-beam {
            position: fixed; bottom: -50px; left: 50%; transform: translateX(-50%);
            width: 150vw; height: 200px;
            background: radial-gradient(ellipse at center bottom, rgba(0, 217, 255, 0.15) 0%, transparent 70%);
            filter: blur(20px); z-index: -1;
        }
        /* 容器 */
        .container { max-width: 480px; margin: 0 auto; padding: 20px; }
        /* 卡片 */
        .panel {
            background: var(--panel-bg); backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 217, 255, 0.2); border-radius: 12px;
            padding: 24px; margin-bottom: 20px;
        }
        h2 { color: var(--neon-cyan); font-size: 20px; margin-bottom: 20px; font-weight: 500; }
        h3 { color: var(--text-main); font-size: 17px; margin-bottom: 15px; }
        /* 输入框 */
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 8px; font-size: 14px; color: var(--text-sub); }
        input, select {
            width: 100%; padding: 12px 15px;
            background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(0, 217, 255, 0.2);
            border-radius: 8px; color: var(--text-main); font-size: 16px; outline: none;
        }
        input:focus, select:focus { border-color: var(--neon-cyan); box-shadow: 0 0 10px rgba(0, 217, 255, 0.2); }
        /* 按钮（第一版简洁样式，无复杂动效） */
        .btn {
            width: 100%; padding: 14px; border: none; border-radius: 8px;
            font-size: 16px; font-weight: bold; color: white; cursor: pointer;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-cyan));
            margin-top: 10px; transition: background 0.3s;
        }
        .btn:hover { background: linear-gradient(90deg, #3a9bfe, #00c4e6); }
        .btn-secondary {
            background: transparent; border: 1px solid var(--neon-cyan); color: var(--neon-cyan);
        }
        .btn-small { padding: 8px 12px; font-size: 14px; width: auto; margin-right: 8px; }
        .btn-danger { background: linear-gradient(90deg, #ff416c, #ff004c); }
        /* 订单卡片 */
        .order-card {
            background: rgba(0, 0, 0, 0.3); border-left: 3px solid var(--neon-cyan);
            padding: 15px; margin-bottom: 15px; border-radius: 0 8px 8px 0;
        }
        .order-title { font-size: 17px; color: #fff; margin-bottom: 8px; }
        .order-price { font-size: 20px; color: #00ff9d; font-weight: bold; margin-bottom: 8px; }
        .order-meta { font-size: 13px; color: var(--text-sub); margin-bottom: 10px; }
        .order-status {
            display: inline-block; padding: 3px 10px; border-radius: 4px; font-size: 12px; font-weight: bold;
            margin-bottom: 10px;
        }
        .status-pending { background: rgba(255, 170, 0, 0.2); color: #ffaa00; border: 1px solid #ffaa00; }
        .status-accepted { background: rgba(0, 255, 157, 0.1); color: #00ff9d; border: 1px solid #00ff9d; }
        .status-pending_approval { background: rgba(157, 78, 221, 0.2); color: #9d4edd; border: 1px solid #9d4edd; }
        .tip { text-align: center; color: var(--text-sub); padding: 20px; font-style: italic; }
        .hidden { display: none !important; }
        /* 顶部状态栏 */
        .status-bar {
            position: fixed; top: 0; left: 0; width: 100%;
            padding: 12px 20px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(5, 5, 16, 0.8); backdrop-filter: blur(5px);
            border-bottom: 1px solid rgba(0, 217, 255, 0.2); z-index: 100;
        }
        .logout-btn {
            background: transparent; border: 1px solid #ff004c; color: #ff004c;
            padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 14px;
        }
    </style>
</head>
<body>
    <!-- 背景特效 -->
    <div class="grid-bg"></div>
    <div class="light-beam"></div>

    <!-- 顶部状态栏 -->
    <div id="topBar" class="status-bar hidden">
        <span id="welcomeMsg"></span>
        <button class="logout-btn" onclick="doLogout()">退出</button>
    </div>

    <div class="container">
        <!-- 登录/注册面板 -->
        <div id="authPanel" class="panel">
            <h2>账号登录/注册</h2>
            <div class="form-group">
                <label>邮箱</label>
                <input type="email" id="inpEmail" placeholder="请输入邮箱">
            </div>
            <div class="form-group">
                <label>密码（至少6位）</label>
                <input type="password" id="inpPassword" placeholder="请输入密码">
            </div>
            <div class="form-group">
                <label>昵称</label>
                <input type="text" id="inpNickname" placeholder="请输入昵称">
            </div>
            <div class="form-group">
                <label>角色</label>
                <select id="selRole">
                    <option value="player">玩家（发单）</option>
                    <option value="worker">打手（接单）</option>
                    <option value="admin">管理员（需审核）</option>
                    <option value="owner">店长</option>
                </select>
            </div>
            <!-- 按钮用onclick直接绑定，100%触发点击事件 -->
            <button class="btn" onclick="handleAuth('register')">注册账号</button>
            <button class="btn btn-secondary" onclick="handleAuth('login')">登录账号</button>
        </div>

        <!-- 店长专属：审核面板 -->
        <div id="approvalPanel" class="panel hidden">
            <h2>管理员审核</h2>
            <div id="pendingList"></div>
        </div>

        <!-- 发单面板（玩家/店长可见） -->
        <div id="createPanel" class="panel hidden">
            <!-- 店长专属按钮 -->
            <div id="ownerActions" class="hidden">
                <button class="btn" onclick="toggleApprovalPanel()">审核管理员申请</button>
                <hr style="border: none; border-top: 1px solid rgba(0,217,255,0.1); margin: 20px 0;">
            </div>
            <h3>发布订单</h3>
            <div class="form-group">
                <label>订单内容</label>
                <textarea id="inpContent" rows="3" placeholder="请输入订单内容"></textarea>
            </div>
            <div class="form-group">
                <label>金额（元）</label>
                <input type="number" id="inpPrice" placeholder="请输入金额">
            </div>
            <button class="btn" onclick="createOrder()">发布订单</button>
        </div>

        <!-- 订单列表 -->
        <div id="listPanel" class="panel hidden">
            <h3>订单列表</h3>
            <div id="orderList"><div class="tip">加载中...</div></div>
        </div>
    </div>

    <script>
        // ⚠️ 替换为你的Supabase配置
        const SUPABASE_URL = 'https://tuxekxblholrggksfhoz.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_36-cLUyAK_K2dv28hUzhHw_ExULb_Yg';

        let currentUser = null;
        let authHeaders = {};

        // 切换审核面板显示/隐藏
        function toggleApprovalPanel() {
            const panel = document.getElementById('approvalPanel');
            panel.classList.toggle('hidden');
            if (!panel.classList.contains('hidden')) loadPendingAdmins();
        }

        // 原生XHR请求（无兼容性问题，所有错误都会弹窗）
        function xhrRequest(method, endpoint, body, callback, needAuth = false) {
            const xhr = new XMLHttpRequest();
            xhr.open(method, SUPABASE_URL + endpoint, true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.setRequestHeader('apikey', SUPABASE_ANON_KEY);
            if (needAuth) {
                xhr.setRequestHeader('Authorization', 'Bearer ' + localStorage.getItem('sb_token'));
            } else {
                xhr.setRequestHeader('Authorization', 'Bearer ' + SUPABASE_ANON_KEY);
            }
            xhr.onload = () => {
                let res = null;
                try { res = JSON.parse(xhr.responseText); } catch(e) {}
                callback(xhr.status, res);
            };
            xhr.onerror = () => callback(0, { error: '网络错误，请检查网络连接' });
            xhr.send(body ? JSON.stringify(body) : null);
        }

        // 注册/登录逻辑
        function handleAuth(type) {
            // 调试用：确认按钮点击触发（没问题后可以删除这行）
            alert('点击了' + (type === 'register' ? '注册' : '登录') + '按钮');
            
            const email = document.getElementById('inpEmail').value.trim();
            const pwd = document.getElementById('inpPassword').value;
            const nick = document.getElementById('inpNickname').value.trim();
            const role = document.getElementById('selRole').value;

            if (!email || !pwd || !nick) { alert('请填写完整信息'); return; }
            if (pwd.length < 6) { alert('密码至少6位'); return; }

            if (type === 'register') {
                // 注册请求
                xhrRequest('POST', '/auth/v1/signup', {
                    email, password: pwd,
                    data: {
                        nickname: nick,
                        role: role,
                        status: role === 'admin' ? 'pending_approval' : 'approved' // 管理员需审核，其他免审
                    }
                }, (status, res) => {
                    if (status >= 200 && status < 300) {
                        alert(role === 'admin' ? '管理员申请已提交，请等待店长审核' : '注册成功，请登录');
                    } else {
                        // 店长已存在的错误提示
                        if (res?.message?.includes('idx_only_one_owner')) {
                            alert('店长账号已存在，无法注册');
                        } else {
                            alert('注册失败：' + (res?.error_description || res?.message || '未知错误'));
                        }
                    }
                });
            } else {
                // 登录请求
                xhrRequest('POST', '/auth/v1/token?grant_type=password', {
                    email, password: pwd
                }, (status, res) => {
                    if (status === 200) {
                        // 检查管理员是否审核通过
                        if (res.user?.user_metadata?.status === 'pending_approval') {
                            alert('账号等待店长审核，无法登录');
                            return;
                        }
                        localStorage.setItem('sb_token', res.access_token);
                        localStorage.setItem('sb_uid', res.user.id);
                        currentUser = res.user;
                        authHeaders = {
                            'apikey': SUPABASE_ANON_KEY,
                            'Authorization': 'Bearer ' + res.access_token,
                            'Content-Type': 'application/json'
                        };
                        showApp();
                    } else {
                        alert('登录失败：' + (res?.error_description || res?.message || '账号或密码错误'));
                    }
                });
            }
        }

        // 显示登录后界面
        function showApp() {
            document.getElementById('authPanel').classList.add('hidden');
            document.getElementById('topBar').classList.remove('hidden');
            document.getElementById('listPanel').classList.remove('hidden');

            const meta = currentUser.user_metadata || {};
            const role = meta.role || 'player';
            document.getElementById('welcomeMsg').innerText = `欢迎，${meta.nickname || '用户'} [${getRoleName(role)}]`;

            // 权限控制
            const ownerActions = document.getElementById('ownerActions');
            if (role === 'owner') {
                // 店长：显示发单+审核按钮
                document.getElementById('createPanel').classList.remove('hidden');
                ownerActions.classList.remove('hidden');
            } else if (role === 'player') {
                // 玩家：仅显示发单
                document.getElementById('createPanel').classList.remove('hidden');
                ownerActions.classList.add('hidden');
            } else {
                // 打手/管理员：不显示发单
                document.getElementById('createPanel').classList.add('hidden');
                ownerActions.classList.add('hidden');
            }
            loadOrders();
        }

        // 加载待审核管理员
        function loadPendingAdmins() {
            xhrRequest('GET', '/rest/v1/profiles?select=id,nickname&status=eq.pending_approval', null, (status, res) => {
                const list = document.getElementById('pendingList');
                if (status !== 200 || !res.length) {
                    list.innerHTML = '<div class="tip">暂无待审核申请</div>';
                    return;
                }
                list.innerHTML = res.map(p => `
                    <div class="order-card">
                        <div class="order-title">申请人：${p.nickname}</div>
                        <div class="order-actions">
                            <button class="btn-small" onclick="approveAdmin('${p.id}')">批准</button>
                            <button class="btn-small btn-danger" onclick="rejectAdmin('${p.id}')">驳回</button>
                        </div>
                    </div>
                `).join('');
            }, true);
        }

        // 批准管理员
        function approveAdmin(userId) {
            if (!confirm('确定批准该管理员？')) return;
            xhrRequest('PATCH', `/rest/v1/profiles?id=eq.${userId}`, { status: 'approved' }, (status) => {
                if (status === 200) { alert('批准成功'); loadPendingAdmins(); }
                else alert('操作失败');
            }, true);
        }

        // 驳回管理员
        function rejectAdmin(userId) {
            if (!confirm('确定驳回该申请？')) return;
            xhrRequest('DELETE', `/rest/v1/profiles?id=eq.${userId}`, null, (status) => {
                if (status === 204) { alert('驳回成功'); loadPendingAdmins(); }
                else alert('操作失败');
            }, true);
        }

        // 发单
        function createOrder() {
            const content = document.getElementById('inpContent').value.trim();
            const price = document.getElementById('inpPrice').value;
            if (!content || !price) { alert('请填写内容和金额'); return; }
            xhrRequest('POST', '/rest/v1/orders', {
                sender_id: currentUser.id, content, price: parseFloat(price), status: 'pending'
            }, (status) => {
                if (status === 201) {
                    alert('发布成功');
                    document.getElementById('inpContent').value = '';
                    document.getElementById('inpPrice').value = '';
                    loadOrders();
                } else alert('发布失败');
            }, true);
        }

        // 接单
        function takeOrder(orderId) {
            if (!confirm('确定接单？')) return;
            xhrRequest('PATCH', `/rest/v1/orders?id=eq.${orderId}`, {
                worker_id: currentUser.id, status: 'accepted'
            }, (status) => {
                if (status === 200) { alert('接单成功'); loadOrders(); }
                else alert('接单失败（可能已被抢）');
            }, true);
        }

        // 加载订单列表
        function loadOrders() {
            const role = currentUser.user_metadata?.role;
            let url = '/rest/v1/orders?select=*,profiles!worker_id(nickname),profiles!sender_id(nickname)&order=created_at.desc';
            // 非店长/管理员仅看自己的订单
            if (role !== 'owner' && role !== 'admin') {
                url += `&or=(sender_id.eq.${currentUser.id},worker_id.eq.${currentUser.id})`;
            }
            xhrRequest('GET', url, null, (status, res) => {
                const list = document.getElementById('orderList');
                if (status !== 200 || !res.length) {
                    list.innerHTML = '<div class="tip">暂无订单</div>';
                    return;
                }
                list.innerHTML = res.map(o => {
                    let btn = '';
                    if (!o.worker_id && o.status === 'pending' && role === 'worker') {
                        btn = `<button class="btn-small" onclick="takeOrder('${o.id}')">接单</button>`;
                    }
                    return `
                    <div class="order-card">
                        <div class="order-title">${o.content}</div>
                        <div class="order-price">¥${o.price}</div>
                        <div class="order-meta">
                            发单人：${o.profiles?.nickname || '未知'} | 接单人：${o.profiles?.nickname || '暂无'}
                        </div>
                        <div class="order-status status-${o.status}">${o.status === 'pending' ? '待接单' : '已接单'}</div>
                        <div class="order-actions">${btn}</div>
                    </div>
                    `;
                }).join('');
            }, true);
        }

        // 工具函数
        function getRoleName(role) {
            const map = { player: '玩家', worker: '打手', admin: '管理员', owner: '店长' };
            return map[role] || '未知';
        }
        function doLogout() { localStorage.clear(); location.reload(); }

        // 自动登录
        window.onload = () => {
            const token = localStorage.getItem('sb_token');
            if (token) {
                xhrRequest('GET', '/auth/v1/user', null, (status, res) => {
                    if (status === 200 && res.id) {
                        currentUser = res;
                        authHeaders = {
                            'apikey': SUPABASE_ANON_KEY,
                            'Authorization': 'Bearer ' + token,
                            'Content-Type': 'application/json'
                        };
                        showApp();
                    } else localStorage.clear();
                }, true);
            }
        };
    </script>
</body>
</html>
