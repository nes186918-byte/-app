<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡了电竞</title>
    <style>
        :root {
            --bg-dark: #050510;
            --card-bg: rgba(16, 18, 37, 0.85);
            --neon-blue: #00f2ff;
            --neon-pink: #ff00ff;
            --text-main: #e0e0ff;
            --border-color: rgba(0, 242, 255, 0.2);
            --success: #00ff88;
            --danger: #ff0055;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* 网格背景 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translateY(0); }
            100% { transform: translateY(30px); }
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 10px;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.3);
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 12px;
            color: #666;
        }

        /* 卡片通用样式 */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 25px;
            width: 100%;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
        }

        /* 表单样式 */
        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            color: #aaa;
        }

        input, select {
            width: 100%;
            padding: 10px 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: border 0.3s;
        }

        input:focus, select:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 8px rgba(0, 242, 255, 0.3);
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-pink));
            color: #000;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.4);
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
        }

        .link {
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
        }

        .link a {
            color: var(--neon-blue);
            text-decoration: none;
            cursor: pointer;
        }

        .hidden {
            display: none !important;
        }

        /* 主界面布局 */
        #appSection {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .main-area {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .action-bar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-small {
            flex: 1;
            min-width: 120px;
            padding: 10px;
            font-size: 13px;
        }

        /* 订单列表 */
        .order-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 50vh;
            overflow-y: auto;
        }

        .order-card {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
        }

        .order-title {
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 15px;
        }

        .order-meta {
            font-size: 12px;
            color: #888;
            margin-bottom: 8px;
        }

        .order-price {
            color: var(--success);
            font-weight: bold;
            font-size: 16px;
        }

        .order-actions {
            margin-top: 10px;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .order-status {
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 4px;
            background: rgba(0, 242, 255, 0.1);
            display: inline-block;
        }

        /* 底部栏 */
        .footer {
            width: 100%;
            margin-top: auto;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        .user-info span {
            color: var(--neon-blue);
        }

        /* Toast 提示样式 */
        #toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 12px 25px;
            border-radius: 25px;
            border: 1px solid var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
            z-index: 1000;
            opacity: 0;
            transition: all 0.4s ease;
            font-size: 14px;
        }

        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .tip {
            text-align: center;
            color: #555;
            padding: 20px;
        }

        /* 审批面板 */
        .approval-panel {
            background: rgba(255, 0, 85, 0.1);
            border: 1px solid var(--danger);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .approval-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px dashed rgba(255, 0, 85, 0.2);
        }

        .approval-item:last-child { border-bottom: none; }
        
        .btn-approve {
            background: var(--success);
            color: #000;
            border: none;
            padding: 5px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="toast"></div>

<div class="container">
    <!-- 1. 登录/注册区域 -->
    <div id="authSection" class="card">
        <div class="logo">卡了电竞欢迎您</div>
        
        <!-- 注册表单 -->
        <form id="registerForm">
            <h3 style="margin-bottom:15px;text-align:center;">账号注册</h3>
            <div class="form-group">
                <label for="regEmail">邮箱</label>
                <input type="email" id="regEmail" required>
            </div>
            <div class="form-group">
                <label for="regPassword">密码 (至少6位)</label>
                <input type="password" id="regPassword" required>
            </div>
            <div class="form-group">
                <label for="regNickname">昵称</label>
                <input type="text" id="regNickname" required>
            </div>
            <div class="form-group">
                <label for="regRole">身份选择</label>
                <select id="regRole" required>
                    <option value="player">玩家 (发单/接单)</option>
                    <option value="worker">打手 (接单)</option>
                    <option value="owner">店长 (最高权限)</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">立即注册</button>
        </form>

        <!-- 登录表单 -->
        <form id="loginForm" class="hidden" style="margin-top:20px;">
            <h3 style="margin-bottom:15px;text-align:center;">账号登录</h3>
            <div class="form-group">
                <label for="loginEmail">邮箱</label>
                <input type="email" id="loginEmail" required>
            </div>
            <div class="form-group">
                <label for="loginPassword">密码</label>
                <input type="password" id="loginPassword" required>
            </div>
            <button type="submit" class="btn btn-primary">登 录</button>
        </form>
        
        <div class="link">
            <span id="toggleAuth">已有账号？点我注册</span>
        </div>
    </div>

    <!-- 2. 主应用区域 (默认隐藏) -->
    <div id="appSection" class="hidden">
        <div class="main-area">
            <!-- 审批面板 (店长专属) -->
            <div id="approvalPanel" class="card hidden">
                <h3 style="color:var(--danger);margin-bottom:15px;">⚠️ 管理员审核</h3>
                <div id="approvalList">加载中...</div>
            </div>

            <!-- 发单区域 -->
            <div class="card">
                <h3 style="margin-bottom:15px;">📝 发布新订单</h3>
                <div class="form-group">
                    <label for="content">订单内容</label>
                    <input type="text" id="content" placeholder="例如：王者荣耀 代练上王者">
                </div>
                <div class="form-group">
                    <label for="price">金额 (元)</label>
                    <input type="number" id="price" placeholder="例如：50">
                </div>
                <button id="createOrderBtn" class="btn btn-primary">发 布 订 单</button>
            </div>

            <!-- 订单列表 -->
            <div class="card" style="flex:1;">
                <h3 style="margin-bottom:15px;">📋 订单大厅</h3>
                <div id="orderList" class="order-list">
                    <!-- JS渲染订单 -->
                </div>
            </div>
        </div>

        <!-- 底部栏：用户信息 + 操作 -->
        <div class="footer">
            <div class="user-info">
                欢迎，<span id="welcomeUser">User</span> [<span id="userRoleTag">未知</span>]
            </div>
            <div class="action-bar">
                <button id="adminApprovalBtn" class="btn btn-small btn-outline hidden">审核管理员</button>
                <button id="logoutBtn" class="btn btn-small" style="background:#444;color:#ccc;">退出登录</button>
            </div>
        </div>
    </div>
</div>

<script>
    // ==========================================
    // 1. 配置区域 (请替换为你的 Supabase 配置)
    // ==========================================
    const SUPABASE_URL = 'https://tuxekxblholrggksfhoz.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_36-cLUyAK_K2dv28hUzhHw_ExULb_Yg';

    // ==========================================
    // 2. 全局变量
    // ==========================================
    let currentUser = null;
    let authHeaders = {};

    // ==========================================
    // 3. UI 交互逻辑
    // ==========================================

    // Toast 提示函数
    function showToast(message, duration = 2000) {
        const toast = document.getElementById('toast');
        toast.innerText = message;
        toast.classList.add('show');
        setTimeout(() => {
            toast.classList.remove('show');
        }, duration);
    }

    // 切换登录/注册表单
    document.getElementById('toggleAuth').addEventListener('click', () => {
        const regForm = document.getElementById('registerForm');
        const loginForm = document.getElementById('loginForm');
        const toggleText = document.getElementById('toggleAuth');
        
        if (regForm.classList.contains('hidden')) {
            regForm.classList.remove('hidden');
            loginForm.classList.add('hidden');
            toggleText.innerText = '已有账号？点我注册';
        } else {
            regForm.classList.add('hidden');
            loginForm.classList.remove('hidden');
            toggleText.innerText = '没有账号？点我登录';
        }
    });

    // 注册逻辑
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('regEmail').value;
        const password = document.getElementById('regPassword').value;
        const nickname = document.getElementById('regNickname').value;
        const role = document.getElementById('regRole').value;

        showToast('正在注册...', 1000);

        try {
            // 1. 注册 Auth 用户
            const response = await fetch(`${SUPABASE_URL}/auth/v1/signup`, {
                method: 'POST',
                headers: { 'apikey': SUPABASE_ANON_KEY, 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await response.json();

            if (data.error) throw new Error(data.error.message);

            // 2. 插入 Profiles 数据
            // 店长注册 status 为 approved，其他角色根据情况
            const status = (role === 'owner') ? 'approved' : 'approved'; // 店长免审核
            await fetch(`${SUPABASE_URL}/rest/v1/profiles`, {
                method: 'POST',
                headers: { 'apikey': SUPABASE_ANON_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
                body: JSON.stringify({
                    id: data.user.id,
                    email: email,
                    nickname: nickname,
                    role: role,
                    status: status
                })
            });

            showToast('注册成功！请登录', 3000);
            document.getElementById('toggleAuth').click(); // 自动切换到登录页

        } catch (err) {
            // 特殊处理店长唯一性约束错误
            if (err.message.includes('idx_only_one_owner')) {
                showToast('店长账号已存在，无法注册', 3000);
            } else {
                showToast('注册失败: ' + err.message, 3000);
            }
        }
    });

    // 登录逻辑
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;

        showToast('正在登录...', 1000);

        try {
            const response = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
                method: 'POST',
                headers: { 'apikey': SUPABASE_ANON_KEY, 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await response.json();

            if (data.error) throw new Error(data.error.message);

            // 检查是否被封禁或未审核
            const profileRes = await fetch(`${SUPABASE_URL}/rest/v1/profiles?id=eq.${data.user.id}&select=status`, {
                headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${data.access_token}` }
            });
            const profile = (await profileRes.json())[0];

            if (profile && profile.status === 'pending_approval') {
                throw new Error('账号等待审核，请联系店长');
            }

            // 保存登录态
            localStorage.setItem('sb_token', data.access_token);
            localStorage.setItem('sb_uid', data.user.id);
            
            // 设置全局请求头
            authHeaders = {
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': `Bearer ${data.access_token}`,
                'Content-Type': 'application/json'
            };

            currentUser = data.user;
            await loadProfile(); // 加载昵称和角色
            showApp(); // 显示主界面
            showToast('登录成功！', 1500);

        } catch (err) {
            showToast('登录失败: ' + err.message, 3000);
        }
    });

    // 退出登录
    document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.clear();
        location.reload();
    });

    // ==========================================
    // 4. 主应用逻辑
    // ==========================================

    async function loadProfile() {
        try {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/profiles?id=eq.${currentUser.id}`, {
                headers: authHeaders
            });
            const profile = (await res.json())[0];
            currentUser.profile = profile;
        } catch (e) {
            console.error(e);
        }
    }

    function showApp() {
        document.getElementById('authSection').classList.add('hidden');
        document.getElementById('appSection').classList.remove('hidden');

        // 设置欢迎语
        document.getElementById('welcomeUser').innerText = currentUser.profile?.nickname || currentUser.email;
        document.getElementById('userRoleTag').innerText = getRoleName(currentUser.profile?.role);

        // 店长专属按钮
        if (currentUser.profile?.role === 'owner') {
            document.getElementById('adminApprovalBtn').classList.remove('hidden');
            loadPendingAdmins(); // 加载待审核列表
        }

        loadOrders();
    }

    // 加载待审核管理员
    async function loadPendingAdmins() {
        const listEl = document.getElementById('approvalList');
        const panel = document.getElementById('approvalPanel');
        try {
            // 查询 role=admin 且 status=pending 的用户
            const res = await fetch(`${SUPABASE_URL}/rest/v1/profiles?role=eq.admin&status=eq.pending&select=id,nickname,email`, {
                headers: authHeaders
            });
            const pending = await res.json();

            if (pending.length === 0) {
                panel.classList.add('hidden');
                return;
            }
            panel.classList.remove('hidden');

            listEl.innerHTML = pending.map(u => `
                <div class="approval-item">
                    <div>
                        <div>${u.nickname || u.email}</div>
                        <small>${u.email}</small>
                    </div>
                    <button class="btn-approve" onclick="approveAdmin('${u.id}', '${u.nickname}')">批准</button>
                </div>
            `).join('');

        } catch (e) {
            listEl.innerText = '加载失败';
        }
    }

    // 批准管理员
    async function approveAdmin(userId, nick) {
        if (!confirm(`确定批准 ${nick} 成为管理员吗？`)) return;
        try {
            await fetch(`${SUPABASE_URL}/rest/v1/profiles?id=eq.${userId}`, {
                method: 'PATCH',
                headers: authHeaders,
                body: JSON.stringify({ status: 'approved' })
            });
            showToast('批准成功！', 1500);
            loadPendingAdmins(); // 刷新列表
        } catch (e) {
            showToast('操作失败', 1500);
        }
    }

    // 绑定店长审核按钮
    document.getElementById('adminApprovalBtn').addEventListener('click', () => {
        const panel = document.getElementById('approvalPanel');
        panel.classList.toggle('hidden');
        if (!panel.classList.contains('hidden')) loadPendingAdmins();
    });

    // 发单
    document.getElementById('createOrderBtn').addEventListener('click', async () => {
        const content = document.getElementById('content').value.trim();
        const price = document.getElementById('price').value;
        if (!content || !price) return showToast('请填写内容和金额');

        try {
            await fetch(`${SUPABASE_URL}/rest/v1/orders`, {
                method: 'POST',
                headers: authHeaders,
                body: JSON.stringify({
                    sender_id: currentUser.id,
                    content: content,
                    price: parseFloat(price),
                    status: 'pending'
                })
            });
            showToast('发布成功！');
            document.getElementById('content').value = '';
            document.getElementById('price').value = '';
            loadOrders();
        } catch (e) {
            showToast('发布失败', 2000);
        }
    });

    // 接单
    async function takeOrder(orderId) {
        if (!confirm('确定接取此单？')) return;
        try {
            await fetch(`${SUPABASE_URL}/rest/v1/orders?id=eq.${orderId}`, {
                method: 'PATCH',
                headers: authHeaders,
                body: JSON.stringify({
                    worker_id: currentUser.id,
                    status: 'accepted'
                })
            });
            showToast('接单成功！');
            loadOrders();
        } catch (e) {
            showToast('接单失败', 2000);
        }
    }

    // 加载订单
    async function loadOrders() {
        const listEl = document.getElementById('orderList');
        try {
            let url = `${SUPABASE_URL}/rest/v1/orders?select=*,profiles!worker_id(nickname),profiles!sender_id(nickname)&order=created_at.desc`;
            
            // 权限过滤：非店长/管理员只能看自己的
            const role = currentUser.profile?.role;
            if (role !== 'owner' && role !== 'admin') {
                url += `&or=(sender_id.eq.${currentUser.id},worker_id.eq.${currentUser.id})`;
            }

            const res = await fetch(url, { headers: authHeaders });
            const orders = await res.json();

            if (orders.length === 0) {
                listEl.innerHTML = '<div class="tip">暂无订单，快来发布第一个吧！</div>';
                return;
            }

            listEl.innerHTML = orders.map(o => {
                let actions = '';
                // 打手接单逻辑
                if (!o.worker_id && o.status === 'pending' && role === 'worker') {
                    actions = `<button class="btn-small" style="background:var(--neon-blue);color:#000;" onclick="takeOrder('${o.id}')">接单</button>`;
                }
                // 标记自己发的单
                const isMyOrder = o.sender_id === currentUser.id;

                return `
                <div class="order-card">
                    <div class="order-title">${o.content}</div>
                    <div class="order-meta">
                        发布人: ${o.profiles?.sender_id?.nickname || '未知'} 
                        ${o.worker_id ? `| 接单人: ${o.profiles?.worker_id?.nickname || '未知'}` : '| 状态: 待接单'}
                    </div>
                    <div class="order-price">¥${o.price}</div>
                    <div class="order-actions">
                        ${actions}
                        ${isMyOrder ? '<span style="color:var(--neon-blue);font-size:12px;margin-left:10px;">(我的订单)</span>' : ''}
                    </div>
                </div>
                `;
            }).join('');
        } catch (e) {
            listEl.innerHTML = '<div class="tip">加载失败，请检查网络</div>';
        }
    }

    // 角色映射
    function getRoleName(role) {
        const map = { player: '玩家', worker: '打手', admin: '管理员', owner: '店长' };
        return map[role] || '未知';
    }

    // 自动登录
    window.onload = async () => {
        const token = localStorage.getItem('sb_token');
        if (token) {
            try {
                const response = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
                    headers: { 'Authorization': `Bearer ${token}`, 'apikey': SUPABASE_ANON_KEY }
                });
                const user = await response.json();
                if (user.id) {
                    currentUser = user;
                    authHeaders = {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    };
                    await loadProfile();
                    showApp();
                } else {
                    localStorage.clear();
                }
            } catch (e) {
                localStorage.clear();
            }
        }
    };
</script>
</body>
</html>
