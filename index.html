<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡了电竞</title>
    <audio id="notifySound" src="https://assets.mixkit.co/sfx/preview/mixkit-positive-notification-951.mp3" preload="auto"></audio>
    <style>
        body { background: #050510; color: #fff; font-family: sans-serif; padding: 15px; margin: 0; }
        .box { background: rgba(0,0,0,0.5); padding: 15px; border-radius: 10px; border: 1px solid #00f0ff; margin-bottom: 15px; }
        h2 { color: #00f0ff; text-align: center; margin: 0 0 15px 0; font-size: 1.2em; }
        input, select, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 5px; border: 1px solid #333; background: #111; color: #fff; font-size: 16px; box-sizing: border-box; }
        button { background: #00f0ff; color: #000; font-weight: bold; cursor: pointer; }
        button:active { background: #00c0cc; }
        .link { text-align: center; margin-top: 15px; color: #888; }
        .link span { color: #00f0ff; cursor: pointer; }
        #msg { text-align: center; margin-top: 15px; padding: 10px; border-radius: 5px; display: none; position: fixed; bottom: 20px; left: 20px; right: 20px; z-index: 1000; }
        #app { display: none; padding-bottom: 80px; }
        .order { background: #111; padding: 12px; margin-top: 10px; border-radius: 5px; border-left: 3px solid #00f0ff; }
        .order-btn { margin-top: 8px; padding: 8px 10px; font-size: 13px; width: auto; margin-right: 8px; display: inline-block; }
        .btn-green { background: #00ff88; color: #000; }
        .btn-red { background: #ff4757; color: #fff; }
        .btn-purple { background: #ff00ff; color: #fff; }
        #detailModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); padding: 15px; box-sizing: border-box; z-index: 999; overflow-y: auto; }
        #detailModal .box { margin-top: 30px; }
        .detail-line { margin: 10px 0; line-height: 1.5; }
        .detail-label { color: #00f0ff; font-weight: bold; }
        .footer-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.9); padding: 10px; display: none; justify-content: space-between; align-items: center; box-sizing: border-box; border-top: 1px solid #00f0ff; }
        .footer-bar button { width: auto; padding: 8px 15px; margin: 0; }
        .notify-banner {
            position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
            background: linear-gradient(90deg, #00f0ff, #ff00ff); color: #000;
            padding: 12px 20px; border-radius: 8px; z-index: 2000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5); font-weight: bold;
            animation: slideInDown 0.5s ease-out;
            max-width: 90%;
        }
        @keyframes slideInDown { from { top: -50px; opacity: 0; } to { top: 10px; opacity: 1; } }
    </style>
</head>
<body>

    <div id="auth">
        <div class="box">
            <h2>卡了电竞欢迎您</h2>
            <input id="email" placeholder="邮箱">
            <input id="pass" type="password" placeholder="密码">
            <button id="loginBtn">登录</button>
            <div class="link">没账号？<span id="showReg">点此注册</span></div>
        </div>
        <div class="box" id="regBox" style="display:none;">
            <h2>注册</h2>
            <input id="regEmail" placeholder="邮箱">
            <input id="regPass" type="password" placeholder="密码">
            <input id="regName" placeholder="昵称">
            <select id="regRole">
                <option value="player">玩家</option>
                <option value="worker">打手</option>
                <option value="admin">管理员</option>
                <option value="owner">店长</option>
            </select>
            <button id="regBtn">注册</button>
            <div class="link">有账号？<span id="showLogin">点此登录</span></div>
        </div>
    </div>

    <div id="app">
        <div class="box">
            <h2>派单系统</h2>
            <p id="userInfo"></p>
            <div id="ownerPanel" style="display:none; margin-top:10px; border:1px solid #ff00ff; padding:10px;">
                <h3 style="color:#ff00ff; margin: 0 0 10px 0;">待审核管理员</h3>
                <div id="auditList"></div>
            </div>
            <div id="orderPanel" style="display:none; margin-top:10px;">
                <input id="orderContent" placeholder="订单内容">
                <input id="orderGameId" placeholder="游戏ID（必填）">
                <input id="orderPrice" type="number" placeholder="价格">
                <button id="orderBtn">发布订单</button>
            </div>
            <h3 style="margin:15px 0 10px 0; color:#00f0ff;">订单列表</h3>
            <div id="orderList"></div>
        </div>
    </div>

    <div class="footer-bar" id="footerBar">
        <span id="footerUser"></span>
        <button id="logoutBtn">退出</button>
    </div>

    <div id="detailModal">
        <div class="box">
            <h2>订单详情</h2>
            <div id="detailContent"></div>
            <button onclick="closeDetail()" style="margin-top:15px;">关闭</button>
        </div>
    </div>

    <div id="msg"></div>

<script defer>
const URL = "https://aqotjkekuvkkbqvsxagt.supabase.co";
const KEY = "sb_publishable_q_Vq7lzJpHlEcgw6cZHBmg_7dHtFoqy";
let token = "", userId = "", userRole = "";
let supabase = null; // 声明supabase实例，用于实时订阅
let realtimeChannel = null;

function msg(txt, ok=false) {
    const m = document.getElementById("msg");
    m.innerText = txt; m.style.background = ok ? "#003300" : "#330000"; m.style.display = "block";
    setTimeout(()=>m.style.display="none", 3000);
}

function showNotifyBanner(text) {
    const old = document.querySelector('.notify-banner');
    if(old) old.remove();
    const banner = document.createElement('div');
    banner.className = 'notify-banner';
    banner.innerText = text;
    document.body.appendChild(banner);
    document.getElementById('notifySound').play().catch(()=>{});
    setTimeout(() => banner.remove(), 5000);
}

function mapStatus(status) {
    const map = {
        'pending': '待接单',
        'accepted': '已接单',
        'processing': '正在进行中',
        'completed': '订单已完成',
        'cancelled': '订单已取消'
    };
    return map[status] || '未知状态';
}

function setView(view) {
    document.getElementById("auth").style.display = view === 'auth' ? 'block' : 'none';
    document.getElementById("app").style.display = view === 'app' ? 'block' : 'none';
    document.getElementById("footerBar").style.display = view === 'app' ? 'flex' : 'none';
}

async function autoLogin() {
    const storedToken = localStorage.getItem('sb_token');
    if (!storedToken) return false;
    try {
        // 初始化supabase客户端
        supabase = window.supabase.createClient(URL, KEY, {
            auth: { persistSession: false }
        });
        const res = await fetch(URL + '/auth/v1/user', { headers: { 'Authorization': `Bearer ${storedToken}`, 'apikey': KEY } });
        const user = await res.json();
        if (!user.id) return false;
        token = storedToken; userId = user.id;
        const profRes = await fetch(URL + `/rest/v1/profiles?id=eq.${userId}&select=*`, { headers: { 'apikey': KEY, 'Authorization': `Bearer ${token}` } });
        const profile = (await profRes.json())[0];
        if (!profile || profile.status !== 'approved') return false;
        userRole = profile.role;
        document.getElementById("userInfo").innerText = `欢迎: ${profile.nickname}（${profile.role}）`;
        document.getElementById("footerUser").innerText = profile.nickname;
        if (userRole === "owner" || userRole === "player") document.getElementById("orderPanel").style.display = "block";
        if (userRole === "owner") { document.getElementById("ownerPanel").style.display = "block"; loadAudit(); }
        setView('app');
        loadOrders();
        setupRealtime();
        return true;
    } catch { return false; }
}

function setupRealtime() {
    if (!supabase || !userId) return;
    if (realtimeChannel) supabase.removeChannel(realtimeChannel);
    // 仅打手/管理员/店长接收新订单提醒
    if (!['worker', 'admin', 'owner'].includes(userRole)) return;
    realtimeChannel = supabase.channel('orders-realtime')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'orders' }, (payload) => {
            showNotifyBanner(`🔔 新订单：${payload.new.content}`);
            loadOrders();
        })
        .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'orders' }, () => {
            loadOrders();
        })
        .subscribe();
}

document.getElementById("showReg").onclick = () => document.getElementById("regBox").style.display = "block";
document.getElementById("showLogin").onclick = () => document.getElementById("regBox").style.display = "none";

document.getElementById("regBtn").onclick = async () => {
    const email = regEmail.value, pass = regPass.value, name = regName.value, role = regRole.value;
    if (!email || !pass || !name) return msg("请填完信息");
    if (role === "owner") {
        const r = await fetch(URL+"/rest/v1/profiles?select=id&role=eq.owner", {headers:{"apikey":KEY}});
        if ((await r.json()).length > 0) return msg("店长已存在");
    }
    const res = await fetch(URL+"/auth/v1/signup", {
        method: "POST", headers: {"Content-Type":"application/json", "apikey":KEY},
        body: JSON.stringify({email, password:pass, data:{nickname:name, role:role}})
    });
    const j = await res.json();
    if (j.user) {
        await fetch(URL+"/rest/v1/profiles", {
            method: "POST", headers: {"apikey":KEY, "Authorization":"Bearer "+j.session.access_token, "Content-Type":"application/json"},
            body: JSON.stringify({id:j.user.id, email, nickname:name, role, status:(role==="admin"?"pending":"approved")})
        });
        msg("注册成功", true); document.getElementById("regBox").style.display = "none";
    } else msg(j.msg || "注册失败");
};

document.getElementById("loginBtn").onclick = async () => {
    const email = document.getElementById("email").value;
    const pass = document.getElementById("pass").value;
    const res = await fetch(URL+"/auth/v1/token?grant_type=password", {
        method: "POST", headers: {"Content-Type":"application/json", "apikey":KEY},
        body: JSON.stringify({email, password:pass})
    });
    const j = await res.json();
    if (j.access_token) {
        localStorage.setItem('sb_token', j.access_token);
        token = j.access_token; userId = j.user.id;
        const prof = (await (await fetch(URL+`/rest/v1/profiles?id=eq.${userId}`, {headers:{"apikey":KEY, "Authorization":`Bearer ${token}`}})).json())[0];
        if (prof.status !== "approved") return msg("审核中");
        userRole = prof.role;
        document.getElementById("userInfo").innerText = `欢迎: ${prof.nickname}`;
        document.getElementById("footerUser").innerText = prof.nickname;
        if (userRole === "owner" || userRole === "player") orderPanel.style.display = "block";
        if (userRole === "owner") { ownerPanel.style.display = "block"; loadAudit(); }
        setView('app'); loadOrders();
        setupRealtime();
    } else msg("登录失败");
};

document.getElementById("orderBtn").onclick = async () => {
    const c = orderContent.value, g = orderGameId.value, p = orderPrice.value;
    if (!c || !g || !p) return msg("请填写完整");
    await fetch(URL+"/rest/v1/orders", {
        method: "POST", headers: {"apikey":KEY, "Authorization":`Bearer ${token}`, "Content-Type":"application/json"},
        body: JSON.stringify({sender_id:userId, content:c, game_id:g, price:p, status:"pending"})
    });
    msg("发布成功", true); orderContent.value = orderGameId.value = orderPrice.value = ""; loadOrders();
};

async function loadOrders() {
    const d = await (await fetch(URL+"/rest/v1/orders?select=*,sender:sender_id(nickname),worker:worker_id(nickname)&order=created_at.desc", {headers:{"apikey":KEY, "Authorization":`Bearer ${token}`}})).json();
    orderList.innerHTML = d.map(o => {
        const isOwner = o.sender_id === userId;
        const isWorker = o.worker_id === userId;
        const canTake = ['owner','admin','worker'].includes(userRole) && o.status === 'pending' && !o.worker_id && !isOwner;
        const canComplete = isWorker && o.status === 'accepted';
        const canDelete = (isOwner && o.status === 'pending') || (isWorker && o.status === 'accepted');
        return `<div class="order">
            <div><b>内容:</b> ${o.content}</div>
            <div><b>游戏ID:</b> ${o.game_id}</div>
            <div><b>状态:</b> <span style="color:#00f0ff;">${mapStatus(o.status)}</span></div>
            <div><b>发单:</b> ${o.sender?.nickname||'未知'}</div>
            <div><b>接单:</b> ${o.worker?.nickname||'无'}</div>
            <button class="order-btn" onclick="showDetail('${o.id}')">详情</button>
            ${canTake ? `<button class="order-btn" onclick="takeOrder('${o.id}')">接单</button>` : ''}
            ${canComplete ? `<button class="order-btn btn-green" onclick="completeOrder('${o.id}')">结单</button>` : ''}
            ${canDelete ? `<button class="order-btn btn-red" onclick="deleteOrder('${o.id}')">取消</button>` : ''}
        </div>`;
    }).join('') || "<div style='text-align:center; color:#888;'>暂无订单</div>";
}

window.takeOrder = async (id) => {
    await fetch(URL+`/rest/v1/orders?id=eq.${id}`, {
        method: "PATCH", headers: {"apikey":KEY, "Authorization":`Bearer ${token}`, "Content-Type":"application/json"},
        body: JSON.stringify({worker_id:userId, status:"accepted"})
    });
    msg("接单成功", true); loadOrders();
};

window.completeOrder = async (id) => {
    if (!confirm("确认完成订单？")) return;
    await fetch(URL+`/rest/v1/orders?id=eq.${id}`, {
        method: "PATCH", headers: {"apikey":KEY, "Authorization":`Bearer ${token}`, "Content-Type":"application/json"},
        body: JSON.stringify({status: "completed"})
    });
    msg("订单已结单", true); loadOrders(); closeDetail();
};

window.deleteOrder = async (id) => {
    if (!confirm("确认取消？取消后订单将彻底删除")) return;
    await fetch(URL+`/rest/v1/orders?id=eq.${id}`, {
        method: "DELETE", headers: {"apikey":KEY, "Authorization":`Bearer ${token}`}
    });
    msg("订单已取消", true); loadOrders(); closeDetail();
};

window.showDetail = async (id) => {
    const o = (await (await fetch(URL+`/rest/v1/orders?id=eq.${id}&select=*,sender:sender_id(nickname),worker:worker_id(nickname)`, {headers:{"apikey":KEY, "Authorization":`Bearer ${token}`}})).json())[0];
    const isOwner = o.sender_id === userId;
    const isWorker = o.worker_id === userId;
    const canDelete = (isOwner && o.status === 'pending') || (isWorker && o.status === 'accepted');
    detailContent.innerHTML = `
        <div class="detail-line"><b>内容:</b> ${o.content}</div>
        <div class="detail-line"><b>游戏ID:</b> ${o.game_id}</div>
        <div class="detail-line"><b>价格:</b> ¥${o.price}</div>
        <div class="detail-line"><b>状态:</b> <span style="color:#00f0ff;">${mapStatus(o.status)}</span></div>
        <div class="detail-line"><b>发单:</b> ${o.sender?.nickname||'未知'}</div>
        <div class="detail-line"><b>接单:</b> ${o.worker?.nickname||'无'}</div>
        ${canDelete ? `<button class="order-btn btn-red" onclick="deleteOrder('${o.id}')" style="margin-top:15px;">取消订单</button>` : ''}
    `;
    detailModal.style.display = "block";
};
window.closeDetail = () => detailModal.style.display = "none";

async function loadAudit() {
    const d = await (await fetch(URL+"/rest/v1/profiles?role=eq.admin&status=eq.pending", {headers:{"apikey":KEY, "Authorization":`Bearer ${token}`}})).json();
    auditList.innerHTML = d.map(u => `<div class="order">${u.nickname} <button class="order-btn btn-purple" onclick="approve('${u.id}')">批准</button></div>`).join('') || "无";
}
window.approve = async (id) => {
    await fetch(URL+`/rest/v1/profiles?id=eq.${id}`, {
        method: "PATCH", headers: {"apikey":KEY, "Authorization":`Bearer ${token}`, "Content-Type":"application/json"},
        body: JSON.stringify({status:"approved"})
    });
    msg("已批准", true); loadAudit();
};
document.getElementById("logoutBtn").onclick = () => { localStorage.removeItem('sb_token'); location.reload(); };

window.onload = () => { if (!autoLogin()) setView('auth'); };
</script>
<!-- 引入Supabase JS SDK，用于实时订阅 -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</body>
</html>
