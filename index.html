<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡了电竞</title>
    <style>
        /* --- 全局变量 --- */
        :root {
            --bg-color: #020208;
            --grid-color: rgba(0, 217, 255, 0.08);
            --glow-cyan: #00d9ff;
            --glow-purple: #9d4edd;
            --text-primary: #e0e0ff;
            --text-secondary: #8a8aa8;
            --panel-bg: rgba(10, 10, 30, 0.7);
            --border-glow: rgba(0, 217, 255, 0.3);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* --- 结构光扫描背景（修正后，是线条整体流动）--- */
        .cyber-grid {
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2;
            background: 
                linear-gradient(90deg, transparent 49.75%, var(--grid-color) 49.75%, var(--grid-color) 50.25%, transparent 50.25%),
                linear-gradient(180deg, transparent 49.75%, var(--grid-color) 49.75%, var(--grid-color) 50.25%, transparent 50.25%),
                var(--bg-color);
            background-size: 80px 80px, 80px 80px;
            animation: grid-scan 20s linear infinite;
            perspective: 1000px;
            transform: rotateX(60deg) scale(2.5);
            transform-origin: center center;
        }
        @keyframes grid-scan {
            0% { background-position: 0 0, 0 0; }
            100% { background-position: 0 80px, 0 80px; }
        }

        .light-vignette {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(ellipse at 50% -10%, rgba(0, 217, 255, 0.15), transparent 60%);
            pointer-events: none;
        }

        /* --- 顶部状态栏 --- */
        .status-bar {
            position: fixed; top: 0; left: 0; width: 100%;
            padding: 12px 20px;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(2, 2, 8, 0.8); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-glow);
            z-index: 100; font-size: 14px;
        }
        .logout-btn {
            background: transparent; border: 1px solid var(--glow-purple); color: var(--glow-purple);
            padding: 6px 12px; border-radius: 4px; cursor: pointer; transition: all 0.3s;
        }
        .logout-btn:hover { background: var(--glow-purple); color: #fff; }

        .container { max-width: 480px; margin: 80px auto 20px; padding: 0 15px; }

        /* --- 面板样式 --- */
        .panel {
            background: var(--panel-bg); backdrop-filter: blur(12px);
            border: 1px solid var(--border-glow);
            border-radius: 12px; padding: 24px; margin-bottom: 20px;
            box-shadow: 0 0 40px rgba(0, 217, 255, 0.1);
            animation: panel-fade-in 0.5s ease-out;
        }
        @keyframes panel-fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        h2 { font-size: 22px; font-weight: 300; letter-spacing: 2px; margin-bottom: 20px; color: var(--glow-cyan); text-shadow: 0 0 10px var(--glow-cyan); }
        h3 { font-size: 18px; font-weight: 400; color: var(--text-primary); margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 8px; font-size: 13px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; }
        input, select, textarea {
            width: 100%; padding: 12px 15px;
            background: rgba(0,0,0,0.4); border: 1px solid rgba(0, 217, 255, 0.2);
            border-radius: 6px; color: var(--text-primary); font-size: 16px; outline: none;
            transition: all 0.3s;
        }
        input:focus, select:focus, textarea:focus { border-color: var(--glow-cyan); box-shadow: 0 0 15px rgba(0, 217, 255, 0.2); }
        
        /* 按钮样式（重点修正：登录按钮现在清晰可见） */
        .btn {
            width: 100%; padding: 14px; margin-top: 10px;
            background: linear-gradient(90deg, var(--glow-purple), var(--glow-cyan));
            border: none; border-radius: 6px; color: #fff; font-size: 16px; font-weight: bold;
            cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
            transition: all 0.3s; box-shadow: 0 0 20px rgba(0, 217, 255, 0.3);
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 0 30px rgba(0, 217, 255, 0.5); }
        /* 次要按钮（登录按钮用这个，现在边框和文字都高亮，不会消失） */
        .btn-secondary { 
            background: transparent; 
            border: 1px solid var(--glow-cyan); 
            color: var(--glow-cyan);
            box-shadow: 0 0 10px rgba(0, 217, 255, 0.3);
        }
        .btn-danger { background: linear-gradient(90deg, #ff004c, #ff4d4d); box-shadow: 0 0 20px rgba(255, 0, 76, 0.3); }
        .btn-small { padding: 8px 12px; font-size: 14px; width: auto; margin: 0 5px 0 0; }

        /* --- 订单卡片 --- */
        .order-card {
            background: rgba(0,0,0,0.3); border-left: 3px solid var(--glow-cyan);
            padding: 15px; margin-bottom: 15px; border-radius: 0 8px 8px 0;
        }
        .order-title { font-size: 17px; color: #fff; margin-bottom: 8px; }
        .order-price { font-size: 22px; color: #00ff9d; font-weight: bold; text-shadow: 0 0 8px #00ff9d; margin-bottom: 8px; }
        .order-meta { font-size: 13px; color: var(--text-secondary); margin-bottom: 10px; }
        .order-status { display: inline-block; padding: 3px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; margin-bottom: 10px; }
        .status-pending { background: rgba(255,170,0,0.2); color: #ffaa00; border: 1px solid #ffaa00; }
        .status-accepted { background: rgba(0,255,157,0.1); color: #00ff9d; border: 1px solid #00ff9d; }
        .status-pending_approval { background: rgba(157,78,221,0.2); color: var(--glow-purple); border: 1px solid var(--glow-purple); }
        .tip { text-align: center; color: var(--text-secondary); padding: 20px; font-style: italic; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- 背景特效 -->
    <div class="cyber-grid"></div>
    <div class="light-vignette"></div>

    <!-- 顶部状态栏 -->
    <div id="topBar" class="status-bar hidden">
        <span id="welcomeMsg"></span>
        <button class="logout-btn" onclick="doLogout()">注销</button>
    </div>

    <div class="container">
        <!-- 登录/注册面板 -->
        <div id="authPanel" class="panel">
            <h2>卡了电竞欢迎您的光临</h2>
            <div class="form-group">
                <label>电子邮箱</label>
                <input type="email" id="email" placeholder="agent@cyber.net">
            </div>
            <div class="form-group">
                <label>登录密码</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>
            <div class="form-group">
                <label>昵称</label>
                <input type="text" id="nickname" placeholder="Ghost">
            </div>
            <div class="form-group">
                <label>选择你的身份</label>
                <select id="role">
                    <option value="player">玩家 (发单)</option>
                    <option value="worker">打手 (接单)</option>
                    <option value="admin">管理员 (审核/运维)</option>
                    <option value="owner">店长</option>
                    <!-- 已彻底移除「老板」选项 -->
                </select>
            </div>
            <!-- 登录按钮现在样式高亮，清晰可见 -->
            <button class="btn" onclick="handleAuth('register')">注册身份</button>
            <button class="btn btn-secondary" onclick="handleAuth('login')">身份核验（登录）</button>
        </div>

        <!-- 店长专属：审核管理员面板（默认隐藏，点击按钮展开） -->
        <div id="approvalPanel" class="panel hidden">
            <h2>AWAITING APPROVAL</h2>
            <p style="color: var(--text-secondary); margin-bottom: 20px;">以下管理员申请等待您的批复：</p>
            <div id="pendingList"></div>
        </div>

        <!-- 发单面板（玩家/店长可见，已移除老板权限） -->
        <div id="createPanel" class="panel hidden">
            <!-- 店长专属：审核管理员按钮（醒目位置） -->
            <div id="ownerActions" class="hidden">
                <button class="btn" onclick="toggleApprovalPanel()">审核管理员申请</button>
                <hr style="border: none; border-top: 1px solid rgba(0,217,255,0.1); margin: 20px 0;">
            </div>
            <h3>发布新订单</h3>
            <div class="form-group">
                <label>需要的服务</label>
                <textarea id="content" rows="3" placeholder="输入任务详情..."></textarea>
            </div>
            <div class="form-group">
                <label>价格(¥)</label>
                <input type="number" id="price" placeholder="0.00">
            </div>
            <button class="btn" onclick="createOrder()">确认发布</button>
        </div>

        <!-- 订单列表 -->
        <div id="listPanel" class="panel hidden">
            <h3>订单列表</h3>
            <div id="orderList"><div class="tip">加载中...</div></div>
        </div>
    </div>

    <script>
        /* ==========================================================
           【⚠️ 配置区】请填入你的 Supabase 信息
           ========================================================== */
        const SUPABASE_URL = 'https://tuxekxblholrggksfhoz.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_36-cLUyAK_K2dv28hUzhHw_ExULb_Yg';
        /* ========================================================== */

        let currentUser = null;
        let authToken = null;
        let authHeaders = {};

        // 切换审核面板显示/隐藏
        function toggleApprovalPanel() {
            const panel = document.getElementById('approvalPanel');
            panel.classList.toggle('hidden');
            if (!panel.classList.contains('hidden')) {
                loadPendingAdmins(); // 展开时加载待审批列表
            }
        }

        // --- API 封装 ---
        async function sbFetch(endpoint, method = 'GET', body = null) {
            const res = await fetch(`${SUPABASE_URL}/rest/v1${endpoint}`, {
                method, headers: authHeaders, body: body ? JSON.stringify(body) : null
            });
            if (!res.ok) {
                const err = await res.json();
                throw new Error(err.message || `HTTP ${res.status}`);
            }
            return res.json();
        }

        // --- 注册/登录逻辑 ---
        async function handleAuth(type) {
            const email = email.value.trim();
            const pwd = password.value;
            const nick = nickname.value.trim();
            const selectedRole = role.value;

            if (!email || !pwd || !nick) return alert('请填写完整信息');

            try {
                if (type === 'register') {
                    const userData = { nickname: nick, role: selectedRole };
                    if (selectedRole === 'admin') {
                        userData.status = 'pending_approval';
                    }

                    await fetch(`${SUPABASE_URL}/auth/v1/signup`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` },
                        body: JSON.stringify({ email, password: pwd, data: userData })
                    });
                    
                    if (selectedRole === 'admin') {
                        alert('管理员注册申请已提交，请等待店长审核通过后方可登录。');
                    } else {
                        alert('注册成功！请登录。');
                    }

                } else { // Login
                    const data = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` },
                        body: JSON.stringify({ email, password: pwd })
                    }).then(r => r.json());

                    // 检查管理员是否审核通过
                    if (data.user?.user_metadata?.status === 'pending_approval') {
                        alert('您的账号正在等待店长审核，暂无法登录。');
                        return;
                    }

                    authToken = data.access_token;
                    currentUser = data.user;
                    authHeaders = {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json'
                    };
                    localStorage.setItem('sb_token', authToken);
                    localStorage.setItem('sb_uid', currentUser.id);
                    showApp();
                }
            } catch (e) {
                alert('操作失败: ' + e.message);
            }
        }

        // --- 应用界面控制 ---
        async function showApp() {
            authPanel.classList.add('hidden');
            topBar.classList.remove('hidden');
            listPanel.classList.remove('hidden');

            const meta = currentUser.user_metadata || {};
            const userRole = meta.role || 'player';
            const nickname = meta.nickname || '匿名用户';
            
            welcomeMsg.innerText = `欢迎, ${nickname} [${getRoleName(userRole)}]`;

            // 权限控制（已移除老板相关逻辑）
            const ownerActions = document.getElementById('ownerActions');
            if (userRole === 'owner') {
                // 店长：显示发单面板 + 审核按钮
                createPanel.classList.remove('hidden');
                ownerActions.classList.remove('hidden');
            } else if (userRole === 'player') {
                // 玩家：仅显示发单面板
                createPanel.classList.remove('hidden');
                ownerActions.classList.add('hidden');
            } else {
                // 打手/管理员：不显示发单面板
                createPanel.classList.add('hidden');
                ownerActions.classList.add('hidden');
            }

            loadOrders();
        }

        // --- 店长审核功能 ---
        async function loadPendingAdmins() {
            try {
                const pending = await sbFetch('/profiles?select=id,nickname,status&status=eq.pending_approval');
                const pendingList = document.getElementById('pendingList');
                if (pending.length === 0) {
                    pendingList.innerHTML = '<div class="tip">暂无待审批申请</div>';
                    return;
                }
                pendingList.innerHTML = pending.map(p => `
                    <div class="order-card">
                        <div class="order-title">申请人: ${p.nickname}</div>
                        <div class="order-meta">ID: ${p.id}</div>
                        <div class="order-actions">
                            <button class="btn-small" onclick="approveAdmin('${p.id}')">批准</button>
                            <button class="btn-small btn-danger" onclick="rejectAdmin('${p.id}')">驳回</button>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                pendingList.innerHTML = `<div class="tip">加载失败: ${e.message}</div>`;
            }
        }

        async function approveAdmin(userId) {
            if (!confirm('确定批准该管理员申请？')) return;
            try {
                await sbFetch(`/profiles?id=eq.${userId}`, 'PATCH', { status: 'approved' });
                alert('审批通过！请通知该用户重新登录。');
                loadPendingAdmins();
            } catch (e) { alert('操作失败: ' + e.message); }
        }
        
        async function rejectAdmin(userId) {
            if (!confirm('确定驳回该申请？用户资料将被删除。')) return;
            try {
                await sbFetch(`/profiles?id=eq.${userId}`, 'DELETE');
                alert('申请已驳回。');
                loadPendingAdmins();
            } catch (e) { alert('操作失败: ' + e.message); }
        }

        // --- 订单功能 ---
        async function createOrder() {
            const contentVal = content.value.trim();
            const priceVal = price.value;
            if (!contentVal || !priceVal) return alert('请填写内容和金额');
            try {
                await sbFetch('/orders', 'POST', {
                    sender_id: currentUser.id,
                    content: contentVal,
                    price: parseFloat(priceVal),
                    status: 'pending'
                });
                alert('发布成功！');
                content.value = ''; price.value = '';
                loadOrders();
            } catch (e) { alert('发布失败: ' + e.message); }
        }

        async function takeOrder(orderId) {
            if (!confirm('确定接取此单？')) return;
            try {
                await sbFetch(`/orders?id=eq.${orderId}`, 'PATCH', {
                    worker_id: currentUser.id,
                    status: 'accepted'
                });
                alert('接单成功！');
                loadOrders();
            } catch (e) { alert('接单失败（可能已被抢）'); }
        }

        async function loadOrders() {
            const listEl = orderList;
            try {
                const orders = await sbFetch('/orders?select=*,profiles!worker_id(nickname),profiles!sender_id(nickname)&order=created_at.desc');
                if (!orders.length) {
                    listEl.innerHTML = '<div class="tip">暂无订单</div>';
                    return;
                }
                const userRole = currentUser.user_metadata?.role;
                listEl.innerHTML = orders.map(o => {
                    let actions = '';
                    // 打手可见待接单
                    if (!o.worker_id && o.status === 'pending' && userRole === 'worker') {
                        actions = `<button class="btn-small" onclick="takeOrder('${o.id}')">接单</button>`;
                    }
                    // 权限控制：店长/管理员看所有，其他人看自己相关的
                    const isVisible = (
                        userRole === 'owner' || 
                        userRole === 'admin' || 
                        o.sender_id === currentUser.id || 
                        o.worker_id === currentUser.id
                    );
                    if (!isVisible) return '';

                    return `
                    <div class="order-card">
                        <div class="order-title">${o.content}</div>
                        <div class="order-price">¥${o.price}</div>
                        <div class="order-meta">
                            发单人: ${o.profiles?.nickname || '未知'} | 
                            接单人: ${o.profiles?.nickname || '暂无'}
                        </div>
                        <div class="order-status status-${o.status}">${o.status === 'pending' ? '待接单' : '已接单'}</div>
                        <div class="order-actions">${actions}</div>
                    </div>
                    `;
                }).filter(Boolean).join('');
            } catch (e) { listEl.innerHTML = `<div class="tip">加载失败: ${e.message}</div>`; }
        }

        // --- 工具函数 ---
        function getRoleName(role) {
            const map = { player: '玩家', worker: '打手', admin: '管理员', owner: '店长' };
            return map[role] || '未知';
        }

        function doLogout() {
            localStorage.clear();
            location.reload();
        }

        // --- 自动登录 ---
        window.onload = async () => {
            const token = localStorage.getItem('sb_token');
            if (token) {
                try {
                    const user = await fetch(`${SUPABASE_URL}/auth/v1/user', {
                        headers: { 'Authorization': `Bearer ${token}`, 'apikey': SUPABASE_ANON_KEY }
                    }).then(r => r.json());

                    if (user.id) {
                        currentUser = user;
                        authHeaders = {
                            'apikey': SUPABASE_ANON_KEY,
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        };
                        showApp();
                    } else { localStorage.clear(); }
                } catch (e) { localStorage.clear(); }
            }
        };
    </script>
</body>
</html>
