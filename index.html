<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡了电竞</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { background: #050510; color: #fff; font-family: sans-serif; padding: 15px; margin: 0; }
        .box { background: rgba(0,0,0,0.5); padding: 15px; border-radius: 10px; border: 1px solid #00f0ff; margin-bottom: 15px; }
        h2 { color: #00f0ff; text-align: center; margin: 0 0 15px 0; font-size: 1.2em; }
        input, select, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 5px; border: 1px solid #333; background: #111; color: #fff; font-size: 16px; box-sizing: border-box; }
        button { background: #00f0ff; color: #000; font-weight: bold; cursor: pointer; }
        button:active { background: #00c0cc; }
        .link { text-align: center; margin-top: 15px; color: #888; }
        .link span { color: #00f0ff; cursor: pointer; }
        #msg { text-align: center; margin-top: 15px; padding: 12px 24px; border-radius: 8px; display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; min-width: 200px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        #app { display: none; padding-bottom: 80px; }
        .order { background: #111; padding: 12px; margin-top: 10px; border-radius: 5px; border-left: 3px solid #00f0ff; }
        .order-btn { margin-top: 8px; padding: 8px 10px; font-size: 13px; width: auto; margin-right: 8px; display: inline-block; }
        .btn-green { background: #00ff88; color: #000; }
        .btn-red { background: #ff4757; color: #fff; }
        .btn-purple { background: #ff00ff; color: #fff; }
        #detailModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); padding: 15px; box-sizing: border-box; z-index: 999; overflow-y: auto; }
        #detailModal .box { margin-top: 30px; }
        .detail-line { margin: 10px 0; line-height: 1.5; }
        .detail-label { color: #00f0ff; font-weight: bold; }
        .footer-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.9); padding: 10px; display: none; justify-content: space-between; align-items: center; box-sizing: border-box; border-top: 1px solid #00f0ff; }
        .footer-bar button { width: auto; padding: 8px 15px; margin: 0; }
    </style>
</head>
<body>

    <div id="auth">
        <div class="box">
            <h2>卡了电竞欢迎您</h2>
            <input id="email" placeholder="邮箱">
            <input id="pass" type="password" placeholder="密码">
            <button id="loginBtn" onclick="App.login()">登录</button>
            <div class="link">没账号？<span onclick="App.showRegister()">点此注册</span></div>
        </div>
        <div class="box" id="regBox" style="display:none;">
            <h2>注册</h2>
            <input id="regEmail" placeholder="邮箱">
            <input id="regPass" type="password" placeholder="密码">
            <input id="regName" placeholder="昵称">
            <select id="regRole">
                <option value="player">玩家</option>
                <option value="worker">打手</option>
                <option value="admin">管理员</option>
                <option value="owner">店长</option>
            </select>
            <button id="regBtn" onclick="App.register()">注册</button>
            <div class="link">有账号？<span onclick="App.showLogin()">点此登录</span></div>
        </div>
    </div>

    <div id="app">
        <div class="box">
            <h2>派单系统</h2>
            <p id="userInfo"></p>
            <div id="ownerPanel" style="display:none; margin-top:10px; border:1px solid #ff00ff; padding:10px;">
                <h3 style="color:#ff00ff; margin: 0 0 10px 0;">待审核管理员</h3>
                <div id="auditList"></div>
            </div>
            <div id="orderPanel" style="display:none; margin-top:10px;">
                <input id="orderContent" placeholder="订单内容">
                <input id="orderGameId" placeholder="游戏ID（必填）">
                <input id="orderPrice" type="number" placeholder="价格">
                <button id="orderBtn" onclick="App.createOrder()">发布订单</button>
            </div>
            <h3 style="margin:15px 0 10px 0; color:#00f0ff;">订单列表</h3>
            <div id="orderList"></div>
        </div>
    </div>

    <div class="footer-bar" id="footerBar">
        <span id="footerUser"></span>
        <button id="logoutBtn" onclick="App.logout()">退出</button>
    </div>

    <div id="detailModal">
        <div class="box">
            <h2>订单详情</h2>
            <div id="detailContent"></div>
            <button onclick="App.closeDetail()" style="margin-top:15px;">关闭</button>
        </div>
    </div>

    <div id="msg"></div>

<script>
// ==========================================
// 🔴 必须替换成你的 Supabase 配置！
// ==========================================
const SUPABASE_URL = 'https://aqotjkekuvkkbqvsxagt.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_q_Vq7lzJpHlEcgw6cZHBmg_7dHtFoqy';

// 初始化 Supabase 客户端
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// 全局应用对象
const App = {
    currentUser: null,
    userProfile: null,
    realtimeChannel: null,

    // 显示消息
    msg(text, isSuccess = false) {
        const el = document.getElementById('msg');
        el.textContent = text;
        el.style.background = isSuccess ? 'rgba(0, 255, 136, 0.9)' : 'rgba(255, 0, 85, 0.9)';
        el.style.color = isSuccess ? '#000' : '#fff';
        el.style.display = 'block';
        setTimeout(() => el.style.display = 'none', isSuccess ? 2000 : 3000);
    },

    // 切换视图
    setView(view) {
        document.getElementById('auth').style.display = view === 'auth' ? 'block' : 'none';
        document.getElementById('app').style.display = view === 'app' ? 'block' : 'none';
        document.getElementById('footerBar').style.display = view === 'app' ? 'flex' : 'none';
    },

    // 显示注册框
    showRegister() {
        document.getElementById('regBox').style.display = 'block';
    },

    // 显示登录框
    showLogin() {
        document.getElementById('regBox').style.display = 'none';
    },

    // 自动登录检查
    async autoLogin() {
        try {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                this.setView('auth');
                return;
            }

            const { data: profile } = await supabase
                .from('profiles')
                .select('*')
                .eq('id', session.user.id)
                .single();

            if (!profile || profile.status !== 'approved') {
                this.setView('auth');
                return;
            }

            this.currentUser = session.user;
            this.userProfile = profile;
            this.updateUI(profile);
            this.setView('app');
            this.loadOrders();
            this.setupRealtime();
            this.msg(`欢迎回来，${profile.nickname}`, true);
        } catch (e) {
            this.setView('auth');
        }
    },

    // 登录
    async login() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('pass').value.trim();
        if (!email || !password) {
            this.msg('请输入邮箱和密码', false);
            return;
        }

        const btn = document.getElementById('loginBtn');
        btn.disabled = true;
        btn.textContent = '登录中...';

        try {
            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password
            });

            if (error) {
                this.msg('登录失败：' + error.message, false);
                btn.disabled = false;
                btn.textContent = '登录';
                return;
            }

            const { data: profile } = await supabase
                .from('profiles')
                .select('*')
                .eq('id', data.user.id)
                .single();

            if (!profile || profile.status !== 'approved') {
                this.msg('账号审核中或不存在', false);
                await supabase.auth.signOut();
                btn.disabled = false;
                btn.textContent = '登录';
                return;
            }

            this.currentUser = data.user;
            this.userProfile = profile;
            this.updateUI(profile);
            this.setView('app');
            this.loadOrders();
            this.setupRealtime();
            this.msg(`欢迎您，${profile.nickname}`, true);
            document.getElementById('pass').value = '';
        } catch (e) {
            this.msg('登录失败，请重试', false);
        } finally {
            btn.disabled = false;
            btn.textContent = '登录';
        }
    },

    // 注册
    async register() {
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPass').value.trim();
        const nickname = document.getElementById('regName').value.trim();
        const role = document.getElementById('regRole').value;

        if (!email || !password || !nickname) {
            this.msg('请填写完整信息', false);
            return;
        }

        const btn = document.getElementById('regBtn');
        btn.disabled = true;
        btn.textContent = '注册中...';

        try {
            // 检查店长唯一性
            if (role === 'owner') {
                const { data: owners } = await supabase
                    .from('profiles')
                    .select('id')
                    .eq('role', 'owner');
                if (owners && owners.length > 0) {
                    this.msg('店长账号已存在', false);
                    btn.disabled = false;
                    btn.textContent = '注册';
                    return;
                }
            }

            const { data, error } = await supabase.auth.signUp({
                email: email,
                password: password,
                options: { data: { nickname, role } }
            });

            if (error) {
                this.msg('注册失败：' + error.message, false);
                btn.disabled = false;
                btn.textContent = '注册';
                return;
            }

            await supabase.from('profiles').insert([{
                id: data.user.id,
                email: email,
                nickname: nickname,
                role: role,
                status: role === 'admin' ? 'pending' : 'approved'
            }]);

            this.msg('注册成功！请登录', true);
            this.showLogin();
            document.getElementById('regEmail').value = email;
        } catch (e) {
            this.msg('注册失败，请重试', false);
        } finally {
            btn.disabled = false;
            btn.textContent = '注册';
        }
    },

    // 更新UI
    updateUI(profile) {
        document.getElementById('userInfo').textContent = `欢迎: ${profile.nickname}（${profile.role}）`;
        document.getElementById('footerUser').textContent = profile.nickname;
        if (profile.role === 'owner' || profile.role === 'player') {
            document.getElementById('orderPanel').style.display = 'block';
        }
        if (profile.role === 'owner') {
            document.getElementById('ownerPanel').style.display = 'block';
            this.loadAuditList();
        }
    },

    // 加载订单
    async loadOrders() {
        if (!this.currentUser || !this.userProfile) return;
        try {
            let query = supabase
                .from('orders')
                .select('*, sender:sender_id(nickname), worker:worker_id(nickname)')
                .order('created_at', { ascending: false });

            if (this.userProfile.role !== 'owner') {
                query = query.or(`sender_id.eq.${this.currentUser.id},worker_id.eq.${this.currentUser.id}`);
            }

            const { data: orders } = await query;
            const list = document.getElementById('orderList');
            
            if (!orders || orders.length === 0) {
                list.innerHTML = '<div style="text-align:center; color:#888; padding:20px;">暂无订单</div>';
                return;
            }

            list.innerHTML = orders.map(order => {
                const isOwner = order.sender_id === this.currentUser.id;
                const isWorker = order.worker_id === this.currentUser.id;
                const canTake = ['owner','admin','worker'].includes(this.userProfile.role) && 
                               order.status === 'pending' && !order.worker_id && !isOwner;
                const canComplete = isWorker && order.status === 'accepted';
                const canDelete = (isOwner && order.status === 'pending') || (isWorker && order.status === 'accepted');

                return `
                    <div class="order">
                        <div><b>内容:</b> ${order.content}</div>
                        <div><b>游戏ID:</b> ${order.game_id}</div>
                        <div><b>状态:</b> <span style="color:#00f0ff;">${this.mapStatus(order.status)}</span></div>
                        <div><b>发单:</b> ${order.sender?.nickname || '未知'}</div>
                        <div><b>接单:</b> ${order.worker?.nickname || '无'}</div>
                        <button class="order-btn" onclick="App.showDetail('${order.id}')">详情</button>
                        ${canTake ? `<button class="order-btn" onclick="App.takeOrder('${order.id}')">接单</button>` : ''}
                        ${canComplete ? `<button class="order-btn btn-green" onclick="App.completeOrder('${order.id}')">结单</button>` : ''}
                        ${canDelete ? `<button class="order-btn btn-red" onclick="App.deleteOrder('${order.id}')">取消</button>` : ''}
                    </div>
                `;
            }).join('');
        } catch (e) {}
    },

    // 发布订单
    async createOrder() {
        const content = document.getElementById('orderContent').value.trim();
        const gameId = document.getElementById('orderGameId').value.trim();
        const price = document.getElementById('orderPrice').value.trim();
        if (!content || !gameId || !price) {
            this.msg('请填写完整订单信息', false);
            return;
        }

        try {
            await supabase.from('orders').insert([{
                sender_id: this.currentUser.id,
                content: content,
                game_id: gameId,
                price: parseFloat(price),
                status: 'pending'
            }]);
            this.msg('订单发布成功', true);
            document.getElementById('orderContent').value = '';
            document.getElementById('orderGameId').value = '';
            document.getElementById('orderPrice').value = '';
            this.loadOrders();
        } catch (e) {
            this.msg('发布失败，请重试', false);
        }
    },

    // 接单
    async takeOrder(orderId) {
        try {
            await supabase.from('orders')
                .update({ worker_id: this.currentUser.id, status: 'accepted' })
                .eq('id', orderId)
                .eq('status', 'pending');
            this.msg('接单成功', true);
            this.loadOrders();
        } catch (e) {
            this.msg('接单失败', false);
        }
    },

    // 结单
    async completeOrder(orderId) {
        if (!confirm('确认完成订单？')) return;
        try {
            await supabase.from('orders')
                .update({ status: 'completed' })
                .eq('id', orderId)
                .eq('worker_id', this.currentUser.id)
                .eq('status', 'accepted');
            this.msg('订单已结单', true);
            this.loadOrders();
            this.closeDetail();
        } catch (e) {
            this.msg('结单失败', false);
        }
    },

    // 删除订单
    async deleteOrder(orderId) {
        if (!confirm('确认取消订单？')) return;
        try {
            await supabase.from('orders').delete().eq('id', orderId);
            this.msg('订单已取消', true);
            this.loadOrders();
            this.closeDetail();
        } catch (e) {
            this.msg('取消失败', false);
        }
    },

    // 显示订单详情
    async showDetail(orderId) {
        try {
            const { data: order } = await supabase
                .from('orders')
                .select('*, sender:sender_id(nickname), worker:worker_id(nickname)')
                .eq('id', orderId)
                .single();

            const isOwner = order.sender_id === this.currentUser.id;
            const isWorker = order.worker_id === this.currentUser.id;
            const canDelete = (isOwner && order.status === 'pending') || (isWorker && order.status === 'accepted');

            document.getElementById('detailContent').innerHTML = `
                <div class="detail-line"><b>内容:</b> ${order.content}</div>
                <div class="detail-line"><b>游戏ID:</b> ${order.game_id}</div>
                <div class="detail-line"><b>价格:</b> ¥${order.price}</div>
                <div class="detail-line"><b>状态:</b> <span style="color:#00f0ff;">${this.mapStatus(order.status)}</span></div>
                <div class="detail-line"><b>发单:</b> ${order.sender?.nickname || '未知'}</div>
                <div class="detail-line"><b>接单:</b> ${order.worker?.nickname || '无'}</div>
                ${canDelete ? `<button class="order-btn btn-red" onclick="App.deleteOrder('${order.id}')" style="margin-top:15px;">取消订单</button>` : ''}
            `;
            document.getElementById('detailModal').style.display = 'block';
        } catch (e) {
            this.msg('加载详情失败', false);
        }
    },

    // 关闭详情
    closeDetail() {
        document.getElementById('detailModal').style.display = 'none';
    },

    // 加载审核列表
    async loadAuditList() {
        if (!this.currentUser || this.userProfile.role !== 'owner') return;
        try {
            const { data: admins } = await supabase
                .from('profiles')
                .select('id, nickname, email, created_at')
                .eq('role', 'admin')
                .eq('status', 'pending')
                .order('created_at', { ascending: false });

            const list = document.getElementById('auditList');
            if (!admins || admins.length === 0) {
                list.innerHTML = '<div style="color:#888;">暂无待审核的管理员</div>';
                return;
            }

            list.innerHTML = admins.map(admin => `
                <div class="order">
                    <div><b>${admin.nickname}</b> (${admin.email})</div>
                    <div style="font-size:12px; color:#888;">申请时间: ${new Date(admin.created_at).toLocaleString()}</div>
                    <button class="order-btn btn-purple" onclick="App.approveAdmin('${admin.id}')">批准</button>
                </div>
            `).join('');
        } catch (e) {}
    },

    // 批准管理员
    async approveAdmin(adminId) {
        if (!confirm('确定批准该管理员？')) return;
        try {
            await supabase.from('profiles')
                .update({ status: 'approved' })
                .eq('id', adminId);
            this.msg('批准成功', true);
            this.loadAuditList();
        } catch (e) {
            this.msg('批准失败', false);
        }
    },

    // 实时订阅
    setupRealtime() {
        if (!this.currentUser || !this.userProfile) return;
        if (!['worker','admin','owner'].includes(this.userProfile.role)) return;
        
        if (this.realtimeChannel) supabase.removeChannel(this.realtimeChannel);
        
        this.realtimeChannel = supabase.channel('orders')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'orders' }, () => {
                this.loadOrders();
            })
            .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'orders' }, () => {
                this.loadOrders();
            })
            .subscribe();
    },

    // 退出登录
    async logout() {
        await supabase.auth.signOut();
        this.currentUser = null;
        this.userProfile = null;
        if (this.realtimeChannel) {
            supabase.removeChannel(this.realtimeChannel);
            this.realtimeChannel = null;
        }
        this.setView('auth');
        this.msg('已退出登录', true);
    },

    // 状态映射
    mapStatus(status) {
        const map = {
            'pending': '待接单',
            'accepted': '已接单',
            'processing': '正在进行中',
            'completed': '订单已完成',
            'cancelled': '订单已取消'
        };
        return map[status] || '未知状态';
    }
};

// 页面加载时自动登录
window.onload = function() {
    App.autoLogin();
};
</script>
</body>
</html>
