<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡了电竞</title>
    <style>
        :root {
            --neon-blue: #00f0ff;
            --neon-pink: #ff00ff;
            --bg-dark: #050510;
            --card-bg: rgba(10, 15, 30, 0.8);
            --text-main: #ffffff;
            --text-sub: #8a9bb4;
            --border-color: rgba(0, 240, 255, 0.2);
            --success: #00ff9d;
            --error: #ff0055;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-image: 
                linear-gradient(rgba(0, 240, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* 顶部导航 */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(5, 5, 16, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
        }

        /* 主容器 */
        .container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            margin-top: 80px;
            margin-bottom: 80px;
            position: relative;
            z-index: 10;
        }

        /* 卡片样式 */
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 0 40px rgba(0, 240, 255, 0.1);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(5px);
        }

        .welcome-title {
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 30px;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
        }

        /* 表单组 */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-sub);
            font-size: 0.9rem;
        }

        input, select {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }

        /* 按钮样式 */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-pink));
            color: white;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 30px rgba(0, 240, 255, 0.6);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        /* 底部链接 */
        .links {
            text-align: center;
            margin-top: 20px;
            color: var(--text-sub);
        }

        .links a {
            color: var(--neon-blue);
            text-decoration: none;
            cursor: pointer;
            margin: 0 5px;
            transition: color 0.3s;
        }

        .links a:hover {
            color: var(--neon-pink);
        }

        /* 页脚 */
        .footer-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(5, 5, 16, 0.9);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 100;
            display: none; /* 默认隐藏 */
        }

        .user-info span {
            color: var(--neon-blue);
            font-weight: bold;
        }

        .user-info .badge {
            background: var(--neon-pink);
            color: black;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            margin-left: 8px;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid var(--neon-pink);
            color: var(--neon-pink);
            padding: 6px 15px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: var(--neon-pink);
            color: black;
        }

        /* 消息提示 */
        .toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--error);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            z-index: 999;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            text-align: center;
            max-width: 90%;
        }
        
        .toast.success {
            background: var(--success);
            color: black;
        }

        .toast.show {
            opacity: 1;
        }

        /* 实用类 */
        .hidden {
            display: none !important;
        }
        
        /* 加载动画 */
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid var(--neon-blue);
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- 顶部 -->
    <div class="header">
        <div class="logo">🌟</div>
        <div style="display:flex;gap:10px;">
            <button style="background:none;border:none;color:var(--text-sub);font-size:1.2rem;">➕</button>
            <button style="background:none;border:none;color:var(--text-sub);font-size:1.2rem;">🔄</button>
        </div>
    </div>

    <!-- 消息提示 -->
    <div id="toast" class="toast"></div>

    <!-- 主内容 -->
    <div class="container">
        <!-- 登录卡片 -->
        <div id="loginCard" class="card">
            <h2 class="welcome-title">卡了电竞欢迎您</h2>
            <div class="form-group">
                <label for="loginEmail">邮箱</label>
                <input type="email" id="loginEmail" placeholder="请输入邮箱">
            </div>
            <div class="form-group">
                <label for="loginPassword">密码（至少6位）</label>
                <input type="password" id="loginPassword" placeholder="请输入密码">
            </div>
            <button id="loginBtn" class="btn btn-primary">登录账号</button>
            <div class="links">
                没有账号？<a id="showRegister">点击注册</a>
            </div>
        </div>

        <!-- 注册卡片 (默认隐藏) -->
        <div id="registerCard" class="card hidden" style="margin-top: 20px;">
            <h2 class="welcome-title">账号注册</h2>
            <div class="form-group">
                <label for="regEmail">邮箱</label>
                <input type="email" id="regEmail" placeholder="请输入邮箱">
            </div>
            <div class="form-group">
                <label for="regPassword">密码（至少6位）</label>
                <input type="password" id="regPassword" placeholder="请输入密码">
            </div>
            <div class="form-group">
                <label for="regNickname">昵称</label>
                <input type="text" id="regNickname" placeholder="请输入昵称">
            </div>
            <div class="form-group">
                <label for="regRole">选择身份</label>
                <select id="regRole">
                    <option value="player">玩家</option>
                    <option value="worker">打手</option>
                    <option value="admin">管理员</option>
                    <option value="owner">店长（最高权限，仅1个）</option>
                </select>
            </div>
            <button id="registerBtn" class="btn btn-primary">注册账号</button>
            <div class="links">
                已有账号？<a id="showLogin">点击登录</a>
            </div>
        </div>
    </div>

    <!-- 底部栏 (默认隐藏) -->
    <div id="footerBar" class="footer-bar">
        <div class="user-info">
            欢迎，<span id="footerUser">用户</span><span class="badge" id="footerRole">[游客]</span>
        </div>
        <button class="logout-btn" id="logoutBtn">退出登录</button>
    </div>

    <script>
        // ==========================================
        // 1. 基础配置 (请务必替换成你自己的！)
        // ==========================================
        const SUPABASE_URL = 'https://tuxekxblholrggksfhoz.supabase.co';       // 替换为你的 Supabase URL
        const SUPABASE_ANON_KEY = 'sb_publishable_36-cLUyAK_K2dv28hUzhHw_ExULb_Yg'; // 替换为你的 Anon Key

        // ==========================================
        // 2. DOM 元素获取
        // ==========================================
        const loginCard = document.getElementById('loginCard');
        const registerCard = document.getElementById('registerCard');
        const footerBar = document.getElementById('footerBar');
        const toast = document.getElementById('toast');

        const showRegisterLink = document.getElementById('showRegister');
        const showLoginLink = document.getElementById('showLogin');

        const loginBtn = document.getElementById('loginBtn');
        const registerBtn = document.getElementById('registerBtn');
        const logoutBtn = document.getElementById('logoutBtn');

        const footerUser = document.getElementById('footerUser');
        const footerRole = document.getElementById('footerRole');

        // ==========================================
        // 3. 通用工具函数
        // ==========================================
        function showToast(msg, isSuccess = false) {
            toast.textContent = msg;
            toast.className = 'toast show';
            if (isSuccess) toast.classList.add('success');
            else toast.classList.remove('success');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // 切换卡片显示
        function switchToRegister() {
            loginCard.classList.add('hidden');
            registerCard.classList.remove('hidden');
            // 清空之前的输入和错误提示
            document.getElementById('regEmail').value = '';
            document.getElementById('regPassword').value = '';
            document.getElementById('regNickname').value = '';
            document.getElementById('regRole').value = 'player';
        }

        function switchToLogin() {
            registerCard.classList.add('hidden');
            loginCard.classList.remove('hidden');
            // 清空登录输入
            document.getElementById('loginEmail').value = '';
            document.getElementById('loginPassword').value = '';
        }

        // ==========================================
        // 4. 认证逻辑
        // ==========================================

        // 检查是否已登录
        async function checkSession() {
            try {
                const res = await fetch(`${SUPABASE_URL}/auth/v1/session`, {
                    headers: { 'apikey': SUPABASE_ANON_KEY }
                });
                const session = await res.json();
                if (session && session.access_token) {
                    // 已登录，加载用户信息
                    await loadUserProfile(session.user.id);
                    showMainApp(session.user);
                }
            } catch (e) {
                console.log('未登录');
            }
        }

        // 加载用户资料
        async function loadUserProfile(userId) {
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/profiles?id=eq.${userId}`, {
                    headers: { 
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${localStorage.getItem('supabase_token')}`
                    }
                });
                const profile = await res.json();
                if (profile && profile.length > 0) {
                    localStorage.setItem('user_profile', JSON.stringify(profile[0]));
                }
            } catch(e) {}
        }

        // 显示主界面
        function showMainApp(user) {
            document.querySelector('.container').classList.add('hidden');
            footerBar.style.display = 'flex';
            
            const profile = JSON.parse(localStorage.getItem('user_profile') || '{}');
            footerUser.textContent = profile.nickname || user.email;
            footerRole.textContent = `[${profile.role || 'user'}]`;
        }

        // 登录功能
        loginBtn.addEventListener('click', async () => {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();

            if (!email || !password) {
                showToast('邮箱和密码不能为空');
                return;
            }

            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="spinner"></span>登录中...';

            try {
                const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
                    method: 'POST',
                    headers: { 'apikey': SUPABASE_ANON_KEY, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (res.ok) {
                    showToast('登录成功！', true);
                    localStorage.setItem('supabase_token', data.access_token);
                    await loadUserProfile(data.user.id);
                    showMainApp(data.user);
                } else {
                    showToast(data.msg || '登录失败，请检查账号密码');
                }
            } catch (e) {
                showToast('网络错误，请重试');
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerHTML = '登录账号';
            }
        });

        // 注册功能 (核心修复部分)
        registerBtn.addEventListener('click', async () => {
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value.trim();
            const nickname = document.getElementById('regNickname').value.trim();
            const role = document.getElementById('regRole').value;

            if (!email || !password || !nickname) {
                showToast('邮箱、密码、昵称不能为空');
                return;
            }
            if (password.length < 6) {
                showToast('密码至少需要6位');
                return;
            }

            registerBtn.disabled = true;
            registerBtn.innerHTML = '<span class="spinner"></span>注册中...';

            try {
                // 1. 检查店长是否已存在
                if (role === 'owner') {
                    const checkRes = await fetch(`${SUPABASE_URL}/rest/v1/profiles?role=eq.owner&select=id`, {
                        headers: { 'apikey': SUPABASE_ANON_KEY }
                    });
                    const owners = await checkRes.json();
                    if (owners.length > 0) {
                        showToast('店长账号已存在，无法重复注册');
                        registerBtn.disabled = false;
                        registerBtn.innerHTML = '注册账号';
                        return;
                    }
                }

                // 2. 注册 Auth 用户
                const authRes = await fetch(`${SUPABASE_URL}/auth/v1/signup`, {
                    method: 'POST',
                    headers: { 'apikey': SUPABASE_ANON_KEY, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const authData = await authRes.json();

                if (authRes.ok && authData.user) {
                    // 3. 插入 Profiles 资料表
                    const profilePayload = {
                        id: authData.user.id,
                        email: email,
                        nickname: nickname,
                        role: role,
                        status: role === 'admin' ? 'pending' : 'approved', // 管理员需审核
                        created_at: new Date().toISOString()
                    };
                    
                    // 如果是店长，直接设为 approved
                    if (role === 'owner') profilePayload.status = 'approved';

                    const profileRes = await fetch(`${SUPABASE_URL}/rest/v1/profiles`, {
                        method: 'POST',
                        headers: { 
                            'apikey': SUPABASE_ANON_KEY, 
                            'Authorization': `Bearer ${authData.session?.access_token || SUPABASE_ANON_KEY}`,
                            'Content-Type': 'application/json',
                            'Prefer': 'return=representation'
                        },
                        body: JSON.stringify(profilePayload)
                    });

                    if (profileRes.ok) {
                        showToast('注册成功！请返回登录', true);
                        setTimeout(switchToLogin, 1500);
                    } else {
                        const err = await profileRes.json();
                        showToast('资料保存失败: ' + (err.message || '未知错误'));
                    }
                } else {
                    showToast(authData.msg || '注册失败，该邮箱可能已被使用');
                }
            } catch (e) {
                console.error(e);
                showToast('发生异常，请重试');
            } finally {
                registerBtn.disabled = false;
                registerBtn.innerHTML = '注册账号';
            }
        });

        // 退出登录
        logoutBtn.addEventListener('click', async () => {
            await fetch(`${SUPABASE_URL}/auth/v1/logout`, {
                method: 'POST',
                headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${localStorage.getItem('supabase_token')}` }
            });
            localStorage.removeItem('supabase_token');
            localStorage.removeItem('user_profile');
            footerBar.style.display = 'none';
            document.querySelector('.container').classList.remove('hidden');
            switchToLogin();
            showToast('已退出登录', true);
        });

        // 页面加载时检查
        window.onload = () => {
            checkSession();
            
            // 绑定切换事件
            showRegisterLink.addEventListener('click', switchToRegister);
            showLoginLink.addEventListener('click', switchToLogin);
        };
    </script>
</body>
</html>
