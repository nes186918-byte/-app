<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡了电竞官网</title>
    <style>
        :root {
            --neon-blue: #00f0ff;
            --neon-pink: #ff00ff;
            --bg-dark: #050510;
            --card-bg: rgba(10, 15, 30, 0.8);
            --text-main: #e0e0ff;
            --text-sub: #8a9bb4;
            --border-color: rgba(0, 240, 255, 0.2);
            --success: #00ff9d;
            --error: #ff0055;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body {
            background: var(--bg-dark);
            min-height: 100vh;
            background-image: 
                linear-gradient(rgba(0,240,255,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,240,255,0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--text-main);
        }

        /* 顶部导航 */
        .header {
            position: fixed; top: 0; left: 0; right: 0;
            height: 60px; background: rgba(5,5,16,0.9); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; z-index: 100;
        }
        .logo { font-size: 1.5rem; font-weight: bold; color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); }
        .header-actions button { background: none; border: none; color: var(--text-sub); font-size: 1.2rem; margin-left: 10px; cursor: pointer; }

        /* 主容器 */
        .container { max-width: 800px; margin: 80px auto 100px; padding: 0 20px; }

        /* 登录/注册卡片 */
        .auth-card {
            background: var(--card-bg); border-radius: 16px; padding: 30px;
            box-shadow: 0 0 40px rgba(0,240,255,0.1); border: 1px solid var(--border-color);
            backdrop-filter: blur(5px); max-width: 420px; margin: 0 auto;
        }
        .auth-title { text-align: center; font-size: 1.8rem; margin-bottom: 30px; background: linear-gradient(90deg, var(--neon-blue), var(--neon-pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--text-sub); font-size: 0.9rem; }
        .form-group input, .form-group select {
            width: 100%; padding: 12px 15px; background: rgba(0,0,0,0.3); border: 1px solid var(--border-color); border-radius: 8px;
            color: var(--text-main); font-size: 1rem; outline: none; transition: all 0.3s;
        }
        .form-group input:focus, .form-group select:focus { border-color: var(--neon-blue); box-shadow: 0 0 15px rgba(0,240,255,0.3); }
        .btn {
            width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold;
            cursor: pointer; transition: all 0.3s; margin-top: 10px;
        }
        .btn-primary { background: linear-gradient(90deg, var(--neon-blue), var(--neon-pink)); color: white; box-shadow: 0 0 20px rgba(0,240,255,0.4); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 30px rgba(0,240,255,0.6); }
        .btn-secondary { background: transparent; border: 1px solid var(--neon-blue); color: var(--neon-blue); }
        .links { text-align: center; margin-top: 20px; color: var(--text-sub); }
        .links a { color: var(--neon-blue); cursor: pointer; text-decoration: none; }
        .links a:hover { color: var(--neon-pink); }

        /* 派单页面（登录后显示） */
        .app-page { display: none; } /* 默认隐藏，登录后显示 */
        .section-title { font-size: 1.4rem; color: var(--neon-blue); margin: 25px 0 15px; padding-bottom: 8px; border-bottom: 1px solid var(--border-color); }
        .order-create { display: flex; gap: 10px; margin-bottom: 20px; }
        .order-create input { flex: 1; padding: 12px 15px; background: rgba(0,0,0,0.3); border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-main); }
        .order-create button { padding: 0 25px; background: linear-gradient(90deg, var(--neon-blue), var(--neon-pink)); border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
        .order-list { display: flex; flex-direction: column; gap: 12px; }
        .order-card {
            background: rgba(0,0,0,0.3); border-radius: 10px; padding: 18px; border-left: 3px solid var(--neon-blue);
        }
        .order-card .title { font-weight: bold; margin-bottom: 8px; font-size: 1.1rem; }
        .order-card .meta { font-size: 0.85rem; color: var(--text-sub); margin-bottom: 8px; }
        .order-card .price { color: var(--success); font-weight: bold; font-size: 1.2rem; margin-bottom: 12px; }
        .order-card .actions { display: flex; gap: 10px; }
        .order-card .btn-take { padding: 6px 18px; background: var(--neon-blue); border: none; border-radius: 6px; color: black; font-weight: bold; cursor: pointer; }
        .order-card .btn-approve { padding: 6px 18px; background: var(--success); border: none; border-radius: 6px; color: black; font-weight: bold; cursor: pointer; }
        .order-card .my-order { color: var(--neon-blue); font-size: 0.85rem; margin-left: 10px; }
        .empty-tip { text-align: center; color: var(--text-sub); padding: 40px 0; }

        /* 店长审核面板 */
        .audit-panel {
            background: rgba(255,0,85,0.1); border: 1px solid var(--error); border-radius: 12px; padding: 20px; margin-top: 20px; display: none;
        }
        .audit-panel h3 { color: var(--error); margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .audit-item { background: rgba(0,0,0,0.2); padding: 12px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .audit-item .info .name { font-weight: bold; margin-bottom: 4px; }
        .audit-item .info .email { font-size: 0.85rem; color: var(--text-sub); }

        /* 底部栏 */
        .footer-bar {
            position: fixed; bottom: 0; left: 0; right: 0; height: 60px; background: rgba(5,5,16,0.9); backdrop-filter: blur(10px);
            border-top: 1px solid var(--border-color); display: none; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 100;
        }
        .footer-bar .user-info { display: flex; align-items: center; gap: 10px; }
        .footer-bar .user-info .nickname { color: var(--neon-blue); font-weight: bold; }
        .footer-bar .user-info .role-badge {
            background: var(--neon-pink); color: black; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem;
        }
        .footer-bar .logout-btn { background: transparent; border: 1px solid var(--error); color: var(--error); padding: 6px 15px; border-radius: 20px; cursor: pointer; }
        .footer-bar .audit-btn { background: transparent; border: 1px solid var(--neon-blue); color: var(--neon-blue); padding: 6px 15px; border-radius: 20px; cursor: pointer; margin-right: 10px; }

        /* 提示框 */
        .toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: var(--error); color: white; padding: 12px 24px; border-radius: 8px; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .toast.success { background: var(--success); color: black; }
        .toast.show { opacity: 1; }
        .hidden { display: none !important; }
        .spinner { border: 3px solid rgba(255,255,255,0.3); border-top: 3px solid var(--neon-blue); border-radius: 50%; width: 18px; height: 18px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <div class="header">
        <div class="logo">卡了电竞欢迎您</div>
        <div class="header-actions">
            <button id="refreshBtn">🔄</button>
            <button id="newOrderBtn">➕</button>
        </div>
    </div>

    <!-- 提示框 -->
    <div id="toast" class="toast"></div>

    <!-- 登录/注册页面 -->
    <div class="container" id="authPage">
        <!-- 登录卡片 -->
        <div class="auth-card" id="loginCard">
            <h2 class="auth-title">账号登录</h2>
            <div class="form-group">
                <label>邮箱</label>
                <input type="email" id="loginEmail" placeholder="请输入邮箱">
            </div>
            <div class="form-group">
                <label>密码（至少6位）</label>
                <input type="password" id="loginPassword" placeholder="请输入密码">
            </div>
            <button class="btn btn-primary" id="loginBtn">登录账号</button>
            <div class="links">没有账号？<a id="toRegister">点击注册</a></div>
        </div>

        <!-- 注册卡片（默认隐藏） -->
        <div class="auth-card hidden" id="registerCard">
            <h2 class="auth-title">账号注册</h2>
            <div class="form-group">
                <label>邮箱</label>
                <input type="email" id="regEmail" placeholder="请输入邮箱">
            </div>
            <div class="form-group">
                <label>密码（至少6位）</label>
                <input type="password" id="regPassword" placeholder="请输入密码">
            </div>
            <div class="form-group">
                <label>昵称</label>
                <input type="text" id="regNickname" placeholder="请输入昵称">
            </div>
            <div class="form-group">
                <label>选择身份</label>
                <select id="regRole">
                    <option value="player">玩家（发单/接单）</option>
                    <option value="worker">打手（接单）</option>
                    <option value="admin">管理员（需店长审核）</option>
                    <option value="owner">店长（最高权限，仅1个）</option>
                </select>
            </div>
            <button class="btn btn-primary" id="registerBtn">注册账号</button>
            <div class="links">已有账号？<a id="toLogin">点击登录</a></div>
        </div>
    </div>

    <!-- 派单页面（登录后显示） -->
    <div class="container app-page" id="appPage">
        <!-- 发单区 -->
        <div id="createSection">
            <h3 class="section-title">发布新订单</h3>
            <div class="order-create">
                <input type="text" id="orderContent" placeholder="请输入订单内容（如：王者荣耀上王者）">
                <input type="number" id="orderPrice" placeholder="金额" style="width: 120px;">
                <button id="createOrderBtn">发布</button>
            </div>
        </div>

        <!-- 店长审核面板（仅店长可见） -->
        <div class="audit-panel" id="auditPanel">
            <h3>待审核管理员 <button id="closeAuditBtn" style="background:none;border:none;color:white;font-size:1.2rem;cursor:pointer;">×</button></h3>
            <div id="auditList"></div>
        </div>

        <!-- 订单列表 -->
        <h3 class="section-title">订单大厅</h3>
        <div class="order-list" id="orderList">
            <div class="empty-tip">加载中...</div>
        </div>
    </div>

    <!-- 底部栏（登录后显示） -->
    <div class="footer-bar" id="footerBar">
        <div class="user-info">
            <span>欢迎，</span>
            <span class="nickname" id="footerNickname">用户</span>
            <span class="role-badge" id="footerRole">[玩家]</span>
        </div>
        <div>
            <button class="audit-btn hidden" id="openAuditBtn">审核管理员</button>
            <button class="logout-btn" id="logoutBtn">退出登录</button>
        </div>
    </div>

    <script>
        // ==========================================
        // 🔴 必须替换成你的Supabase配置！！！
        // ==========================================
        const SUPABASE_URL = 'https://tuxekxblholrggksfhoz.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_36-cLUyAK_K2dv28hUzhHw_ExULb_Yg';

        // ==========================================
        // DOM元素
        // ==========================================
        const authPage = document.getElementById('authPage');
        const appPage = document.getElementById('appPage');
        const loginCard = document.getElementById('loginCard');
        const registerCard = document.getElementById('registerCard');
        const footerBar = document.getElementById('footerBar');
        const auditPanel = document.getElementById('auditPanel');
        const toast = document.getElementById('toast');

        // 按钮
        const toRegister = document.getElementById('toRegister');
        const toLogin = document.getElementById('toLogin');
        const loginBtn = document.getElementById('loginBtn');
        const registerBtn = document.getElementById('registerBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const createOrderBtn = document.getElementById('createOrderBtn');
        const openAuditBtn = document.getElementById('openAuditBtn');
        const closeAuditBtn = document.getElementById('closeAuditBtn');
        const refreshBtn = document.getElementById('refreshBtn');
        const newOrderBtn = document.getElementById('newOrderBtn');

        // 数据
        let currentUser = null; // 当前登录用户 { id, email, profile: { nickname, role, status } }

        // ==========================================
        // 工具函数
        // ==========================================
        function showToast(msg, isSuccess = false) {
            toast.textContent = msg;
            toast.className = 'toast show';
            if (isSuccess) toast.classList.add('success');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // 切换登录/注册卡片
        toRegister.addEventListener('click', () => {
            loginCard.classList.add('hidden');
            registerCard.classList.remove('hidden');
        });
        toLogin.addEventListener('click', () => {
            registerCard.classList.add('hidden');
            loginCard.classList.remove('hidden');
        });

        // 切换加载状态
        function setLoading(btn, isLoading, text = '处理中...') {
            btn.disabled = isLoading;
            btn.innerHTML = isLoading ? `<span class="spinner"></span>${text}` : btn.originalText;
        }

        // 角色中文映射
        function getRoleName(role) {
            const map = { player: '玩家', worker: '打手', admin: '管理员', owner: '店长' };
            return map[role] || '未知';
        }

        // ==========================================
        // 1. 注册逻辑
        // ==========================================
        registerBtn.originalText = '注册账号';
        registerBtn.addEventListener('click', async () => {
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value.trim();
            const nickname = document.getElementById('regNickname').value.trim();
            const role = document.getElementById('regRole').value;

            // 校验
            if (!email || !password || !nickname) return showToast('邮箱、密码、昵称不能为空');
            if (password.length < 6) return showToast('密码至少需要6位');

            // 店长唯一性校验
            if (role === 'owner') {
                const checkRes = await fetch(`${SUPABASE_URL}/rest/v1/profiles?role=eq.owner&select=id`, {
                    headers: { 'apikey': SUPABASE_ANON_KEY }
                });
                const owners = await checkRes.json();
                if (owners.length > 0) return showToast('店长账号已存在，无法重复注册');
            }

            setLoading(registerBtn, true, '注册中...');
            try {
                // 1. 注册Auth用户
                const authRes = await fetch(`${SUPABASE_URL}/auth/v1/signup`, {
                    method: 'POST',
                    headers: { 'apikey': SUPABASE_ANON_KEY, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const authData = await authRes.json();
                if (!authRes.ok) throw new Error(authData.msg || '注册失败');

                // 2. 插入Profiles表
                const profileRes = await fetch(`${SUPABASE_URL}/rest/v1/profiles`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=representation'
                    },
                    body: JSON.stringify({
                        id: authData.user.id,
                        email,
                        nickname,
                        role,
                        status: role === 'admin' ? 'pending' : 'approved' // 管理员需审核
                    })
                });
                if (!profileRes.ok) throw new Error('资料保存失败');

                showToast('注册成功！请返回登录', true);
                setTimeout(() => toLogin.click(), 1500);
            } catch (e) {
                showToast(e.message);
            } finally {
                setLoading(registerBtn, false);
            }
        });

        // ==========================================
        // 2. 登录逻辑
        // ==========================================
        loginBtn.originalText = '登录账号';
        loginBtn.addEventListener('click', async () => {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            if (!email || !password) return showToast('邮箱和密码不能为空');

            setLoading(loginBtn, true, '登录中...');
            try {
                // 1. 获取Token
                const tokenRes = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
                    method: 'POST',
                    headers: { 'apikey': SUPABASE_ANON_KEY, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const tokenData = await tokenRes.json();
                if (!tokenRes.ok) throw new Error(tokenData.msg || '账号或密码错误');

                // 2. 获取用户资料
                const profileRes = await fetch(`${SUPABASE_URL}/rest/v1/profiles?id=eq.${tokenData.user.id}`, {
                    headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${tokenData.access_token}` }
                });
                const profile = await profileRes.json();
                if (!profile.length) throw new Error('用户资料不存在');
                if (profile[0].status === 'pending') throw new Error('账号等待店长审核，暂无法登录');

                // 3. 保存登录态
                currentUser = {
                    id: tokenData.user.id,
                    email,
                    profile: profile[0]
                };
                localStorage.setItem('sb_token', tokenData.access_token);
                localStorage.setItem('sb_user', JSON.stringify(currentUser));

                // 4. 切换到派单页
                authPage.classList.add('hidden');
                appPage.classList.remove('hidden');
                footerBar.classList.remove('hidden');
                updateFooter(); // 更新底部昵称和身份
                loadOrders(); // 加载订单
                loadAuditList(); // 店长加载审核列表

                showToast('登录成功！', true);
            } catch (e) {
                showToast(e.message);
            } finally {
                setLoading(loginBtn, false);
            }
        });

        // ==========================================
        // 3. 派单页面逻辑
        // ==========================================
        // 更新底部栏信息
        function updateFooter() {
            document.getElementById('footerNickname').textContent = currentUser.profile.nickname;
            document.getElementById('footerRole').textContent = `[${getRoleName(currentUser.profile.role)}]`;
            // 店长显示审核按钮
            if (currentUser.profile.role === 'owner') {
                openAuditBtn.classList.remove('hidden');
            }
            // 非玩家/店长隐藏发单区
            if (!['player', 'owner'].includes(currentUser.profile.role)) {
                document.getElementById('createSection').classList.add('hidden');
            }
        }

        // 发布订单
        createOrderBtn.addEventListener('click', async () => {
            const content = document.getElementById('orderContent').value.trim();
            const price = document.getElementById('orderPrice').value.trim();
            if (!content || !price) return showToast('请填写订单内容和金额');

            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/orders`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${localStorage.getItem('sb_token')}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        sender_id: currentUser.id,
                        content,
                        price: parseFloat(price),
                        status: 'pending'
                    })
                });
                if (!res.ok) throw new Error('发布失败');
                showToast('发布成功！', true);
                document.getElementById('orderContent').value = '';
                document.getElementById('orderPrice').value = '';
                loadOrders();
            } catch (e) {
                showToast(e.message);
            }
        });

        // 加载订单列表
        async function loadOrders() {
            const listEl = document.getElementById('orderList');
            listEl.innerHTML = '<div class="empty-tip">加载中...</div>';
            try {
                let url = `${SUPABASE_URL}/rest/v1/orders?select=*,profiles!worker_id(nickname),profiles!sender_id(nickname)&order=created_at.desc`;
                // 非店长/管理员只能看自己的订单
                if (!['owner', 'admin'].includes(currentUser.profile.role)) {
                    url += `&or=(sender_id.eq.${currentUser.id},worker_id.eq.${currentUser.id})`;
                }
                const res = await fetch(url, {
                    headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${localStorage.getItem('sb_token')}` }
                });
                const orders = await res.json();
                if (!orders.length) {
                    listEl.innerHTML = '<div class="empty-tip">当前没有订单</div>';
                    return;
                }
                listEl.innerHTML = orders.map(order => {
                    let actions = '';
                    // 打手接待接单的订单
                    if (currentUser.profile.role === 'worker' && order.status === 'pending' && !order.worker_id) {
                        actions = `<button class="btn-take" onclick="takeOrder('${order.id}')">接单</button>`;
                    }
                    const isMyOrder = order.sender_id === currentUser.id;
                    return `
                        <div class="order-card">
                            <div class="title">${order.content}</div>
                            <div class="meta">发布人：${order.profiles?.sender_id?.nickname || '未知'} | ${order.worker_id ? `接单人：${order.profiles?.worker_id?.nickname || '未知'}` : '状态：待接单'}</div>
                            <div class="price">¥${order.price}</div>
                            <div class="actions">
                                ${actions}
                                ${isMyOrder ? '<span class="my-order">(我的订单)</span>' : ''}
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (e) {
                listEl.innerHTML = '<div class="empty-tip">加载失败，请检查网络</div>';
            }
        }

        // 接单
        window.takeOrder = async (orderId) => {
            if (!confirm('确定接取此单？')) return;
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/orders?id=eq.${orderId}`, {
                    method: 'PATCH',
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${localStorage.getItem('sb_token')}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ worker_id: currentUser.id, status: 'accepted' })
                });
                if (!res.ok) throw new Error('接单失败（可能已被抢）');
                showToast('接单成功！', true);
                loadOrders();
            } catch (e) {
                showToast(e.message);
            }
        };

        // ==========================================
        // 4. 店长审核逻辑
        // ==========================================
        // 打开审核面板
        openAuditBtn.addEventListener('click', () => {
            auditPanel.classList.remove('hidden');
            loadAuditList();
        });
        // 关闭审核面板
        closeAuditBtn.addEventListener('click', () => {
            auditPanel.classList.add('hidden');
        });
        // 加载待审核管理员
        async function loadAuditList() {
            if (currentUser.profile.role !== 'owner') return;
            const listEl = document.getElementById('auditList');
            listEl.innerHTML = '<div class="empty-tip">加载中...</div>';
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/profiles?role=eq.admin&status=eq.pending&select=id,nickname,email`, {
                    headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${localStorage.getItem('sb_token')}` }
                });
                const admins = await res.json();
                if (!admins.length) {
                    listEl.innerHTML = '<div class="empty-tip">暂无待审核的管理员</div>';
                    return;
                }
                listEl.innerHTML = admins.map(admin => `
                    <div class="audit-item">
                        <div class="info">
                            <div class="name">${admin.nickname}</div>
                            <div class="email">${admin.email}</div>
                        </div>
                        <button class="btn-approve" onclick="approveAdmin('${admin.id}')">批准</button>
                    </div>
                `).join('');
            } catch (e) {
                listEl.innerHTML = '<div class="empty-tip">加载失败</div>';
            }
        }
        // 批准管理员
        window.approveAdmin = async (adminId) => {
            if (!confirm('确定批准该管理员？')) return;
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/profiles?id=eq.${adminId}`, {
                    method: 'PATCH',
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${localStorage.getItem('sb_token')}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ status: 'approved' })
                });
                if (!res.ok) throw new Error('操作失败');
                showToast('批准成功！', true);
                loadAuditList();
            } catch (e) {
                showToast(e.message);
            }
        };

        // ==========================================
        // 5. 其他功能
        // ==========================================
        // 退出登录
        logoutBtn.addEventListener('click', async () => {
            await fetch(`${SUPABASE_URL}/auth/v1/logout`, {
                method: 'POST',
                headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${localStorage.getItem('sb_token')}` }
            });
            localStorage.clear();
            currentUser = null;
            appPage.classList.add('hidden');
            footerBar.classList.add('hidden');
            authPage.classList.remove('hidden');
            loginCard.classList.remove('hidden');
            registerCard.classList.add('hidden');
            showToast('已退出登录', true);
        });
        // 刷新订单
        refreshBtn.addEventListener('click', loadOrders);
        // 聚焦发单框
        newOrderBtn.addEventListener('click', () => {
            document.getElementById('orderContent').focus();
        });

        // ==========================================
        // 6. 自动登录（页面加载时检查）
        // ==========================================
        window.onload = () => {
            const token = localStorage.getItem('sb_token');
            const user = localStorage.getItem('sb_user');
            if (token && user) {
                currentUser = JSON.parse(user);
                authPage.classList.add('hidden');
                appPage.classList.remove('hidden');
                footerBar.classList.remove('hidden');
                updateFooter();
                loadOrders();
                loadAuditList();
            }
        };
    </script>
</body>
</html>
