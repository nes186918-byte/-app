<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡了电竞</title>
    <style>
        body { background: #050510; color: #fff; font-family: sans-serif; padding: 20px; }
        .box { background: rgba(0,0,0,0.5); padding: 20px; border-radius: 10px; border: 1px solid #00f0ff; margin-bottom: 20px; }
        h2 { color: #00f0ff; text-align: center; }
        input, select, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 5px; border: 1px solid #333; background: #111; color: #fff; font-size: 16px; box-sizing: border-box; }
        button { background: #00f0ff; color: #000; font-weight: bold; cursor: pointer; }
        button:active { background: #00c0cc; }
        .link { text-align: center; margin-top: 15px; color: #888; }
        .link span { color: #00f0ff; cursor: pointer; }
        #msg { text-align: center; margin-top: 15px; padding: 10px; border-radius: 5px; display: none; }
        #app { display: none; }
        .order { background: #111; padding: 10px; margin-top: 10px; border-radius: 5px; border-left: 3px solid #00f0ff; }
    </style>
</head>
<body>

    <div id="auth">
        <div class="box">
            <h2>卡了电竞欢迎您</h2>
            <input id="email" placeholder="邮箱">
            <input id="pass" type="password" placeholder="密码">
            <button id="loginBtn">登录</button>
            <div class="link">没账号？<span id="showReg">点此注册</span></div>
        </div>

        <div class="box" id="regBox" style="display:none;">
            <h2>注册</h2>
            <input id="regEmail" placeholder="邮箱">
            <input id="regPass" type="password" placeholder="密码">
            <input id="regName" placeholder="昵称">
            <select id="regRole">
                <option value="player">玩家</option>
                <option value="worker">打手</option>
                <option value="admin">管理员</option>
                <option value="owner">店长</option>
            </select>
            <button id="regBtn">注册</button>
            <div class="link">有账号？<span id="showLogin">点此登录</span></div>
        </div>
    </div>

    <div id="app">
        <div class="box">
            <h2>派单系统</h2>
            <p id="userInfo"></p>
            <button id="logoutBtn">退出登录</button>
            
            <div id="ownerPanel" style="display:none; margin-top:15px; border:1px solid #ff00ff; padding:10px;">
                <h3 style="color:#ff00ff;">店长审核</h3>
                <div id="auditList"></div>
            </div>

            <div id="orderPanel" style="display:none; margin-top:15px;">
                <input id="orderContent" placeholder="订单内容">
                <input id="orderPrice" type="number" placeholder="价格">
                <button id="orderBtn">发布订单</button>
            </div>

            <h3 style="margin-top:20px;">订单列表</h3>
            <div id="orderList"></div>
        </div>
    </div>

    <div id="msg"></div>

<script defer>
// ==========================================
// 🔴 在这里填入你的 Supabase 信息
// ==========================================
const URL = "https://aqotjkekuvkkbqvsxagt.supabase.co";
const KEY = "sb_publishable_q_Vq7lzJpHlEcgw6cZHBmg_7dHtFoqy";

let token = "";
let userId = "";
let userRole = "";

// 显示消息
function msg(txt, ok=false) {
    const m = document.getElementById("msg");
    m.innerText = txt;
    m.style.background = ok ? "#003300" : "#330000";
    m.style.display = "block";
    setTimeout(()=>m.style.display="none", 3000);
}

// 切换登录/注册
document.getElementById("showReg").onclick = ()=>{ document.getElementById("regBox").style.display="block"; };
document.getElementById("showLogin").onclick = ()=>{ document.getElementById("regBox").style.display="none"; };

// 注册
document.getElementById("regBtn").onclick = async ()=>{
    const email = document.getElementById("regEmail").value;
    const pass = document.getElementById("regPass").value;
    const name = document.getElementById("regName").value;
    const role = document.getElementById("regRole").value;
    
    if(!email || !pass || !name){ msg("请填完所有信息"); return; }
    
    // 店长唯一性检查
    if(role === "owner"){
        const r = await fetch(URL+"/rest/v1/profiles?select=id&role=eq.owner", {headers:{"apikey":KEY}});
        const d = await r.json();
        if(d.length > 0){ msg("店长已存在"); return; }
    }

    // 注册Auth
    const res = await fetch(URL+"/auth/v1/signup", {
        method: "POST",
        headers: {"Content-Type":"application/json", "apikey":KEY},
        body: JSON.stringify({email, password:pass, data:{nickname:name, role:role}})
    });
    const j = await res.json();
    
    if(j.user){
        // 写入资料表
        await fetch(URL+"/rest/v1/profiles", {
            method: "POST",
            headers: {"apikey":KEY, "Authorization":"Bearer "+j.session.access_token, "Content-Type":"application/json"},
            body: JSON.stringify({id:j.user.id, email, nickname:name, role, status:(role==="admin"?"pending":"approved")})
        });
        msg("注册成功，请登录", true);
        document.getElementById("regBox").style.display="none";
    } else {
        msg(j.msg || "注册失败");
    }
};

// 登录
document.getElementById("loginBtn").onclick = async ()=>{
    const email = document.getElementById("email").value;
    const pass = document.getElementById("pass").value;
    
    const res = await fetch(URL+"/auth/v1/token?grant_type=password", {
        method: "POST",
        headers: {"Content-Type":"application/json", "apikey":KEY},
        body: JSON.stringify({email, password:pass})
    });
    const j = await res.json();
    
    if(j.access_token){
        token = j.access_token;
        userId = j.user.id;
        
        // 获取资料
        const p = await fetch(URL+"/rest/v1/profiles?id=eq."+userId+"&select=*", {headers:{"apikey":KEY, "Authorization":"Bearer "+token}});
        const prof = (await p.json())[0];
        
        if(prof.status !== "approved"){ msg("账号审核中"); return; }
        
        userRole = prof.role;
        document.getElementById("auth").style.display = "none";
        document.getElementById("app").style.display = "block";
        document.getElementById("userInfo").innerText = "欢迎: "+prof.nickname+" ("+prof.role+")";
        
        // 显示功能
        if(userRole === "owner" || userRole === "player"){
            document.getElementById("orderPanel").style.display = "block";
        }
        if(userRole === "owner"){
            document.getElementById("ownerPanel").style.display = "block";
            loadAudit();
        }
        loadOrders();
    } else {
        msg("登录失败");
    }
};

// 发布订单
document.getElementById("orderBtn").onclick = async ()=>{
    const c = document.getElementById("orderContent").value;
    const p = document.getElementById("orderPrice").value;
    await fetch(URL+"/rest/v1/orders", {
        method: "POST",
        headers: {"apikey":KEY, "Authorization":"Bearer "+token, "Content-Type":"application/json"},
        body: JSON.stringify({sender_id:userId, content:c, price:p, status:"pending"})
    });
    msg("发布成功", true);
    loadOrders();
};

// 加载订单
async function loadOrders(){
    const r = await fetch(URL+"/rest/v1/orders?select=*&order=created_at.desc", {headers:{"apikey":KEY, "Authorization":"Bearer "+token}});
    const d = await r.json();
    let html = "";
    d.forEach(o=>{
        html += `<div class="order"><b>${o.content}</b> - ¥${o.price} <br>状态: ${o.status}</div>`;
    });
    document.getElementById("orderList").innerHTML = html || "暂无订单";
}

// 加载审核
async function loadAudit(){
    const r = await fetch(URL+"/rest/v1/profiles?role=eq.admin&status=eq.pending", {headers:{"apikey":KEY, "Authorization":"Bearer "+token}});
    const d = await r.json();
    let html = "";
    d.forEach(u=>{
        html += `<div class="order">${u.nickname} <button onclick="approve('${u.id}')">批准</button></div>`;
    });
    document.getElementById("auditList").innerHTML = html || "无待审核";
}

// 批准
window.approve = async (id)=>{
    await fetch(URL+"/rest/v1/profiles?id=eq."+id, {
        method: "PATCH",
        headers: {"apikey":KEY, "Authorization":"Bearer "+token, "Content-Type":"application/json"},
        body: JSON.stringify({status:"approved"})
    });
    msg("已批准", true);
    loadAudit();
};

// 退出
document.getElementById("logoutBtn").onclick = ()=>{
    location.reload();
};

</script>
</body>
</html>
